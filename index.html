/* ============================================================================
 * CARTA — the token layer  (sub-brand of Quiet Matter)
 * ----------------------------------------------------------------------------
 * Carta was cut from Quiet Matter and has since grown a deliberate personality
 * the parent forbids — warm stock, an ember signal, editorial display type, a
 * colour per café. We keep that personality, but adopt Quiet Matter's TOKEN
 * ARCHITECTURE so the two systems stay mechanically compatible and QM's
 * structural fixes can still be pulled in. Charter: SUBBRAND.md.
 *
 * The structure, exactly as QM's static/qm.css:
 *   1. Inherited primitives   — values TRACKED against Quiet Matter, unchanged.
 *   2. Carta brand primitives — the sanctioned overrides (see SUBBRAND.md).
 *   3. Semantic roles         — QM-compatible names; every rule consumes ONLY
 *                               roles, never primitives (as QM does).
 *   4. Legacy aliases         — old flat names (--ink/--paper/--accent…) mapped
 *                               onto the roles, so existing rules keep working
 *                               unchanged. Migrate rules onto the role names
 *                               opportunistically, then delete these.
 *   5. Dusk                   — remaps ONLY the roles to the night primitives;
 *                               primitives never change (QM D1).
 * ========================================================================== */

:root{
  /* ── 1. Inherited primitives — tracked to Quiet Matter, values identical ──
     These already match QM byte-for-byte. Declaring them here makes the shared
     inheritance a RULE, not a coincidence. When QM moves one, move it here. */

  /* Type scale — the sanctioned steps 11/13/15/16/18. 1rem = 16px. */
  --s11:0.6875rem; --s13:0.8125rem; --s15:0.9375rem; --s16:1rem; --s18:1.125rem;
  /* Tracking + weights */
  --track-label:0.12em; --track-foot:0.04em;
  --w-regular:400; --w-medium:500; --w-semibold:600;
  /* Measures + touch minimum */
  --measure:37ch;
  --measure-editorial:56ch;
  --touch-min:44px;                 /* WCAG 2.5.5 */
  /* Faces — Spectral (interpretive) + Libre Franklin (operational), as QM. */
  --serif:'Spectral',Georgia,'Times New Roman',serif;
  --sans:'Libre Franklin',system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;   /* Carta addition: code */

  /* ── 2. Carta brand primitives — the sanctioned sub-brand overrides ───────
     Documented departures from QM. See SUBBRAND.md §"Sanctioned overrides".
     Both the day (paper) and night (roast) ramps exist as fixed primitives;
     the theme block below only ever repoints ROLES between them. */

  /* Paper ramp — warm stock, warmer + darker than QM's #fafaf8 */
  --ca-paper-0:#f8f5ee;    /* lifted paper (card) */
  --ca-paper-50:#f2eee6;   /* the page — warm stock */
  --ca-paper-100:#e9e3d8;  /* sunk surface */
  --ca-paper-200:#ddd5c7;  /* opaque hairline */
  /* Ink ramp — roasted, warm brown-black (QM is neutral #1a1a1a) */
  --ca-ink-900:#241d18;    /* roasted ink — body */
  --ca-ink-600:#554a41;    /* operational */
  --ca-ink-450:#776b60;    /* subtle / footer — ≥4.5:1 on paper (≈ QM #6e6c6a) */
  --ca-ink-300:#b8b5b0;    /* disabled/placeholder only */
  /* Hairlines */
  --ca-line-ink:rgba(36,29,24,.13);
  --ca-line-paper:rgba(236,233,227,.14);
  /* The ember — Carta's one warm signal: current action and the cup's score.
     THE core break from QM, which admits no colour on customer surfaces. */
  --ca-ember:#a63f2b;
  --ca-ember-ink:#fffaf1;
  /* Functional destructive — always paired with a text label */
  --ca-danger:#8c3b34;

  /* Night ramp — "paper at night", warm off-black (QM night is #161513) */
  --ca-night-900:#171310;    /* page at night */
  --ca-night-800:#211b17;    /* card at night */
  --ca-night-700:#2d241f;    /* sunk surface at night */
  --ca-night-600:#342923;    /* opaque hairline at night */
  --ca-roastlight-100:#f0e9dd;   /* primary text on night */
  --ca-roastlight-300:#c8bcae;   /* secondary text on night */
  --ca-roastlight-500:#9f9183;   /* subtle text on night */
  --ca-roastlight-700:#5b574f;   /* disabled on night */
  --ca-ember-dusk:#e06b4f;   /* the ember, lifted for the dark surface */

  /* Shape — square by default; the one sanctioned rounding is 2px (chips/code) */
  --radius:0;
  --chipr:2px;

  /* ── 3. Semantic roles — QM-compatible. Rules consume ONLY these. ─────────── */
  --text-primary:var(--ca-ink-900);
  --text-secondary:var(--ca-ink-600);
  --text-subtle:var(--ca-ink-450);
  --text-disabled:var(--ca-ink-300);
  --text-on-fill:var(--ca-ember-ink);
  --surface-page:var(--ca-paper-50);
  --surface-card:var(--ca-paper-0);
  --surface-sunk:var(--ca-paper-100);
  --border-hairline:var(--ca-line-ink);
  --border-strong:var(--ca-ink-900);
  --border-control:var(--ca-ink-450);
  --link:var(--ca-ink-600);
  --link-hover:var(--ca-ink-900);
  --focus-ring:var(--ca-ink-900);
  --fill-strong:var(--ca-ink-900);
  --fill-strong-hover:var(--ca-ink-600);
  /* Carta-only roles — the sanctioned extensions QM has no equivalent for */
  --signal:var(--ca-ember);       /* action + score */
  --signal-ink:var(--ca-ember-ink);
  --status-danger:var(--ca-danger);

  /* ── 4. Legacy aliases — keep existing index.html rules working ───────────
     Old flat names now point at roles. Migrate rules onto the role names over
     time, then delete this block. Nothing else in the file needs to change. */
  --ink:var(--text-primary);
  --ink-2:var(--text-secondary);
  --ink-3:var(--text-subtle);
  --ink-d:var(--text-disabled);
  --paper:var(--surface-page);
  --paper-card:var(--surface-card);
  --paper-2:var(--surface-sunk);
  --paper-3:var(--ca-paper-200);     /* opaque hairline primitive */
  --line:var(--border-hairline);
  --line-2:var(--ca-paper-200);
  --line-strong:var(--border-strong);
  --accent:var(--signal);
  --accent-ink:var(--signal-ink);
  --danger:var(--status-danger);
}

/* ── 5. Dusk — "paper at night". Remaps ONLY roles to the night primitives;
   primitives never change (QM D1). Legacy aliases follow for free, because
   they point at the roles, not at the primitives. ─────────────────────────── */
html[data-theme="dusk"]{
  --text-primary:var(--ca-roastlight-100);
  --text-secondary:var(--ca-roastlight-300);
  --text-subtle:var(--ca-roastlight-500);
  --text-disabled:var(--ca-roastlight-700);
  --text-on-fill:var(--ca-night-900);
  --surface-page:var(--ca-night-900);
  --surface-card:var(--ca-night-800);
  --surface-sunk:var(--ca-night-700);
  --border-hairline:var(--ca-line-paper);
  --border-strong:var(--ca-roastlight-100);
  --border-control:var(--ca-roastlight-500);
  --link:var(--ca-roastlight-300);
  --link-hover:var(--ca-roastlight-100);
  --focus-ring:var(--ca-roastlight-100);
  --fill-strong:var(--ca-roastlight-100);
  --fill-strong-hover:var(--ca-roastlight-300);
  --signal:var(--ca-ember-dusk);
  --signal-ink:var(--ca-night-900);
  --line-2:var(--ca-night-700);      /* legacy alias override (opaque) */
  --paper-3:var(--ca-night-600);     /* legacy alias override (opaque) */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--serif);
  font-size:16px;line-height:1.5;
  max-width:480px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
}
.num{font-family:var(--sans);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.sans{font-family:var(--sans)}

/* ===== header ===== */
header.app{
  background:var(--paper);color:var(--ink);
  padding:calc(18px + env(safe-area-inset-top)) 20px 14px;
  display:flex;justify-content:space-between;align-items:baseline;
  flex:none;z-index:20;border-bottom:1px solid var(--line);
}
header.app h1{font-family:var(--sans);font-size:13px;letter-spacing:.42em;font-weight:600;color:var(--ink)}
header.app .sub{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-3)}
main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px 24px}

/* ===== section label ===== */
h2{font-family:var(--sans);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:500;margin:26px 0 10px}
h2:first-child{margin-top:4px}

/* ===== card ===== */
.card{background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:10px}
.card.tap{cursor:pointer;transition:background .15s ease}
.card.tap:active{background:var(--paper-2)}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.muted{color:var(--ink-3);font-family:var(--sans);font-size:13px}
.small{font-size:13px}
.serif{font-family:var(--serif)}
strong{font-family:var(--serif);font-weight:600;font-style:normal}

/* ===== chips (square, monochrome — weight/label carry meaning) ===== */
.chip{
  display:inline-block;font-family:var(--sans);font-size:11px;letter-spacing:.02em;
  padding:2px 8px;border-radius:var(--chipr);
  border:1px solid var(--line);color:var(--ink-3);font-variant-numeric:tabular-nums;
}
.chip.window{border-color:var(--line-strong);color:var(--ink);font-weight:500}
.chip.resting{color:var(--ink-3)}
.chip.past{color:var(--ink-3);border-style:dashed}
.chip.on{background:var(--ink);color:var(--accent-ink);border-color:var(--ink)}
.lens{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 8px}
.lens .chip{cursor:pointer;padding:5px 11px}

/* ===== buttons ===== */
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.btn{
  display:block;width:100%;text-align:center;min-height:44px;padding:13px 16px;border-radius:var(--radius);
  font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  transition:background .2s ease,color .2s ease,border-color .2s ease;
}
.btn-primary{background:var(--accent);color:var(--accent-ink);border:1px solid var(--accent)}
.btn-primary:active{filter:brightness(.88)}
.btn-quiet{background:none;border:1px solid var(--line-strong);color:var(--ink)}
.btn-quiet:active{background:var(--paper-2)}
.btn-graphite{background:var(--ink);color:var(--accent-ink);border:1px solid var(--ink)}
.btn-graphite:active{background:var(--ink-2)}
.btn-danger{color:var(--danger);border:1px solid var(--danger);background:none}
.btn-danger:active{background:var(--paper-2)}
.btn+.btn{margin-top:8px}

/* ===== forms ===== */
label.f,div.f{display:block;margin-bottom:14px}
label.f span.l,div.f span.l{display:block;font-family:var(--sans);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:5px;font-weight:500}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font-family:var(--serif);font-size:16px;padding:9px 0;
  border:none;border-bottom:1px solid var(--ink-3);border-radius:0;
  background:transparent;color:var(--ink);appearance:none;-webkit-appearance:none;
}
input::placeholder,textarea::placeholder{color:var(--ink-d);font-style:italic}
select{background:transparent}
input:focus,select:focus,textarea:focus{outline:none;border-bottom-color:var(--ink)}
textarea{min-height:60px;resize:vertical;border:1px solid var(--line);padding:9px 11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}

/* ===== dial (the field-tool scale exception) ===== */
.dial{border:1px solid var(--line);border-radius:var(--radius);background:var(--paper-card);padding:9px 6px 11px;margin-bottom:10px;text-align:center;position:relative}
.dial .l{font-family:var(--sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:500}
.dial .v{font-family:var(--sans);font-size:30px;font-weight:500;font-variant-numeric:tabular-nums;line-height:1.15;margin:3px 0;color:var(--ink)}
.dial .v .u{font-family:var(--sans);font-size:12px;color:var(--ink-3);font-weight:400;margin-left:2px}
.dial .ctl{display:flex;justify-content:center;gap:6px}
.dial .ctl button{
  width:52px;height:34px;border:1px solid var(--line-strong);border-radius:var(--radius);background:transparent;
  font-size:20px;font-weight:400;color:var(--ink-2);
}
.dial .ctl button:active{background:var(--ink);color:var(--accent-ink);border-color:var(--ink)}
.dial .ticks{position:absolute;top:9px;right:11px;font-family:var(--sans);font-size:9px;color:var(--ink-3);letter-spacing:.06em}
.dial .v.tapedit{display:inline-block;cursor:text;border-bottom:1px dotted var(--ink-3)}
.dedit{width:2.7em;min-width:46px;max-width:88%;font-family:var(--sans);font-size:30px;font-weight:500;font-variant-numeric:tabular-nums;text-align:center;border:none;background:transparent;color:var(--ink);padding:0}
.dedit:focus{outline:none}
.dcorner{position:absolute;top:7px;right:7px;display:flex;gap:3px}
.dcorner .ut{font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.02em;padding:2px 6px;border:1px solid var(--line-strong);background:transparent;color:var(--ink-3);border-radius:var(--chipr);cursor:pointer}
.dcorner .ut.on{background:var(--ink);color:var(--accent-ink);border-color:var(--ink)}
.dialrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ===== hedonic ===== */
.hedonic{display:flex;gap:5px;justify-content:space-between;margin:6px 0 4px}
.hedonic button{
  flex:1;aspect-ratio:1/1.15;border:1px solid var(--line-strong);border-radius:var(--radius);background:transparent;
  font-family:var(--sans);font-variant-numeric:tabular-nums;font-size:15px;color:var(--ink-2);max-width:46px;
}
.hedonic button.on{background:var(--ink);color:var(--accent-ink);border-color:var(--ink);font-weight:500}
.desc{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
.desc button{font-family:var(--sans);font-size:13px;padding:6px 12px;border:1px solid var(--line-strong);border-radius:var(--chipr);background:transparent;color:var(--ink-2)}
.desc button.on{background:var(--ink);color:var(--accent-ink);border-color:var(--ink)}

/* ===== segmented ===== */
.seg{display:flex;border:1px solid var(--line-strong);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.seg button{flex:1;padding:9px 4px;font-family:var(--sans);font-size:13px;background:transparent;color:var(--ink-2);border-right:1px solid var(--line-strong)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--ink);color:var(--accent-ink)}

/* ===== timer (field-tool scale exception; flattened chrome) ===== */
.timer{background:var(--paper-2);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:12px}
.timer .t{font-family:var(--sans);font-size:40px;font-weight:500;font-variant-numeric:tabular-nums;line-height:1.1}
.timer .ctl{display:flex;gap:8px;margin-top:10px}
.timer .ctl button{flex:1;padding:11px;border-radius:var(--radius);border:1px solid var(--line-strong);color:var(--ink);font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.timer .ctl button.go{background:var(--ink);border-color:var(--ink);color:var(--accent-ink)}

/* ===== tab bar — typographic, no icons ===== */
nav.tabs{
  flex:none;background:var(--paper);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom);border-top:1px solid var(--line);
}
nav.tabs button{flex:1;padding:12px 0 10px;color:var(--ink-3);font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;border-top:2px solid transparent;margin-top:-1px}
nav.tabs button .ic{display:none}
nav.tabs button.on{color:var(--ink);border-top-color:var(--ink)}

/* ===== the daily loop ===== */
.hero{padding:12px 2px 20px}
.eyebrow{font-family:var(--sans);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:650;margin-bottom:8px}
.hero h2{font-family:var(--serif);font-size:36px;line-height:1.02;letter-spacing:-.035em;text-transform:none;color:var(--ink);font-weight:600;margin:0;max-width:11ch}
.hero .origin{font-family:var(--serif);font-style:italic;color:var(--ink-3);font-size:15px;margin-top:8px}
.continuation{border-top:1px solid var(--ink);border-bottom:1px solid var(--line);padding:15px 0;margin:2px 0 16px}
.continuation .score{font-family:var(--sans);font-size:46px;line-height:.9;color:var(--accent);font-weight:550;letter-spacing:-.05em}
.continuation .score small{font-size:12px;letter-spacing:.04em;color:var(--ink-3);font-weight:400}
.continuation .row>div:last-child{max-width:62%}
.recipe{font-family:var(--sans);font-size:13px;font-variant-numeric:tabular-nums;color:var(--ink-2);margin-top:5px;overflow-wrap:anywhere}
.finding{font-family:var(--serif);font-style:italic;font-size:15px;margin-top:9px;color:var(--ink)}
.bestline{display:flex;justify-content:space-between;gap:12px;margin:12px 1px 0;font-size:12px;color:var(--ink-3)}
.bestline strong{color:var(--ink);font-family:var(--sans);font-weight:550}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:26px 0 10px}
.section-head h2{margin:0}
.text-action{font-family:var(--sans);font-size:11px;color:var(--ink-2);text-decoration:underline;text-underline-offset:3px}
.coffee-card{position:relative;padding-right:70px}
.coffee-card .count{position:absolute;right:16px;top:16px;font-family:var(--sans);font-size:11px;color:var(--ink-3)}
.empty-hero{padding:34px 4px 24px}
.empty-hero h2{font-family:var(--serif);font-size:34px;line-height:1.05;letter-spacing:-.03em;text-transform:none;color:var(--ink);margin:0 0 10px}
.empty-hero p{color:var(--ink-3);font-style:italic;margin-bottom:22px;max-width:30ch}

/* ===== welcome (first-run home flow — the way in) ===== */
.welcome{position:fixed;inset:0;z-index:120;background:var(--paper);display:none;flex-direction:column}
.welcome.open{display:flex}
.wc{flex:1;display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(24px + env(safe-area-inset-top)) 28px calc(24px + env(safe-area-inset-bottom))}
.wc-top{display:flex;justify-content:space-between;align-items:center}
.wc-mark{font-family:var(--sans);font-size:12px;letter-spacing:.42em;font-weight:600;color:var(--ink)}
.wc-prog{display:flex;gap:6px;align-items:center}
.wc-prog i{width:18px;height:1px;background:var(--ink);opacity:.18;transition:opacity .35s}
.wc-prog i.on{opacity:1}
.wc-body{padding:34px 0 8px}
.wc-eyebrow{font-family:var(--sans);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:650;margin-bottom:14px}
.wc-head{font-family:var(--serif);font-size:42px;line-height:1.0;letter-spacing:-.04em;font-weight:600;color:var(--ink);margin:0 0 18px;max-width:13ch}
.wc-head.sm{font-size:36px}
.wc-lede{font-family:var(--serif);font-size:17px;line-height:1.5;color:var(--ink-2);max-width:34ch;margin-bottom:14px}
.wc-lede em{font-style:italic;color:var(--ink)}
.wc-note{font-family:var(--sans);font-size:12px;color:var(--ink-3);margin-top:16px;line-height:1.5;max-width:36ch}
.wc-foot{margin-top:auto;padding-top:22px}
.wc-seal{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-3);text-align:center;margin-top:18px}
.wc-list{margin-top:28px}
.wc-item{width:100%;text-align:left;display:flex;align-items:baseline;gap:16px;
  padding:19px 2px;border-top:1px solid var(--line);transition:background .15s}
.wc-item:last-of-type{border-bottom:1px solid var(--line)}
.wc-item:active{background:var(--paper-2)}
.wc-item .tx{flex:1;min-width:0}
.wc-item .tt{font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-.01em;color:var(--ink);display:block}
.wc-item .dd{font-family:var(--sans);font-size:13px;color:var(--ink-3);margin-top:5px;line-height:1.5;display:block}
.wc-item .go{align-self:center;color:var(--ink-3);font-size:15px;flex:none}
.wc-skip{font-family:var(--sans);font-size:12px;color:var(--ink-3);text-decoration:underline;text-underline-offset:3px;text-align:center;width:100%;margin-top:14px;min-height:26px}
@keyframes wc-rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.wc-rise{opacity:0;animation:wc-rise .55s cubic-bezier(.22,.61,.36,1) forwards}
@media (prefers-reduced-motion:reduce){.wc-rise{animation:none;opacity:1}}

/* ===== sheet ===== */
.sheet-bg{position:fixed;inset:0;background:rgba(26,26,22,.42);z-index:40;display:none}
.sheet-bg.open{display:block}
.sheet{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;
  background:var(--paper);border-radius:0;border-top:1px solid var(--line-strong);z-index:50;
  max-height:92vh;max-height:92dvh;overflow-y:auto;display:none;
  padding:8px 18px calc(22px + env(safe-area-inset-bottom));
  transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.sheet.open{display:block}
.sheet .grab{height:26px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none}
.sheet .grab::before{content:"";width:34px;height:3px;background:var(--ink-3);border-radius:2px;transition:background .15s,width .15s}
.sheet.dragging{transition:none}
.sheet.dragging .grab{cursor:grabbing}
.sheet.dragging .grab::before{background:var(--ink);width:44px}
.sheet h3{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:3px;color:var(--ink)}
.sheet .sub{font-family:var(--serif);font-style:italic;color:var(--ink-3);font-size:14px;margin-bottom:16px;max-width:37ch}

/* ===== misc ===== */
.empty{font-family:var(--serif);font-style:italic;color:var(--ink-3);text-align:center;padding:30px 20px;font-size:15px}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;gap:10px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-3);font-family:var(--sans);font-size:13px;flex:none}
.kv .v{font-variant-numeric:tabular-nums;text-align:right}
.n-note{font-family:var(--sans);font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums}
svg text{font-family:'Libre Franklin',sans-serif}
.toast{
  position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:var(--chipr);font-family:var(--sans);font-size:13px;
  z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}
.link{font-family:var(--sans);color:var(--ink-2);font-weight:400;font-size:13px;text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.link:hover{color:var(--ink)}

/* ===== quick start ===== */
ol.steps{list-style:none;counter-reset:s;margin:2px 0 4px}
ol.steps>li{counter-increment:s;position:relative;padding-left:38px;margin-bottom:16px}
ol.steps>li::before{
  content:counter(s);position:absolute;left:0;top:1px;width:24px;height:24px;border-radius:var(--radius);
  background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;
  font-family:var(--sans);font-size:12px;font-weight:500;font-variant-numeric:tabular-nums;
}
ol.steps .t{font-family:var(--serif);font-size:15px;font-weight:600;line-height:24px}
ol.steps .b{font-size:14px;color:var(--ink-2);margin-top:2px;line-height:1.5}
ol.steps .go{font-family:var(--sans);font-size:12px;color:var(--ink-2);font-weight:500;margin-top:6px;display:inline-block;text-decoration:underline;text-underline-offset:2px}
.rule{border-left:2px solid var(--ink);padding:2px 0 2px 13px;margin:14px 0;background:var(--paper-2)}
.rule.hard{border-left-color:var(--danger)}
.rule .t{font-family:var(--serif);font-size:14px;font-weight:600}
.rule .b{font-size:14px;color:var(--ink-2)}
.warn{border:1px solid var(--danger);border-radius:var(--radius);padding:12px 14px;margin:12px 0;background:var(--paper-2)}
.warn .t{font-family:var(--sans);font-size:11px;font-weight:500;color:var(--danger);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.warn .b{font-size:14px;color:var(--ink-2)}
.loop{display:flex;align-items:stretch;gap:4px;margin:10px 0 6px}
.loop .s{flex:1;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:8px 3px;text-align:center}
.loop .s .k{font-family:var(--sans);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:500}
.loop .s .v{font-family:var(--serif);font-size:12px;font-weight:600;margin-top:3px;line-height:1.25}
.loop .a{display:flex;align-items:center;color:var(--ink-3);font-size:12px}
.gtab{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);align-items:baseline}
.gtab:last-child{border-bottom:none}
.gtab .ic{display:none}
.gtab .nm{width:52px;font-family:var(--sans);font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;flex:none;color:var(--ink)}
.gtab .ds{font-size:13px;color:var(--ink-2);flex:1}
.gt{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
.gt td{padding:7px 0;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
.gt td:last-child{text-align:right;color:var(--ink-2);font-family:var(--sans)}
.gt tr:last-child td{border-bottom:none}
code{font-family:var(--mono);font-size:12px;background:var(--paper-2);padding:1px 5px;border-radius:var(--chipr)}
.helpbtn{font-family:var(--sans);color:var(--ink-3);font-size:12px;padding:0 0 0 14px;line-height:1;text-decoration:underline;text-underline-offset:2px}
.helpbtn:active{color:var(--ink)}

/* ===== café ===== */
.opt{text-transform:none;letter-spacing:0;color:var(--ink-3);font-weight:400;font-size:10px;font-style:italic;font-family:var(--serif)}
.cafeback{background:var(--paper-2);border:1px solid var(--line);border-left:2px solid var(--ink);border-radius:var(--radius);padding:9px 12px;font-size:13px;color:var(--ink-2);margin:2px 0 12px;font-family:var(--serif);font-style:italic}
.cafeback strong{font-style:normal;color:var(--ink)}
.verdict{display:flex;gap:6px}
.verdict button{flex:1;padding:10px;border:1px solid var(--line-strong);border-radius:var(--radius);background:transparent;color:var(--ink-2);font-family:var(--sans);font-size:13px;font-weight:500}
.verdict button.yes.on{background:var(--ink);color:var(--accent-ink);border-color:var(--ink)}
.verdict button.no.on{background:transparent;color:var(--ink);border-color:var(--ink);text-decoration:line-through}
.badge{display:inline-block;font-family:var(--sans);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:1px 7px;border-radius:var(--chipr);background:transparent;border:1px solid var(--line-strong);color:var(--ink);font-weight:500;vertical-align:middle}
.badge.ghost{border-color:var(--line);color:var(--ink-3)}
/* the reach: solid says fact, dashed says state — no mark mode may collapse the two */
.badge.dashed{border-style:dashed;border-color:var(--ink-3);color:var(--ink-3)}
.desc button.held{border-style:dashed;border-color:var(--ink-3);color:var(--ink-3)}
.shopcard .big{font-family:var(--sans);font-size:22px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
.swatch{width:11px;height:11px;border-radius:var(--chipr);vertical-align:-1px;margin-left:6px;display:none;border:1px solid var(--line)}
/* café theme — a whole surface derived from the café's website colours. The vars are set inline. */
.cafe-theme{background:var(--paper);color:var(--ink);margin:0 -18px;padding:6px 18px 8px}
/* the derived palette, shown while setting a café's branding */
.palette{display:flex;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);margin:2px 0 0}
.palette span{flex:1;height:36px}
.brandmark{width:14px;height:14px;border-radius:var(--chipr);display:inline-block;vertical-align:-2px;border:1px solid var(--line)}
.georow{padding:8px 11px;margin:6px 0 0}
.pinned{font-family:var(--sans);font-size:12px;color:var(--ink-2);padding:6px 2px}
.pinned .link{margin-left:8px;cursor:pointer}
.trace-more{margin-bottom:14px}
.trace-more>summary{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;padding:6px 0;list-style:none}
.trace-more>summary::-webkit-details-marker{display:none}
.trace-more>summary::before{content:"+ ";color:var(--ink-3)}
.trace-more[open]>summary::before{content:"– "}

/* ===== read-only banner ===== */
.viewbar{
  background:var(--paper-2);color:var(--ink);border:1px solid var(--line);border-left:2px solid var(--ink);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;
  font-family:var(--serif);font-style:italic;font-size:13px;gap:10px;
}
.viewbar button{background:var(--ink);color:var(--accent-ink);border-radius:var(--radius);padding:6px 13px;font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;flex:none;font-style:normal}

/* ===== changelog ===== */
.rel{border-left:2px solid var(--line-2);padding:2px 0 2px 14px;margin:0 0 18px}
.rel.latest{border-left-color:var(--ink)}
.rel-h{display:flex;align-items:baseline;gap:8px}
.rel-v{font-family:var(--sans);font-size:13px;font-weight:500;font-variant-numeric:tabular-nums}
.rel-d{font-family:var(--sans);font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.rel-new{font-family:var(--sans);font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line-strong);color:var(--ink);padding:1px 6px;border-radius:var(--chipr);font-weight:500}
.rel-t{font-family:var(--serif);font-size:15px;font-weight:600;margin:3px 0 5px}
.rel-l{list-style:none;margin:0}
.rel-l li{font-size:14px;color:var(--ink-2);padding:2px 0 2px 15px;position:relative;line-height:1.5}
.rel-l li::before{content:"—";position:absolute;left:0;color:var(--ink-3)}

/* ===== Quiet Matter seal ===== */
.qm-seal{font-family:var(--sans);font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-3);text-align:center;font-weight:500;margin:20px 0 2px}
.qm-seal .em{display:block;font-family:var(--serif);font-style:italic;font-size:12px;letter-spacing:0;text-transform:none;color:var(--ink-3);margin-top:6px}

</style>
</head>
<body>
<header class="app"><h1>CARTA</h1>
<div style="display:flex;align-items:baseline"><div class="sub" id="who">one cup · two contexts</div>
<button class="helpbtn" onclick="go('ledger')" aria-label="Open More">more</button></div></header>
<main id="main"></main>
<nav class="tabs" id="tabs"></nav>
<div class="sheet-bg" id="sheetbg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="welcome" id="welcome"></div>
<div class="toast" id="toast"></div>
<input type="file" accept=".json,application/json" id="importInput" style="display:none">

<script>
'use strict';
/* ============ store ============ */
const KEY='carta.v1';           // legacy single-user key — migrated to per-user keys on first boot
const USERS_KEY='carta.users';
const blank={version:1,setups:[],bags:[],brews:[],cups:[],cafes:[],cafeFavs:[],cafeWants:[],deleted:[],prefs:{},createdAt:new Date().toISOString()};
const clone=o=>JSON.parse(JSON.stringify(o));
const dataKey=id=>KEY+'.'+id;
function loadUsers(){
  try{
    const r=localStorage.getItem(USERS_KEY);
    if(r){const u=JSON.parse(r); if(u&&u.users&&u.users.length&&u.users.some(x=>x.id===u.activeId))return u;}
  }catch(e){}
  // First multi-user boot: adopt any existing single-user ledger as user "Me".
  // Fixed id so a partial migration (quota mid-write) retries onto the same key.
  const u={version:1,users:[{id:'u1',name:'Me',createdAt:new Date().toISOString()}],activeId:'u1'};
  try{
    const legacy=localStorage.getItem(KEY);
    if(legacy!=null)localStorage.setItem(dataKey('u1'),legacy);
    localStorage.setItem(USERS_KEY,JSON.stringify(u));
    if(legacy!=null)localStorage.removeItem(KEY);
  }catch(e){}
  return u;
}
let USERS=loadUsers();
let viewingUserId=USERS.activeId;   // whose ledger is on screen; ≠ activeId means read-only
let D=load();
function load(){try{const r=localStorage.getItem(dataKey(viewingUserId));const d=r?JSON.parse(r):clone(blank);d.prefs=d.prefs||{};return d}catch(e){return clone(blank)}}
function save(){if(readOnly())return;localStorage.setItem(dataKey(viewingUserId),JSON.stringify(D));markDirty()}
// per-user presentation/input preferences (temp unit, timer visibility) — part of the ledger, so they export and sync
const getPref=(k,dflt)=>{const p=D.prefs||{};return p[k]==null?dflt:p[k]};
function setPref(k,v){if(readOnly())return;D.prefs=D.prefs||{};D.prefs[k]=v;save()}
function saveUsers(){localStorage.setItem(USERS_KEY,JSON.stringify(USERS))}
const userById=id=>USERS.users.find(u=>u.id===id);
const viewingUser=()=>userById(viewingUserId)||remoteUserById(viewingUserId);
const readOnly=()=>viewingUserId!==USERS.activeId;
function guard(){if(readOnly()){toast(`Read only — this is ${viewingUser().name}'s ledger`);return true}return false}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byNew=(a,b)=>b.createdAt.localeCompare(a.createdAt);
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),1800)}

/* ============ the Register ============ */
/* One entry per café, kept once — Jane's Fighting Ships, for cafés. The single
 * source of truth for a café's identity: name, city, address and pin, and the
 * palette read from its website. Cups stay personal, per ledger; the place is common
 * knowledge, so it lives OUTSIDE the per-user keys, shared by every user of
 * this device — and, through sync (/api/cafes), by every keeper on the server.
 * Any keeper may amend an entry; the entry remembers who entered it first. */
const REG_KEY='carta.register.v1';
let REG=loadReg();
function loadReg(){
  try{const r=localStorage.getItem(REG_KEY);const g=r?JSON.parse(r):null;
    if(g&&Array.isArray(g.entries))return{version:1,rev:g.rev||0,dirty:!!g.dirty,entries:g.entries,deleted:g.deleted||[]};
  }catch(e){}
  return{version:1,rev:0,dirty:false,entries:[],deleted:[]};
}
function saveReg(){try{localStorage.setItem(REG_KEY,JSON.stringify(REG))}catch(e){}}
const regByName=name=>REG.entries.find(e=>normName(e.name)===normName(name))||null;
const regSubstance=v=>v!=null&&v!=='';
const activeName=()=>(typeof SYNC!=='undefined'&&SYNC&&syncedHere()&&SYNC.name)||((userById(USERS.activeId)||{}).name||'');
// Upsert an entry. Sparse by default — a sighting fills blanks, never erases —
// so a fast cup log can't strip a rich entry. {full:true} (the café editor)
// overwrites the fields it carries. {at} backdates provenance to the record
// that named the café, so firstBy/firstAt stay honest when seeding history.
function regUpsert(name,fields,who,opts){
  name=String(name||'').trim(); if(!name)return null;
  opts=opts||{};
  const now=new Date().toISOString(),at=opts.at||now;
  let e=regByName(name),changed=false;
  if(!e){e={id:uid(),name,createdAt:at,firstBy:who||'',firstAt:at};REG.entries.push(e);changed=true}
  else if(at<(e.firstAt||e.createdAt||'')){e.firstAt=at;if(who)e.firstBy=who;changed=true}
  Object.keys(fields||{}).forEach(k=>{const v=fields[k];
    if(opts.full ? ((regSubstance(v)||regSubstance(e[k]))&&e[k]!==v) : (regSubstance(v)&&!regSubstance(e[k]))){e[k]=v==null?null:v;changed=true}});
  if(changed){e.updatedAt=now;if(who)e.by=who;REG.dirty=true;saveReg();schedulePush()}

// Seed the Register from every ledger this device can read — each user's café
// profiles and every shop their café cups name. Chronological, so the first
// record to name a café holds the provenance. Idempotent: fills blanks only.
function regSeed(){
  const srcs=USERS.users.map(u=>({who:u.name,led:readJSONLS(dataKey(u.id))}));
  remoteDirUsers().forEach(u=>{const c=readJSONLS(remoteKey(u.id));if(c&&c.ledger)srcs.push({who:u.name,led:c.ledger})});
  const sights=[];
  srcs.forEach(s=>{const d=s.led;if(!d)return;
    (d.cafes||[]).forEach(p=>{if(p&&p.name)sights.push({at:p.createdAt||'',who:s.who,name:p.name,fields:{city:p.city,neighborhood:p.neighborhood,address:p.address,lat:p.lat,lon:p.lon,palette:p.palette,accent:p.accent,notes:p.notes,tags:p.tags}})});
    (d.cups||[]).forEach(c=>{if(c&&c.kind==='cafe'&&c.shop)sights.push({at:c.createdAt||'',who:s.who,name:c.shop,fields:{city:c.city}})});
  });
  sights.sort((a,b)=>a.at.localeCompare(b.at)).forEach(s=>regUpsert(s.name,s.fields,s.who,{at:s.at||null}));

/* ============ the reach ============ */
/* A classification of depth, not worth — four marks for how much of a coffee's
 * road reads from the customer's side of the counter. A Register fact, like the
 * pin and the palette: keepers attest FACTS (the bag, what the counter showed),
 * never depths — the reading is the deepest fact standing. Per fact the newest
 * standing sighting carries; older lines keep their ink. Nothing erases: a later
 * reading of your own supersedes your line, withdraw strikes it — both stay,
 * signed. Sightings live on the entry and merge in sync as a union by id. */
const REACH=[null,
  {glyph:'○',word:'Counter',name:'The counter',line:'good coffee, made fast and made right. Nobody narrates.'},
  {glyph:'◎',word:'House',name:'The house',line:'the bag is named, the menu has intent. Ask, and they answer.'},
  {glyph:'◉',word:'Roastery',name:'The roastery',line:'the roast in the room; the grind adjusted before your cup.'},
  {glyph:'●',word:'Origin',name:'The origin',line:'the farm in the cup: producer, lot, process, freely told.'}];
const BAG_FACTS={unnamed:{label:'unnamed',depth:1,why:'an honest, unnamed bag'},roaster:{label:'roaster named',depth:2,why:'the bag was named'},lot:{label:'lot named',depth:3,why:'the lot was named'},farm:{label:'farm named',depth:4,why:'the farm was named'}};
const SEEN_FACTS={inhouse:{label:'roasts in-house',depth:3,why:'the roast in the room'},methods:{label:'more than one method',depth:3,why:'more than one method'},answers:{label:'answers at the counter',depth:2,why:'answers at the counter'},story:{label:'the story, freely told',depth:4,why:'the story, freely told'}};
const sightStanding=s=>!s.withdrawnAt&&!s.supersededAt;
const bySight=(a,b)=>(a.at||'').localeCompare(b.at||'')||String(a.id).localeCompare(String(b.id));
const fmtMY=iso=>iso?new Date(iso).toLocaleDateString([],{month:'short',year:'numeric'}):'';
const fmtMDY=iso=>iso?new Date(iso).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}):'';
// Compile the reading. The bag is one fact with four readings — newest carries;
// each counter fact stands while any standing sighting attests it (attest-only:
// silence is not denial — a shallow sighting at a deep café changes nothing).
function reachCompile(e,asOf){
  const st=((e&&e.sightings)||[]).filter(s=>asOf?(s.at<=asOf&&(!s.withdrawnAt||s.withdrawnAt>asOf)&&(!s.supersededAt||s.supersededAt>asOf)):sightStanding(s)).sort(bySight);
  const carry={};
  st.forEach(s=>{if(s.bag&&BAG_FACTS[s.bag])carry.bag=s;(s.seen||[]).forEach(k=>{if(SEEN_FACTS[k])carry[k]=s})});
  let depth=0;
  if(carry.bag)depth=BAG_FACTS[carry.bag.bag].depth;
  Object.keys(SEEN_FACTS).forEach(k=>{if(carry[k])depth=Math.max(depth,SEEN_FACTS[k].depth)});
  return {depth,carry,standing:st};
}
const sightCarries=(e,s)=>Object.values(reachCompile(e).carry).some(x=>x.id===s.id);
// the fact that carries the reading — the primer's why-line
function reachWhy(e){
  const r=reachCompile(e);if(!r.depth)return'';
  if(r.carry.bag&&BAG_FACTS[r.carry.bag.bag].depth===r.depth)return BAG_FACTS[r.carry.bag.bag].why;
  const k=Object.keys(SEEN_FACTS).find(k=>r.carry[k]&&SEEN_FACTS[k].depth===r.depth);
  return k?SEEN_FACTS[k].why:'';
}
// Replay the record to find when the reading last moved — {depth,since,was}.
function reachHistory(e){
  const ss=(e&&e.sightings)||[];
  const times=[...new Set(ss.flatMap(s=>[s.at,s.withdrawnAt,s.supersededAt]).filter(Boolean))].sort();
  let depth=0,since=null,was=0;
  times.forEach(t=>{const d=reachCompile(e,t).depth;if(d!==depth){was=depth;depth=d;since=t}});
  return {depth,since,was};
}
// The whisper: the bag turning twice inside ninety days. It clears when a
// reading holds the window out, or a second keeper attests the current value.
// Never on the badge — newest still carries throughout.
function reachContested(e){
  const bags=((e&&e.sightings)||[]).filter(s=>sightStanding(s)&&s.bag).sort(bySight);
  if(bags.length<3)return false;
  const cut=new Date(Date.now()-90*864e5).toISOString();
  let flips=0;
  for(let i=1;i<bags.length;i++)if(bags[i].bag!==bags[i-1].bag&&bags[i].at>=cut)flips++;
  if(flips<2)return false;
  const cur=bags[bags.length-1].bag;
  return new Set(bags.filter(s=>s.bag===cur).map(s=>s.by)).size<2;
}
// the earliest later standing sighting that re-read this line's facts
function reReadAt(e,s){
  const later=((e.sightings||[]).filter(x=>sightStanding(x)&&bySight(s,x)<0)).sort(bySight);
  const hit=later.find(x=>(s.bag&&x.bag)||((s.seen||[]).some(k=>(x.seen||[]).includes(k))));
  return (hit||later[0]||{}).at||null;
}
function sightLine(s){
  const parts=[];
  if(s.bag&&BAG_FACTS[s.bag])parts.push('The bag: '+BAG_FACTS[s.bag].label);
  (s.seen||[]).forEach(k=>{if(SEEN_FACTS[k]){const l=SEEN_FACTS[k].label;parts.push(l[0].toUpperCase()+l.slice(1))}});
  return parts.length?parts.join('. ')+'.':'—';
}
// Enter a sighting — facts only, signed and dated. {supersede} strikes the
// keeper's own earlier line (the amend path); a fresh sighting leaves old
// lines standing, merely no longer carrying.
function regSight(name,facts,who,opts){
  const e=regUpsert(name,{},who)||regByName(name);if(!e)return null;
  const now=new Date().toISOString();
  const s={id:uid(),by:who||'',at:now};
  if(facts.bag&&BAG_FACTS[facts.bag])s.bag=facts.bag;
  const seen=(facts.seen||[]).filter(k=>SEEN_FACTS[k]).sort();
  if(seen.length)s.seen=seen;
  if(!s.bag&&!s.seen)return null;
  if(opts&&opts.supersede){const old=(e.sightings||[]).find(x=>x.id===opts.supersede);if(old&&old.by===s.by&&sightStanding(old))old.supersededAt=now}
  (e.sightings=e.sightings||[]).push(s);
  e.updatedAt=now;if(who)e.by=who;REG.dirty=true;saveReg();schedulePush();
  return s;
}
// Withdrawing un-carries: the fact falls to the next line standing — to unread,
// if none does. No confirm — the strike is visible, signed, and reversible by
// simply sighting again. Nothing is lost.
function reachWithdraw(shop,sid){
  if(guard())return;
  const e=regByName(shop);const s=e&&(e.sightings||[]).find(x=>x.id===sid);
  if(!s||s.by!==activeName()||!sightStanding(s))return;
  s.withdrawnAt=new Date().toISOString();
  e.updatedAt=s.withdrawnAt;e.by=activeName();REG.dirty=true;saveReg();schedulePush();
  openReachRecord(shop);render();
}
/* --- the mark. The tweak (Preferences) restyles depth badges only — state

const reachMarkOf=d=>{const m=getPref('reachMark','gw'),x=REACH[d];return m==='w'?x.word:m==='g'?x.glyph:x.glyph+' '+x.word};

function openReachPrimer(shop){

    </div>`}).join('');

  <h3>How to read the reach</h3>

  ${rows}

/* --- the sighting chips — the same eight facts behind both doors. The bag is
 * one pick of four; the counter facts toggle. Held (dashed) marks what the
 * record already carries; tapping a different chip is the dispute. --- */
let sightBag=null,sightSeen=[],sightShop=null,sightHeld=false,amendFrom=null;
function sightChipsHTML(){
  const e=sightHeld&&sightShop?regByName(sightShop):null;

    return `<button class="${on?'on':hold?'held':''}" onclick="sightSeenPick('${k}')">${SEEN_FACTS[k].label}${hold?' · held':''}</button>`}).join('');

function paintSightChips(){

function sightBagPick(k){sightBag=(sightBag===k?null:k);paintSightChips()}
function sightSeenPick(k){const i=sightSeen.indexOf(k);if(i>=0)sightSeen.splice(i,1);else sightSeen.push(k);paintSightChips()}
// what the record will read once this sighting lands — the carries plus yours
function sightReadHTML(){
  const e=sightShop?regByName(sightShop):null;

  return `${d?`<span class="badge">${reachMarkOf(d)}</span>`:'<span class="badge dashed">unread</span>'} <span class="sans" style="font-size:11px;color:var(--ink-3)">${note}</span>`;

/* --- amend the reach — the deliberate door, from the café's page. Reading

function openReachAmend(shop,fromId){

  <button class="btn btn-quiet" onclick="closeSheet()">Cancel</button>`);

function enterSighting(shop){

/* --- the record of the reach — every sighting, signed and dated. Opens from

  ${rows||'<div class="empty">No one has read it yet. Yours would be the first line.</div>'}
  ${contested?'<div class="empty" style="padding:18px 20px;font-size:14px">The bag has turned twice this season. The newest carries, both readings stay in ink — perhaps the counter itself changes by the week.</div>':''}
  ${readOnly()?'':`<button class="btn btn-primary" onclick="openReachAmend(${jsq(shop)})">Say what you saw</button>`}

// your sightings, filed beside your cups in the Record — ghost weight, never a

const ROAST_LEVELS=['','Light','Light-medium','Medium','Medium-dark','Dark'];

const fmtTime=s=>s==null?'—':`${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;
// temperature: stored canonically in °C; display/entry unit is a preference
const c2f=c=>c*9/5+32, f2c=f=>(f-32)*5/9;
const tempUnit=()=>getPref('tempUnit','C')==='F'?'F':'C';
// parse "m:ss" or plain seconds into seconds
const parseTime=str=>{const s=String(str).trim();if(!s)return null;
  if(s.includes(':')){const[m,sec]=s.split(':');return Math.round((Number(m)||0)*60+(Number(sec)||0))}
  return Math.round(Number(s))};
const DESCRIPTORS=['floral','citrus','berry','stone fruit','tropical','chocolate','nutty','caramel','honey','spice','tea-like','fermented','roasted','vegetal'];
const INSTR=['measured','estimated','recalled'];
const CAFE_STYLES=['Espresso','Milk','Filter','Other'];
const CAFE_DRINKS={
  Espresso:['espresso','doppio','ristretto','macchiato','americano','cortado'],
  Milk:['cortado','flat white','cappuccino','latte','piccolo','mocha'],
  Filter:['pour over','batch brew','V60','Chemex','cold brew','Aeropress'],
  Other:['tea','matcha','affogato','hot chocolate','other'],
};
const cafeCups=()=>D.cups.filter(c=>c.kind==='cafe');
const modeOf=arr=>{if(!arr.length)return null;const m={};let best=null,bn=0;arr.forEach(v=>{m[v]=(m[v]||0)+1;if(m[v]>bn){bn=m[v];best=v}});return best};
const avgHedonic=cups=>{const h=cups.map(c=>c.hedonic).filter(v=>v!=null);return h.length?(h.reduce((a,b)=>a+b,0)/h.length).toFixed(1):null};
const money=n=>n==null?null:'$'+(n%1===0?String(n):n.toFixed(2));
const roasterList=()=>[...new Set([...D.bags.map(b=>b.roaster),...cafeCups().map(c=>c.roaster)].filter(Boolean))];
// escape a string for use inside a single-quoted JS call within a double-quoted HTML attribute
const jsq=s=>`'${String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;')}'`;
// café profiles — branding/location that belongs to the café, not one cup. Keyed by name.
// Reads resolve Register-first, so every user sees the same café; the per-user
// copy remains for export/sync back-compat and is what saveCafeProfile writes.
const normName=s=>String(s??'').trim().toLowerCase();
const ownCafeProfile=name=>(D.cafes||[]).find(c=>normName(c.name)===normName(name))||null;
const cafeProfile=name=>regByName(name)||ownCafeProfile(name);
function saveCafeProfile(name,rec){
  D.cafes=D.cafes||[];
  const ex=ownCafeProfile(name);
  if(ex){Object.assign(ex,rec,{updatedAt:new Date().toISOString()});return ex}
  const c={id:uid(),createdAt:new Date().toISOString(),name:String(name).trim(),...rec};
  D.cafes.push(c);return c;
}
// A café's branding — the colours its website declares (paletteFromColors) — yields one signature
// colour. From it we build a whole legible surface — paper, ink, lines, accent —
// tinted toward that hue: a mini design system, one per café. cafeColors respects the app's light/dusk
// mode so a café keeps its hue in either light.
const parseHSL=str=>{const m=/hsl\(\s*([\d.]+)\s*,\s*([\d.]+)%\s*,\s*([\d.]+)%/.exec(str||'');return m?[+m[1],+m[2],+m[3]]:null};
// Resolve a café record to a palette object. New records store one; older records only kept a
// single `accent` string — parse it back so their pages theme too.
function palOf(p){
  if(!p)return null;
  if(p.palette&&p.palette.h!=null)return p.palette;
  const hsl=parseHSL(p.accent);
  return hsl?{h:Math.round(hsl[0]),s:Math.round(hsl[1]),l:Math.round(hsl[2]),brand:p.accent,dark:hsl[2]<45}:null;
}
function cafeColors(pal){
  if(!pal||pal.h==null)return null;
  const h=pal.h,ts=Math.min(pal.s,44),A=pal.brand; // ts: surface tint saturation — kept restrained
  const dusk=document.documentElement.getAttribute('data-theme')==='dusk';
  return dusk?{
    paper:`hsl(${h},${Math.round(ts*.5)}%,9%)`,card:`hsl(${h},${Math.round(ts*.5)}%,13%)`,
    paper2:`hsl(${h},${Math.round(ts*.5)}%,17%)`,paper3:`hsl(${h},${Math.round(ts*.5)}%,22%)`,
    ink:`hsl(${h},14%,92%)`,ink2:`hsl(${h},12%,74%)`,ink3:`hsl(${h},10%,56%)`,inkd:`hsl(${h},8%,40%)`,
    line:`hsla(${h},20%,90%,.14)`,line2:`hsl(${h},10%,20%)`,lineStrong:`hsl(${h},14%,92%)`,
    accent:A,accentInk:`hsl(${h},${Math.round(ts*.5)}%,9%)`
  }:{
    paper:`hsl(${h},${Math.round(ts*.55)}%,95%)`,card:`hsl(${h},${Math.round(ts*.6)}%,97%)`,
    paper2:`hsl(${h},${Math.round(ts*.5)}%,90%)`,paper3:`hsl(${h},${Math.round(ts*.5)}%,84%)`,
    ink:`hsl(${h},26%,15%)`,ink2:`hsl(${h},18%,32%)`,ink3:`hsl(${h},14%,46%)`,inkd:`hsl(${h},10%,72%)`,
    line:`hsla(${h},28%,18%,.14)`,line2:`hsl(${h},14%,86%)`,lineStrong:`hsl(${h},26%,15%)`,
    accent:A,accentInk:'#fffaf1'
  };
}
function cafeVars(pal){const c=cafeColors(pal);return c?`--paper:${c.paper};--paper-card:${c.card};--paper-2:${c.paper2};--paper-3:${c.paper3};--ink:${c.ink};--ink-2:${c.ink2};--ink-3:${c.ink3};--ink-d:${c.inkd};--line:${c.line};--line-2:${c.line2};--line-strong:${c.lineStrong};--accent:${c.accent};--accent-ink:${c.accentInk}`:'';}
function paletteSwatches(pal){const c=cafeColors(pal);return c?[c.paper,c.card,c.accent,c.ink].map(col=>`<span style="background:${col}"></span>`).join(''):'';}
// home vs café: same coffee (roaster / origin), two contexts. An honest little comparison, not a claim.
function crossContext(key){
  const k={roaster:normName(key.roaster),origin:normName(key.origin||key.originCountry),variety:normName(key.variety)};
  const hit=(r,o,v)=>{const R=normName(r),O=normName(o),V=normName(v);
    return (k.roaster&&R===k.roaster)||(k.variety&&V===k.variety)||(k.origin&&O&&O===k.origin)};
  const cafe=cafeCups().filter(c=>hit(c.roaster,c.origin||c.originCountry,c.variety));
  const home=D.cups.filter(c=>c.kind==='home').filter(c=>{const b=bagById(c.bagId);return b&&hit(b.roaster,b.originCountry,b.variety)});
  return {home:{n:home.length,avg:avgHedonic(home)},cafe:{n:cafe.length,avg:avgHedonic(cafe)}};
}

/* ============ router ============ */
/* The rooms open a ladder at a time — Reading (Find), Remembering (Café),
 * Making (Home), Keeping (Record). depth() is how far this user has stepped in;
 * the tab bar shows only the open rooms, and each room's foot holds a door to
 * the next. Nothing is ever taken away — only added. */
const DEPTH_NAMES=['Reading','Remembering','Making','Keeping'];
function depth(){
  if(readOnly())return 4;                        // a record being read shows all its rooms
  const d=getPref('depth',null);
  if(d)return Math.min(4,Math.max(1,d));
  // ledgers from before the ladder — anyone with a record, or already welcomed — start fully open
  return (getPref('onboarded',false)||D.cups.length||D.bags.length||D.setups.length)?4:1;
}
function tabsFor(d){
  const t=[];
  if(d>=3)t.push({id:'field',label:'Home'});
  if(d>=2)t.push({id:'cafes',label:'Café'});
  t.push({id:'circle',label:'Find'});
  if(d>=4)t.push({id:'trace',label:'Record'});
  return t;
}
const defaultTab=d=>d>=3?'field':d>=2?'cafes':'circle';
function unlockDepth(n,t,msg){setPref('depth',n);placeView=null;go(t);toast(msg)}
const UNLOCK={2:['cafes','Café is open — your cups have somewhere to live.'],3:['field','Home is open — the cup you make.'],4:['trace','The Record is open — the whole through-line.']};
function doorHTML(title,body,cta,call){
  return `<div style="border-top:1px solid var(--ink);margin-top:28px;padding:16px 2px 6px">
    <div class="eyebrow">When you're ready</div>
    <div style="font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-0.01em;color:var(--ink)">${title}</div>
    <div class="muted small" style="margin:6px 0 12px;line-height:1.5">${body}</div>
    <button class="btn btn-quiet" onclick="${call}">${cta}</button>
  </div>`;
}
const seal=(name,em)=>`<div class="qm-seal">${esc(name)}<span class="em">${em}</span></div>`;
let tab='circle';
let placeView=null;   // a café name — the page currently open over the tab, or null
function openPlace(shop){placeView=shop;render()}
function closePlace(){placeView=null;render()}
function go(t){tab=t;placeView=null;if(t!=='circle'){reachLens=0;reachTail={}}render()}
function render(){
  _affCache=null; // affinity is recomputed once per paint, from the current record
  document.getElementById('who').textContent=
    readOnly()?`viewing ${viewingUser().name}`:(tab==='ledger'?'the rest of it':(USERS.users.length>1?viewingUser().name:'one cup · two contexts'));
  document.getElementById('tabs').innerHTML=tabsFor(depth()).map(t=>
    `<button class="${tab===t.id&&!placeView?'on':''}" onclick="go('${t.id}')">${t.label}</button>`).join('');
  const m=document.getElementById('main');
  m.innerHTML=(readOnly()?viewBanner():'')+(placeView?vPlace():({field:vField,cafes:vCafes,circle:vCircle,bags:vBags,setups:vSetups,trace:vTrace,ledger:vMore})[tab]());
  m.scrollTop=0;window.scrollTo(0,0);
}
function viewBanner(){return `<div class="viewbar"><span>Viewing <strong>${esc(viewingUser().name)}</strong>'s ledger — read only${remoteStale?` · cached ${fmtAgo(remoteStale===true?null:remoteStale)}`:''}</span><button onclick="exitView()">Back to mine</button></div>`}

/* ============ views ============ */
function cupRow(c,showKind){
  const b=bagById(c.bagId);
  const cafe=c.kind==='cafe';
  const what=cafe?`${esc(c.shop||'café')}${c.drink?` · ${esc(c.drink)}`:''}`:esc(bagName(b));
  const brew=c.brewId?D.brews.find(x=>x.id===c.brewId):null;
  const beans=[c.roaster,c.origin].filter(Boolean).map(esc).join(' · ');
  const meta=brew
    ?`<span class="num">${brew.grind??'—'} grind · ${brew.doseG??'—'}g → ${brew.waterG??'—'}g · ${fmtTime(brew.timeSec)}</span>`
    :cafe
      ?`${c.city?esc(c.city)+(beans?' · ':''):''}${beans||(c.city?'':`<span class="chip">${c.instrumentation||'recalled'}</span>`)}`
      :`<span class="chip">${c.instrumentation||'recalled'}</span>`;
  const verdict=(c.again===true?' <span class="badge">again</span>':c.again===false?' <span class="badge ghost">pass</span>':'')
    +(showKind?` <span class="badge ghost">${cafe?'café':'home'}</span>`:'');
  const pal=cafe?palOf(c):null,vars=pal?cafeVars(pal):''; // a café cup wears the beans' brand, if one was read
  return `<div class="card tap"${vars?` style="${vars};border-left:3px solid var(--accent)"`:''} onclick="openCupDetail('${c.id}')">

function traceCard(b){
  const brews=brewsOf(b.id).slice().reverse(); // chronological
  const n=brews.length;
  const hed=brews.map(x=>{const c=D.cups.find(c=>c.brewId===x.id);return c?c.hedonic:null});
  const grinds=brews.map(x=>x.grind).filter(v=>v!=null);
  const gmin=Math.min(...grinds),gmax=Math.max(...grinds);
  const W=480,H=150,P=28;
  const X=i=>n===1?W/2:P+i*(W-2*P)/(n-1);
  const GY=v=>gmax===gmin?H/2:H-P-((v-gmin)/(gmax-gmin))*(H-2*P);
  const HY=v=>H-P-((v-1)/8)*(H-2*P);
  let path='',pts='',hpts='';
  brews.forEach((x,i)=>{ if(x.grind!=null){ path+=(path?'L':'M')+X(i).toFixed(1)+' '+GY(x.grind).toFixed(1)+' ';
    pts+=`<circle cx="${X(i).toFixed(1)}" cy="${GY(x.grind).toFixed(1)}" r="3.5" fill="var(--accent)"/>`;}
    if(hed[i]!=null) hpts+=`<circle cx="${X(i).toFixed(1)}" cy="${HY(hed[i]).toFixed(1)}" r="3" fill="none" stroke="var(--ink-2)" stroke-width="1.5"/>`;
  });
  return `<div class="card">
    <div class="row"><strong>${esc(bagName(b))}</strong><span class="n-note">n=${n}</span></div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%">
      <line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}" stroke="var(--line)"/>
      ${grinds.length?`<text x="${P}" y="14" font-size="10" fill="var(--ink-3)">grind ${gmin}–${gmax}</text>`:''}
      <text x="${W-P}" y="14" font-size="10" fill="var(--ink-3)" text-anchor="end">○ hedonic 1–9</text>
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5"/>${pts}${hpts}
    </svg>
    <div class="n-note">solid — grind setting · hollow — hedonic. Comparable only within one Setup; every point carries its instrumentation.</div>
  </div>`;
}

function openSheet(html){const s=document.getElementById('sheet');
  s.innerHTML='<div class="grab" aria-hidden="true"></div>'+html;
  s.classList.remove('dragging');s.style.transform='';document.getElementById('sheetbg').style.opacity='';

  s.scrollTop=0;}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sheetbg').classList.remove('open');stopTimer(false)}

/* ============ sheet drag-to-dismiss ============ *
 * The grab handle (and the sheet body when scrolled to the top) can be pulled
 * down to dismiss. Follow the finger; on release, snap closed if dragged far
 * enough or flicked quickly, otherwise snap back. Tapping the backdrop still
 * works too — this just makes the handle behave like a real handle.          */
(function initSheetDrag(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetbg');
  let startY=0,dy=0,active=false,dragging=false,startT=0;
  const yOf=e=>e.touches?e.touches[0].clientY:e.clientY;
  const onGrab=e=>!!(e.target.closest&&e.target.closest('.grab'));

  function down(e){
    if(!sheet.classList.contains('open'))return;
    // Only begin a dismiss-drag from the handle, or from the body when the
    // sheet is already scrolled to the top — otherwise let content scroll.
    if(!onGrab(e)&&sheet.scrollTop>0)return;
    active=true;dragging=false;dy=0;startY=yOf(e);startT=Date.now();
  }
  function move(e){
    if(!active)return;
    dy=yOf(e)-startY;
    if(dy<=0){ // pulling up: hand control back to native scroll
      if(dragging){sheet.classList.remove('dragging');sheet.style.transform='';bg.style.opacity='';}
      dragging=false;dy=0;return;
    }
    dragging=true;
    sheet.classList.add('dragging');
    if(e.cancelable)e.preventDefault(); // suppress native scroll while pulling down
    sheet.style.transform=`translateX(-50%) translateY(${dy}px)`;
    bg.style.opacity=String(Math.max(0,1-dy/(sheet.offsetHeight||600)));
  }
  function up(){
    if(!active)return;
    active=false;
    const h=sheet.offsetHeight||600;
    const velocity=dy/Math.max(1,Date.now()-startT); // px per ms
    sheet.classList.remove('dragging'); // restore the snap transition
    if(dragging&&(dy>h*0.28||velocity>0.55)){
      sheet.style.transform='translateX(-50%) translateY(100%)';
      bg.style.opacity='';
      setTimeout(()=>{closeSheet();sheet.style.transform='';bg.style.opacity='';},300);
    }else{
      sheet.style.transform='';
      bg.style.opacity='';
    }
    dragging=false;dy=0;
  }

  sheet.addEventListener('touchstart',down,{passive:true});
  sheet.addEventListener('touchmove',move,{passive:false});
  sheet.addEventListener('touchend',up);
  sheet.addEventListener('touchcancel',up);
  sheet.addEventListener('mousedown',down);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
})();

const val=id=>{const e=document.getElementById(id);return e?e.value.trim():''};
const numv=id=>{const v=val(id);return v===''?null:Number(v)};

/* ============ dial component ============
 * A stepper you can drive three ways, so a wide range is never a wall of taps:
 *   · tap − / +           one step (fine)
 *   · press-and-hold      auto-repeats and accelerates — fly across 0–2000
 *   · tap the number      type an exact value (numeric keypad; m:ss for time)
 * opts: {kind:'time'} m:ss entry · {hint} scale caption top-right ·
 *       {corner} a control pinned top-right (the °C/°F toggle). */
const dialState={};
let editingDial=null,holdInt=null,holdTO=null;
function dial(id,label,unit,value,step,min,max,dp,opts){
  opts=opts||{};
  dialState[id]={v:value,step,min,max,dp:dp??(String(step).includes('.')?1:0),unit,kind:opts.kind||null};
  const corner=opts.corner?`<div class="dcorner">${opts.corner}</div>`:(opts.hint?`<div class="ticks">${opts.hint}</div>`:'');
  return `<div class="dial">${corner}<div class="l">${label}</div>
    <div class="v num tapedit" id="dv_${id}" onclick="editDial('${id}')">${fmtDial(id)}<span class="u">${unit}</span></div>
    <div class="ctl">
      <button type="button" onpointerdown="holdStart(event,'${id}',-1)">−</button>
      <button type="button" onpointerdown="holdStart(event,'${id}',1)">+</button>
    </div></div>`;
}
function fmtDial(id){const s=dialState[id];if(s.v==null)return '—';
  if(s.kind==='time')return fmtTime(s.v);
  return s.v.toFixed(s.dp).replace(/\.0+$/,'');}   // trim trailing zeros — whole numbers read clean
function unitSpan(id){return `<span class="u">${dialState[id].unit}</span>`}
function redrawDial(id){const el=document.getElementById('dv_'+id);if(el)el.innerHTML=fmtDial(id)+unitSpan(id)}
function setDial(id,v){const s=dialState[id];
  if(v==null||isNaN(v)){redrawDial(id);return}
  if(s.min!=null)v=Math.max(s.min,v); if(s.max!=null)v=Math.min(s.max,v);
  s.v=Number(v.toFixed(s.dp)); redrawDial(id);}
function nudge(id,dir,mult){const s=dialState[id];
  setDial(id,(s.v==null?(s.min??0):s.v)+dir*s.step*(mult||1));
  if(navigator.vibrate)navigator.vibrate(3);}
function holdStop(){if(holdTO){clearTimeout(holdTO);holdTO=null}if(holdInt){clearInterval(holdInt);holdInt=null}
  window.removeEventListener('pointerup',holdStop);window.removeEventListener('pointercancel',holdStop);}
function holdStart(e,id,dir){
  e.preventDefault();
  if(editingDial){const de=document.getElementById('de_'+editingDial);if(de)de.blur();}
  holdStop();
  nudge(id,dir);                                   // the tap itself is one step
  let n=0;
  holdTO=setTimeout(()=>{ holdInt=setInterval(()=>{ n++;
    const mult=n<10?1:n<20?4:n<35?10:25;           // ramp up the longer it's held
    nudge(id,dir,mult); },60); },320);             // brief pause first, so a tap stays a tap
  window.addEventListener('pointerup',holdStop);
  window.addEventListener('pointercancel',holdStop);
}
function editDial(id){
  if(editingDial===id)return;
  const s=dialState[id],el=document.getElementById('dv_'+id);
  editingDial=id;
  const cur=s.v==null?'':(s.kind==='time'?fmtTime(s.v):fmtDial(id));
  el.innerHTML=`<input class="dedit" id="de_${id}" inputmode="${s.kind==='time'?'text':'decimal'}" value="${cur}">`+unitSpan(id);
  const inp=document.getElementById('de_'+id); inp.focus(); inp.select();
  const commit=()=>{if(editingDial!==id)return; editingDial=null;
    const raw=inp.value;
    const v=s.kind==='time'?parseTime(raw):(raw.trim()===''?NaN:Number(raw));
    setDial(id,v);};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'){ev.preventDefault();inp.blur();}
    else if(ev.key==='Escape'){editingDial=null;redrawDial(id);}});
}
// grind dial reads its scale from the Setup — the assembly that owns the grinder.
// Blank Setup fields fall back to the original 0.5-step behavior.
function grindDialHTML(setup,value){
  const st=setup||{};
  const num=(x,d)=>x!=null&&x!==''&&!isNaN(Number(x))?Number(x):d;
  const step=num(st.grindStep,0.5)||0.5, min=num(st.grindMin,0), max=num(st.grindMax,null);
  const dp=String(step).includes('.')?1:0;

/* ============ brand colour ============ */
// A brand's signature palette, read from a website (café, roaster or the beans a café poured). Held
// across the open sheet while a lookup fills it. No photograph is ever captured or stored — a brand is
// its colours and its words, kept small, offline and portable.
let brandAccent=null,brandPalette=null;
function rgb2hsl(r,g,b){
  r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0;if(d){if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;if(h<0)h+=360}
  const l=(mx+mn)/2,sa=d?d/(1-Math.abs(2*l-1)):0;
  return [h,sa*100,l*100];
}
// A hex string ('#rgb' or '#rrggbb') to [r,g,b], or null. The website read speaks in hex.
const hex2rgb=h=>{h=String(h||'').trim().replace(/^#/,'');if(h.length===3)h=h.replace(/(.)/g,'$1$1');
  return /^[0-9a-fA-F]{6}$/.test(h)?[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]:null};
// Read a brand's signature colour from the colours its website declares (logo ink, background, the
// palette around them): most chromatic wins, a colour outvoting the greys, held inside a legible band
// so the surface always reads. That one colour seeds a whole themed surface (see cafeColors) — a mini
// design system from a website, worn by a café, a bag, or a café cup's beans.
function paletteFromColors(list){
  let best=null,bw=-1;
  (list||[]).forEach(c=>{const p=hex2rgb(c);if(!p)return;const w=Math.pow(Math.max(...p)-Math.min(...p),2);if(w>bw){bw=w;best=p}});
  if(!best)return null;
  const dark=(.299*best[0]+.587*best[1]+.114*best[2])<118;
  if(bw<300){const L=dark?60:38;return{h:28,s:8,l:L,brand:`hsl(28,8%,${L}%)`,dark,mono:true}} // no colour to read — an honest neutral
  const[h,sa,l]=rgb2hsl(best[0],best[1],best[2]),H=Math.round(h);
  const S=Math.round(Math.min(80,Math.max(42,sa))),L=Math.round(Math.min(58,Math.max(38,l)));
  return {h:H,s:S,l:L,brand:`hsl(${H},${S}%,${L}%)`,dark};
}

// visible before it's saved. Shared by cafés, bags and café-cup beans — `brandCtx` names the surface
// so the sample reads right for each. A no-op anywhere the preview slot isn't on screen.
let brandCtx={kicker:'A cup here',title:'Every cup, in these colours',cta:'Log a cup here'};

function saveBrew(editId){

function saveCup(kind,brewId,bagId,skip,editId){
  if(guard())return;
  if(!skip&&hedState==null&&kind==='home'){toast('One tap — or skip, that\'s honest too');return}
  const ex=editId?cupById(editId):null; // edit path: keep the cup's id, place and hour; revise the rest
  const brew=brewId?D.brews.find(x=>x.id===brewId):(ex&&ex.brewId?D.brews.find(x=>x.id===ex.brewId):null);
  const fields={kind,brewId:brewId||(ex?ex.brewId:null)||null,bagId:bagId||(ex?ex.bagId:null)||null,
    shop:kind==='cafe'?val('c_shop'):null,drink:kind==='cafe'?val('c_drink'):null,
    hedonic:skip?null:hedState,descriptors:skip?[]:[...descState],notes:skip?'':val('c_notes'),
    instrumentation:kind==='cafe'?'recalled':(brew?brew.instrumentation:'measured'),blind:false,runId:null};
  if(kind==='cafe'){
    fields.city=val('c_city');fields.style=cafeStyleState;fields.roaster=val('c_roaster');
    fields.origin=val('c_origin');fields.price=numv('c_price');fields.again=againState;
    fields.site=(val('c_beansite')||'').trim();fields.palette=brandPalette; // the beans' brand, read from the roaster's site
    // structured traceability, aligned to the bag schema — the café's aspiration toward the exact coffee
    fields.originCountry=val('c_country');fields.originRegion=val('c_region');fields.producer=val('c_producer');
    fields.variety=val('c_variety');fields.lot=val('c_lot');fields.process=val('c_process');
    if(fields.shop)regUpsert(fields.shop,{city:fields.city},activeName()); // a sighting — the café enters the Register
    if(fields.shop&&!ex&&(sightBag||sightSeen.length)){regSight(fields.shop,{bag:sightBag,seen:sightSeen},activeName())} // what the counter showed — one save, no second submit
    sightBag=null;sightSeen=[];
    if(fields.shop&&D.cafeWants){const i=D.cafeWants.findIndex(x=>normName(x)===normName(fields.shop));if(i>=0)D.cafeWants.splice(i,1)} // been now — off the want list
  }
  const firstOut=kind==='cafe'&&!ex&&!cafeCups().length;
  const firstHome=kind==='home'&&!ex&&!skip&&!D.cups.some(c=>c.kind==='home'&&c.hedonic!=null);
  if(ex){Object.assign(ex,fields,{updatedAt:new Date().toISOString()})}
  else{D.cups.push({id:uid(),createdAt:new Date().toISOString(),...fields})}
  editingCupId=null;
  save();closeSheet();
  if(kind==='cafe'){go('cafes');toast(ex?'Cup updated':(firstOut?'Kept — your first cup out.':'Kept.'));}
  else{go('field');toast(ex?'Cup updated':(skip?'The brew is on the record.':firstHome?'Kept — your first cup at home. The next brew starts here.':'Kept — the next brew starts here.'));}
}

async function beansLookup(){
  const u=val('c_beansite'),box=document.getElementById('beansiteresults');
  if(!u.trim()){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Type the roaster’s website first — then read it.</div>';return}
  if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Reading the beans…</div>';
  try{
    const b=await readBrand(u);if(!box)return;if(!b)throw 0;
    if(b.pal){brandPalette=b.pal;brandAccent=b.pal.brand;paintBrandPreview()}
    const rEl=document.getElementById('c_roaster'); // the name it states fills the beans, if blank
    if(b.name&&rEl&&!rEl.value.trim())rEl.value=b.name;
    const nEl=document.getElementById('c_notes');   // the description fills the line, if blank
    if(b.line&&nEl&&!nEl.value.trim())nEl.value=b.line;
    if(!b.pal&&!b.name&&!b.line){box.innerHTML='<div class="muted small" style="padding:6px 2px">Couldn’t read that site. Fill it in by hand — it still saves.</div>';return}
    const got=[b.pal?'its colours':null,b.line?'a line':null].filter(Boolean).join(', ');
    box.innerHTML=brandReadLine(b,got);
  }catch(e){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Offline, or the site wouldn’t answer. Fill it in by hand — it still saves.</div>'}
}

  const nbhood=(p&&p.neighborhood)||'';
  const avg=avgHedonic(mine),usual=modeOf(mine.map(c=>c.drink).filter(Boolean));

  const theirAvg=avgHedonic(others);

  const fav=isCafeFav(shop);

// Comma-separated free text → a clean list: trimmed, deduped case-insensitively, order kept.
function parseTags(s){
  const seen=new Set(),out=[];
  String(s||'').split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>{const k=t.toLowerCase();if(!seen.has(k)){seen.add(k);out.push(t)}});
  return out;
}

// Online geocode (OpenStreetMap Nominatim — no key). Progressive enhancement: type wins offline.
// The query prefers a typed address, else falls back to the café's own name + city — so a lookup
// needs no typing at all: the shop the record already knows becomes the search.
let geoPick={address:'',lat:null,lon:null};
// The neighbourhood a geocode names for a pin — Nominatim's own hierarchy, most specific first.
function nbhoodOf(addr){
  addr=addr||{};
  return addr.neighbourhood||addr.suburb||addr.quarter||addr.city_district||addr.hamlet||addr.borough||'';
}
async function geoLookup(shop){
  const q=val('p_address')||[shop,val('p_city')].filter(Boolean).join(', ');
  const box=document.getElementById('georesults');
  if(!q){if(box)box.innerHTML='';return}
  if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Searching the map…</div>';
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q='+encodeURIComponent(q),{headers:{'Accept':'application/json'}});
    const list=await r.json();
    if(!box)return;
    if(!list||!list.length){box.innerHTML='<div class="muted small" style="padding:6px 2px">Nothing found for that. Type the address by hand — it still saves.</div>';return}
    box.innerHTML=`<div class="muted small" style="padding:6px 2px 2px">Tap the right one:</div>`+list.map(o=>`<div class="card tap georow" onclick="geoChoose(${jsq(o.display_name)},${jsq(String(o.lat))},${jsq(String(o.lon))},${jsq(nbhoodOf(o.address))})"><div class="small">${esc(o.display_name)}</div></div>`).join('');
  }catch(e){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Offline — type the address; it saves without the pin.</div>'}
}
function geoChoose(address,lat,lon,neighborhood){
  geoPick={address,lat:Number(lat),lon:Number(lon)};
  const inp=document.getElementById('p_address');if(inp)inp.value=address;
  const nInp=document.getElementById('p_neighborhood');if(nInp&&neighborhood&&!nInp.value.trim())nInp.value=neighborhood; // fills blank only — typed wins
  const box=document.getElementById('georesults');if(box)box.innerHTML=`<div class="pinned">Pinned · ${Number(lat).toFixed(4)}, ${Number(lon).toFixed(4)} <a class="link" onclick="geoUnpin()">remove</a></div>`;
}
function geoUnpin(){geoPick={address:val('p_address'),lat:null,lon:null};const box=document.getElementById('georesults');if(box)box.innerHTML='';}
// The name a site states for itself, cleaned of the boilerplate page titles carry ('Home', a tagline,
// the domain). What survives the split is usually the café's own name — surfaced so you can see the
// site agrees with the shop you named.
function siteName(title){
  const parts=String(title||'').split(/\s+[|·—–]\s+|\s+-\s+/).map(s=>s.trim()).filter(Boolean);
  return parts.filter(s=>!/^(home|welcome|official(\s+site)?|coffee|caf[eé]|menu|about)$/i.test(s))[0]||parts[0]||'';
}
// One line to the ledger: a meta description, collapsed and clipped to a single legible line at a word
// boundary — never a fabricated sentence, only what the site already wrote about itself.
function siteLine(desc){
  const t=String(desc||'').replace(/\s+/g,' ').trim();
  return t.length>150?t.slice(0,147).replace(/[\s.,;:–—-]+\S*$/,'')+'…':t;
}
// One website read, shared by cafés, bags and café cups. Microlink (no key, CORS-open) reads the page;
// we take its colours (paletteFromColors, the chroma-wins signature), the name it states, and the line
// it wrote about itself — never the hotlinked image. A brand is its palette and its words: small,
// offline, portable, self-contained. Returns null offline or on a silent site; the caller falls back to
// hand entry. `host`/`logo` are for a live confirmation only, never saved.
function normSite(u){u=(u||'').trim();if(!u)return'';return /^https?:\/\//i.test(u)?u:'https://'+u}
async function readBrand(url){
  const u=normSite(url);if(!u)return null;
  let host=u;try{host=new URL(u).hostname.replace(/^www\./,'')}catch(e){}
  const r=await fetch('https://api.microlink.io/?palette&url='+encodeURIComponent(u));
  const j=await r.json();
  const d=(j&&j.data)||{},lg=d.logo||{},im=d.image||{};
  const cols=[lg.color,lg.background,...(lg.palette||[]),im.color,im.background,...(im.palette||[])].filter(Boolean);
  return {pal:paletteFromColors(cols),name:siteName(d.title),line:siteLine(d.description),logo:lg.url||'',host};
}
// A one-line read confirmation, shared by every brand lookup. `got` names what came back.
function brandReadLine(b,got){
  return `${b.logo?`<img src="${esc(b.logo)}" alt="" style="height:30px;width:auto;max-width:120px;border-radius:6px;vertical-align:middle;margin-right:8px">`:''}<span class="muted small">Read ${esc(b.host)}${b.name?` — ${esc(b.name)}`:''}${got?` — ${got}`:''}. Save to keep it.</span>`;
}
// Online café read: pull as much of a café as its website will give in one tap — its colours, the name
// it states, the line it writes — then chain the map so the address surfaces too. Fills blanks only,
// never overwriting what you typed. Progressive: offline or a silent site, and you fill it in by hand.
async function siteLookup(shop){
  const u=val('p_site'),box=document.getElementById('siteresults');
  if(!u.trim()){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Type the café’s website first — then read it.</div>';return}
  if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Reading the café…</div>';
  try{
    const b=await readBrand(u);if(!box)return;if(!b)throw 0;
    if(b.pal){brandPalette=b.pal;brandAccent=b.pal.brand;paintBrandPreview()}
    const noteEl=document.getElementById('p_notes'); // the description fills the line, if you left it blank
    if(b.line&&noteEl&&!noteEl.value.trim())noteEl.value=b.line;
    const ranGeo=!val('p_address'); if(ranGeo)geoLookup(shop); // the address, from the name, without a second tap
    if(!b.pal&&!b.name&&!b.line){box.innerHTML='<div class="muted small" style="padding:6px 2px">Couldn’t read that site. Fill it in by hand — it still saves.</div>';return}
    const got=[b.pal?'its colours':null,b.line?'a line':null,ranGeo?'the map below':null].filter(Boolean).join(', ');
    box.innerHTML=brandReadLine(b,got);
  }catch(e){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Offline, or the site wouldn’t answer. Fill it in by hand — it still saves.</div>'}
}

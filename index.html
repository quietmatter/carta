const lastSeenVersion=()=>{try{return localStorage.getItem(SEEN_KEY)}catch(e){return null}};
const markVersionSeen=()=>{try{localStorage.setItem(SEEN_KEY,APP_VERSION)}catch(e){}};

/* ============ router ============ */
/* The rooms open a ladder at a time — Reading (Find), Remembering (Café),
 * Making (Home), Keeping (Record). depth() is how far this user has stepped in;
 * the tab bar shows only the open rooms, and each room's foot holds a door to
 * the next. Nothing is ever taken away — only added. */
const DEPTH_NAMES=['Reading','Remembering','Making','Keeping'];
function depth(){
  if(readOnly())return 4;                        // a record being read shows all its rooms
  const d=getPref('depth',null);
  if(d)return Math.min(4,Math.max(1,d));
  // ledgers from before the ladder — anyone with a record, or already welcomed — start fully open
  return (getPref('onboarded',false)||D.cups.length||D.bags.length||D.setups.length)?4:1;
}
function tabsFor(d){
  const t=[{id:'today',label:'Today'}];   // the day's surface — open at every depth
  if(d>=3)t.push({id:'field',label:'Home'});
  if(d>=2)t.push({id:'cafes',label:'Café'});
  t.push({id:'circle',label:'Find'});
  if(d>=4)t.push({id:'trace',label:'Record'});
  return t;
}
const defaultTab=d=>'today';
function unlockDepth(n,t,msg){setPref('depth',n);placeView=null;go(t);toast(msg)}
const UNLOCK={2:['cafes','Café is open — your cups have somewhere to live.'],3:['field','Home is open — the cup you make.'],4:['trace','The Record is open — the whole through-line.']};
function doorHTML(title,body,cta,call){
  return `<div style="border-top:1px solid var(--ink);margin-top:28px;padding:16px 2px 6px">
    <div class="eyebrow">When you're ready</div>
    <div style="font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-0.01em;color:var(--ink)">${title}</div>
    <div class="muted small" style="margin:6px 0 12px;line-height:1.5">${body}</div>
    <button class="btn btn-quiet" onclick="${call}">${cta}</button>
  </div>`;
}
const seal=(name,em)=>`<div class="qm-seal">${esc(name)}<span class="em">${em}</span></div>`;
let tab='circle';
let placeView=null;   // a café name — the page currently open over the tab, or null
function openPlace(shop){placeView=shop;render()}
function closePlace(){placeView=null;render();if(discOn)discScrollTo(discSel,true)}
function go(t){tab=t;placeView=null;discOn=false;discMatch=null;clearTimeout(_mt);if(t!=='circle'){reachLens=0;reachTail={}}render()}
function render(){
  _affCache=null; // affinity is recomputed once per paint, from the current record
  _mCache=null;   // so is the matching — signal, circle, candidates
  smapDestroy();  // live maps die with the DOM they sit in — give the contexts back first
  document.getElementById('who').textContent=
    readOnly()?`viewing ${viewingUser().name}`:(tab==='ledger'?'the rest of it':(USERS.users.length>1?viewingUser().name:'one cup · two contexts'));
  document.getElementById('tabs').innerHTML=tabsFor(depth()).map(t=>
    `<button class="${tab===t.id&&!placeView?'on':''}" onclick="go('${t.id}')">${t.label}</button>`).join('');
  const m=document.getElementById('main');
  m.innerHTML=(readOnly()?viewBanner():'')+(placeView?vPlace():discOn?vDiscover():({today:vToday,field:vField,cafes:vCafes,circle:vCircle,bags:vBags,setups:vSetups,trace:vTrace,ledger:vMore})[tab]());
  m.scrollTop=0;window.scrollTo(0,0);
  smapMount();
}
function viewBanner(){return `<div class="viewbar"><span>Viewing <strong>${esc(viewingUser().name)}</strong>'s ledger — read only${remoteStale?` · cached ${fmtAgo(remoteStale===true?null:remoteStale)}`:''}</span><button onclick="exitView()">Back to mine</button></div>`}

/* ============ views ============ */
function cupRow(c,showKind){
  const b=bagById(c.bagId);
  const cafe=c.kind==='cafe';
  const what=cafe?`${esc(c.shop||'café')}${c.drink?` · ${esc(c.drink)}`:''}`:esc(bagName(b));
  const brew=c.brewId?D.brews.find(x=>x.id===c.brewId):null;
  const beans=[cupRoaster(c),c.origin].filter(Boolean).map(esc).join(' · ');
  const meta=brew
    ?`<span class="num">${brew.grind??'—'} grind · ${brew.doseG??'—'}g → ${brew.waterG??'—'}g · ${fmtTime(brew.timeSec)}</span>`
    :cafe
      ?`${c.city?esc(c.city)+(beans?' · ':''):''}${beans||(c.city?'':`<span class="chip">${c.instrumentation||'recalled'}</span>`)}`
      :`<span class="chip">${c.instrumentation||'recalled'}</span>`;
  const verdict=(c.again===true?' <span class="badge">again</span>':c.again===false?' <span class="badge ghost">pass</span>':'')
    +(showKind?` <span class="badge ghost">${cafe?'café':'home'}</span>`:'');
  const pal=cafe?palOf(c):null,vars=pal?cafeVars(pal):''; // a café cup wears the beans' brand, if one was read
  return `<div class="card tap"${vars?` style="${vars};border-left:3px solid var(--accent)"`:''} onclick="openCupDetail('${c.id}')">
    <div class="row"><span class="small"><strong>${what}</strong>${verdict}</span>
      <span class="num" style="font-size:20px;font-weight:700;color:var(--accent)">${c.hedonic??'—'}</span></div>
    <div class="muted small">${meta}${cafe&&c.price!=null?`<span class="num" style="float:right">${money(c.price)}</span>`:''}</div>
    ${c.descriptors&&c.descriptors.length?`<div class="muted small serif" style="font-style:italic">${c.descriptors.map(esc).join(', ')}</div>`:''}
    <div class="muted" style="font-size:11px">${new Date(c.createdAt).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>
  </div>`;
}
// The spine, read at last — the first surface to lean on a ref instead of the
// flat text beside it. A record's lotRef points at its node in the atlas; other
// records that resolved to the SAME node are the same green wherever it landed —
// a bag you brewed and a cup you had out can be one lot, a tie the flat origin
// words can state but never connect. Still grounded in those words (the label is
// built from them; a record with no lotRef simply shows nothing here), so reading
// through the ref earns only what the atlas alone can say and stays reversible.
// Records that resolved to the same node as `rec` on ref `k`, bag and café cup
// alike. Grounded in flat text throughout — the labels are the flat names, no
// ref no kin — so this only ever reads what a resolved id can say that loose
// words can't: the CONNECTION between two records the spine collapsed to one.
function refKin(rec,k,skip){
  const ref=rec&&rec[k]; if(!ref)return [];
  const seen=new Set(skip||[]),out=[];
  (D.bags||[]).forEach(b=>{if(b&&b.id!==rec.id&&b[k]===ref&&!seen.has(b.id))out.push({t:'bag',id:b.id,label:bagName(b)})});
  (D.cups||[]).forEach(c=>{if(c&&c.kind==='cafe'&&c.id!==rec.id&&c[k]===ref&&!seen.has(c.id))out.push({t:'cup',id:c.id,label:[c.shop,c.drink].filter(Boolean).join(' · ')||'a café cup'})});
  return out;
}
const lotKin=rec=>refKin(rec,'lotRef');
// The second surface to lean on a ref. Lot first — the deepest tie the atlas
// draws (one green, two records the origin words could never link). Roaster
// second, and only for records the lot line didn't already claim: the roaster
// node collapses spelling variants a keeper couldn't reliably match by eye, and
// ties a bag brewed home to a cup had out under one roaster. Both stay a reading
// OVER what's logged — absent with no ref, no match — so it's reversible still.
function kinLine(label,kin){
  const links=kin.map(k=>`<a class="link" onclick="${k.t==='bag'?'openBagDetail':'openCupDetail'}(${jsq(k.id)})">${esc(k.label)}</a>`).join(', ');
  return `<div class="muted small" style="margin:-4px 0 12px">${label} ${links}.</div>`;
}
function kinHTML(rec){
  const lot=lotKin(rec);
  const roaster=refKin(rec,'roasterRef',lot.map(k=>k.id));
  let out='';
  if(lot.length)out+=kinLine('Same lot, elsewhere in your journal:',lot);
  if(roaster.length){const n=rec.roasterRef&&catNode('roasters',rec.roasterRef),rn=(n&&n.name)||rec.roaster;out+=kinLine(`More from ${rn?esc(rn):'this roaster'}, elsewhere:`,roaster);}
  return out;
}
// The read-through, aggregated — the same refs the detail sheets lean on, now folded
// over the WHOLE journal on one ref. Every bag and café cup gathers under the node it
// resolved to, so variants the flat words couldn't reliably tie collapse into one row
// and a bag brewed home sits beside a cup had out. A reading over the refs, not a
// store: no ref, no row (grounded in what's logged, absent when nothing resolved), so
// like the detail lines it stays reversible. `key` is the ref field on the records;
// `name` labels a resolved node id for the surface. Roaster folds on one token, so
// every roaster shows; a lot forks unless two-plus origin tokens agree, so its rows
// are the rarer, deeper ties — the same green in more than one record.
function refIndex(key,name){
  const g=new Map();
  const add=(ref,rec,t)=>{if(!ref)return;let e=g.get(ref);if(!e){e={ref,name:name(ref),bags:0,cups:0,recs:[]};g.set(ref,e)}e[t==='bag'?'bags':'cups']++;e.recs.push({t,id:rec.id})};
  (D.bags||[]).forEach(b=>{if(b)add(b[key],b,'bag')});
  (D.cups||[]).forEach(c=>{if(c&&c.kind==='cafe')add(c[key],c,'cup')});
  return [...g.values()].sort((a,b)=>(b.bags+b.cups)-(a.bags+a.cups)||a.name.localeCompare(b.name));
}
const roasterName=ref=>{const n=catNode('roasters',ref);return (n&&n.name)||'a roaster'};
// A lot has no single name — build one from the origin words it collapsed: who (the
// producer, or the lot name), where (region, country), and the variety, terse.
const lotLabel=n=>{if(!n)return 'a lot';const place=[n.region,n.country].filter(Boolean).join(', ');const parts=[n.producer||n.lotName,place,n.variety].filter(Boolean);return parts.length?parts.join(' · '):'a lot'};
const roasterIndex=()=>refIndex('roasterRef',roasterName);
const lotIndex=()=>refIndex('lotRef',ref=>lotLabel(catNode('lots',ref)));
const kinTally=r=>[r.bags&&`${r.bags} ${r.bags===1?'bag':'bags'}`,r.cups&&`${r.cups} ${r.cups===1?'cup out':'cups out'}`].filter(Boolean).join(' · ');
const kinRow=m=>{const rec=m.t==='bag'?bagById(m.id):cupById(m.id);if(!rec)return'';
  const label=m.t==='bag'?bagName(rec):([rec.shop,rec.drink].filter(Boolean).join(' · ')||'a café cup');
  return `<button class="wc-item" onclick="${m.t==='bag'?'openBagDetail':'openCupDetail'}(${jsq(m.id)})"><span class="tx"><span class="tt">${esc(label)}</span><span class="dd">${m.t==='bag'?'on your shelf':'a cup out'}</span></span><span class="go">→</span></button>`};
function openRoasterKin(ref){
  const r=roasterIndex().find(x=>x.ref===ref); if(!r)return;
  openSheet(`<h3 style="margin:0 0 4px">${esc(r.name)}</h3>
    <div class="muted small" style="margin:0 0 10px">${kinTally(r)}, folded from what you've logged.</div>
    ${r.recs.map(kinRow).join('')}`);
}
function openLotKin(ref){
  const r=lotIndex().find(x=>x.ref===ref); if(!r)return;
  openSheet(`<h3 style="margin:0 0 4px">${esc(r.name)}</h3>
    <div class="muted small" style="margin:0 0 10px">one green · ${kinTally(r)}, wherever it landed in your journal.</div>
    ${r.recs.map(kinRow).join('')}`);
}
function openCupDetail(id){
  const c=cupById(id); if(!c)return;
  const b=bagById(c.bagId);
  const cafe=c.kind==='cafe';
  const what=cafe?`${esc(c.shop||'café')}${c.drink?` · ${esc(c.drink)}`:''}`:esc(bagName(b));
  const brew=c.brewId?D.brews.find(x=>x.id===c.brewId):null;
  const setup=brew?setupById(brew.setupId):null;
  const o=lotRead(c);
  const trace=cafe?[o.country,o.region,o.variety,o.producer,o.process,o.lot&&('lot '+o.lot)].filter(Boolean).map(esc).join(' · '):'';
  const x=cafe&&(cupRoaster(c)||c.origin||c.originCountry||c.variety)?crossContext({roaster:cupRoaster(c),origin:c.origin||c.originCountry,variety:c.variety}):null;
  openSheet(`
  <h3>${what}</h3>
  <div class="sub">${new Date(c.createdAt).toLocaleString([],{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}${cafe&&c.city?` · ${esc(c.city)}`:''}</div>
  ${(()=>{const pal=cafe?palOf(c):null;return pal?`<div class="cafe-theme" style="${cafeVars(pal)};margin:2px 0 12px;padding:10px 14px;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--radius)">
    <div class="palette">${paletteSwatches(pal)}</div>
    <div class="muted small" style="margin-top:8px">${c.site?`The beans’ colours, read from <strong>${esc(c.site.replace(/^https?:\/\/(www\.)?/,''))}</strong>.`:'The beans’ own colours, on the record.'}</div>
  </div>`:''})()}
  <div class="card">
    <div class="kv"><span class="k">Hedonic</span><span class="v num">${c.hedonic??'—'}</span></div>
    <div class="kv"><span class="k">Kind</span><span class="v">${cafe?'café cup':'brew'}</span></div>
    ${cafe&&c.style?`<div class="kv"><span class="k">Style</span><span class="v">${esc(c.style)}</span></div>`:''}
    ${cafe&&(c.roaster||c.origin)?`<div class="kv"><span class="k">Beans</span><span class="v">${[cupRoaster(c),c.origin].filter(Boolean).map(esc).join(' · ')}</span></div>`:''}
    ${trace?`<div class="kv"><span class="k">Traceability</span><span class="v">${trace}</span></div>`:''}
    ${cafe&&c.price!=null?`<div class="kv"><span class="k">Price</span><span class="v num">${money(c.price)}</span></div>`:''}
    ${cafe&&c.again!=null?`<div class="kv"><span class="k">Verdict</span><span class="v">${c.again?'order again':'pass'}</span></div>`:''}
    <div class="kv"><span class="k">Instrumentation</span><span class="v">${esc(c.instrumentation)||'—'}</span></div>
    ${brew?`<div class="kv"><span class="k">Brew</span><span class="v num">${brew.grind??'—'} grind · ${brew.doseG??'—'}g → ${brew.waterG??'—'}g · ${fmtTime(brew.timeSec)}</span></div>`:''}
    ${setup?`<div class="kv"><span class="k">Setup</span><span class="v">${esc(setup.name)}</span></div>`:''}
  </div>
  ${kinHTML(c)}

function removeCup(id){
  if(guard())return;
  const c=cupById(id); if(!c)return;
  const b=bagById(c.bagId);
  const what=c.kind==='cafe'?`${c.shop||'café'} · ${c.drink||'cup'}`:bagName(b);
  if(!confirm(`Remove this cup from the ledger?\n\n${what}\n\nThis cannot be undone.`))return;
  const i=D.cups.findIndex(x=>x.id===id);
  if(i<0)return;
  D.cups.splice(i,1);
  (D.deleted=D.deleted||[]).push({id,at:new Date().toISOString()}); // tombstone: survives sync merges
  save();closeSheet();render();toast('Cup removed');
}

function traceCard(b){
  const brews=brewsOf(b.id).slice().reverse(); // chronological
  const n=brews.length;
  const hed=brews.map(x=>{const c=D.cups.find(c=>c.brewId===x.id);return c?c.hedonic:null});
  const grinds=brews.map(x=>x.grind).filter(v=>v!=null);
  const gmin=Math.min(...grinds),gmax=Math.max(...grinds);
  const W=480,H=150,P=28;
  const X=i=>n===1?W/2:P+i*(W-2*P)/(n-1);
  const GY=v=>gmax===gmin?H/2:H-P-((v-gmin)/(gmax-gmin))*(H-2*P);
  const HY=v=>H-P-((v-1)/8)*(H-2*P);
  let path='',pts='',hpts='';
  brews.forEach((x,i)=>{ if(x.grind!=null){ path+=(path?'L':'M')+X(i).toFixed(1)+' '+GY(x.grind).toFixed(1)+' ';
    pts+=`<circle cx="${X(i).toFixed(1)}" cy="${GY(x.grind).toFixed(1)}" r="3.5" fill="var(--accent)"/>`;}
    if(hed[i]!=null) hpts+=`<circle cx="${X(i).toFixed(1)}" cy="${HY(hed[i]).toFixed(1)}" r="3" fill="none" stroke="var(--ink-2)" stroke-width="1.5"/>`;
  });
  return `<div class="card">
    <div class="row"><strong>${esc(bagName(b))}</strong><span class="n-note">n=${n}</span></div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%">
      <line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}" stroke="var(--line)"/>
      ${grinds.length?`<text x="${P}" y="14" font-size="10" fill="var(--ink-3)">grind ${gmin}–${gmax}</text>`:''}
      <text x="${W-P}" y="14" font-size="10" fill="var(--ink-3)" text-anchor="end">○ hedonic 1–9</text>
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5"/>${pts}${hpts}
    </svg>
    <div class="n-note">solid — grind setting · hollow — hedonic. Comparable only within one Setup; every point carries its instrumentation.</div>
  </div>`;
}

function openSheet(html){const s=document.getElementById('sheet');
  s.innerHTML='<div class="grab" aria-hidden="true"></div>'+html;
  s.classList.remove('dragging');s.style.transform='';document.getElementById('sheetbg').style.opacity='';
  s.classList.add('open');document.getElementById('sheetbg').classList.add('open');
  s.scrollTop=0;}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sheetbg').classList.remove('open');stopTimer(false)}

/* ============ sheet drag-to-dismiss ============ *
 * The grab handle (and the sheet body when scrolled to the top) can be pulled
 * down to dismiss. Follow the finger; on release, snap closed if dragged far
 * enough or flicked quickly, otherwise snap back. Tapping the backdrop still
 * works too — this just makes the handle behave like a real handle.          */
(function initSheetDrag(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetbg');
  let startY=0,dy=0,active=false,dragging=false,startT=0;
  const yOf=e=>e.touches?e.touches[0].clientY:e.clientY;
  const onGrab=e=>!!(e.target.closest&&e.target.closest('.grab'));

  function down(e){
    if(!sheet.classList.contains('open'))return;
    // Only begin a dismiss-drag from the handle, or from the body when the
    // sheet is already scrolled to the top — otherwise let content scroll.
    if(!onGrab(e)&&sheet.scrollTop>0)return;
    active=true;dragging=false;dy=0;startY=yOf(e);startT=Date.now();
  }
  function move(e){
    if(!active)return;
    dy=yOf(e)-startY;
    if(dy<=0){ // pulling up: hand control back to native scroll
      if(dragging){sheet.classList.remove('dragging');sheet.style.transform='';bg.style.opacity='';}
      dragging=false;dy=0;return;
    }
    dragging=true;
    sheet.classList.add('dragging');
    if(e.cancelable)e.preventDefault(); // suppress native scroll while pulling down
    sheet.style.transform=`translateX(-50%) translateY(${dy}px)`;
    bg.style.opacity=String(Math.max(0,1-dy/(sheet.offsetHeight||600)));
  }
  function up(){
    if(!active)return;
    active=false;
    const h=sheet.offsetHeight||600;
    const velocity=dy/Math.max(1,Date.now()-startT); // px per ms
    sheet.classList.remove('dragging'); // restore the snap transition
    if(dragging&&(dy>h*0.28||velocity>0.55)){
      sheet.style.transform='translateX(-50%) translateY(100%)';
      bg.style.opacity='';
      setTimeout(()=>{closeSheet();sheet.style.transform='';bg.style.opacity='';},300);
    }else{
      sheet.style.transform='';
      bg.style.opacity='';
    }
    dragging=false;dy=0;
  }

  sheet.addEventListener('touchstart',down,{passive:true});
  sheet.addEventListener('touchmove',move,{passive:false});
  sheet.addEventListener('touchend',up);
  sheet.addEventListener('touchcancel',up);
  sheet.addEventListener('mousedown',down);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
})();

const val=id=>{const e=document.getElementById(id);return e?e.value.trim():''};
const numv=id=>{const v=val(id);return v===''?null:Number(v)};

/* ============ dial component ============
 * A stepper you can drive three ways, so a wide range is never a wall of taps:
 *   · tap − / +           one step (fine)
 *   · press-and-hold      auto-repeats and accelerates — fly across 0–2000
 *   · tap the number      type an exact value (numeric keypad; m:ss for time)
 * opts: {kind:'time'} m:ss entry · {hint} scale caption top-right ·
 *       {corner} a control pinned top-right (the °C/°F toggle). */
const dialState={};
let editingDial=null,holdInt=null,holdTO=null;
function dial(id,label,unit,value,step,min,max,dp,opts){
  opts=opts||{};
  dialState[id]={v:value,step,min,max,dp:dp??(String(step).includes('.')?1:0),unit,kind:opts.kind||null};
  const corner=opts.corner?`<div class="dcorner">${opts.corner}</div>`:(opts.hint?`<div class="ticks">${opts.hint}</div>`:'');
  return `<div class="dial">${corner}<div class="l">${label}</div>
    <div class="v num tapedit" id="dv_${id}" onclick="editDial('${id}')">${fmtDial(id)}<span class="u">${unit}</span></div>
    <div class="ctl">
      <button type="button" onpointerdown="holdStart(event,'${id}',-1)">−</button>
      <button type="button" onpointerdown="holdStart(event,'${id}',1)">+</button>
    </div></div>`;
}
function fmtDial(id){const s=dialState[id];if(s.v==null)return '—';
  if(s.kind==='time')return fmtTime(s.v);
  return s.v.toFixed(s.dp).replace(/\.0+$/,'');}   // trim trailing zeros — whole numbers read clean
function unitSpan(id){return `<span class="u">${dialState[id].unit}</span>`}
function redrawDial(id){const el=document.getElementById('dv_'+id);if(el)el.innerHTML=fmtDial(id)+unitSpan(id)}
function setDial(id,v){const s=dialState[id];
  if(v==null||isNaN(v)){redrawDial(id);return}
  if(s.min!=null)v=Math.max(s.min,v); if(s.max!=null)v=Math.min(s.max,v);
  s.v=Number(v.toFixed(s.dp)); redrawDial(id);}
function nudge(id,dir,mult){const s=dialState[id];
  setDial(id,(s.v==null?(s.min??0):s.v)+dir*s.step*(mult||1));
  if(navigator.vibrate)navigator.vibrate(3);}
function holdStop(){if(holdTO){clearTimeout(holdTO);holdTO=null}if(holdInt){clearInterval(holdInt);holdInt=null}
  window.removeEventListener('pointerup',holdStop);window.removeEventListener('pointercancel',holdStop);}
function holdStart(e,id,dir){
  e.preventDefault();
  if(editingDial){const de=document.getElementById('de_'+editingDial);if(de)de.blur();}
  holdStop();
  nudge(id,dir);                                   // the tap itself is one step
  let n=0;
  holdTO=setTimeout(()=>{ holdInt=setInterval(()=>{ n++;
    const mult=n<10?1:n<20?4:n<35?10:25;           // ramp up the longer it's held
    nudge(id,dir,mult); },60); },320);             // brief pause first, so a tap stays a tap
  window.addEventListener('pointerup',holdStop);
  window.addEventListener('pointercancel',holdStop);
}
function editDial(id){
  if(editingDial===id)return;
  const s=dialState[id],el=document.getElementById('dv_'+id);
  editingDial=id;
  const cur=s.v==null?'':(s.kind==='time'?fmtTime(s.v):fmtDial(id));
  el.innerHTML=`<input class="dedit" id="de_${id}" inputmode="${s.kind==='time'?'text':'decimal'}" value="${cur}">`+unitSpan(id);
  const inp=document.getElementById('de_'+id); inp.focus(); inp.select();
  const commit=()=>{if(editingDial!==id)return; editingDial=null;
    const raw=inp.value;
    const v=s.kind==='time'?parseTime(raw):(raw.trim()===''?NaN:Number(raw));
    setDial(id,v);};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'){ev.preventDefault();inp.blur();}
    else if(ev.key==='Escape'){editingDial=null;redrawDial(id);}});
}
// grind dial reads its scale from the Setup — the assembly that owns the grinder.
// Blank Setup fields fall back to the original 0.5-step behavior.
function grindDialHTML(setup,value){
  const st=setup||{};
  const num=(x,d)=>x!=null&&x!==''&&!isNaN(Number(x))?Number(x):d;
  const step=num(st.grindStep,0.5)||0.5, min=num(st.grindMin,0), max=num(st.grindMax,null);
  const dp=String(step).includes('.')?1:0;
  const hint=(st.grindMin!=null&&st.grindMin!==''&&max!=null)?`${min}–${max} · ${step}`:'';
  return dial('grind','Grind',st.grindUnit||'',value,step,min,max,dp,{hint});
}

function tempCorner(){const u=tempUnit();

/* ============ brand colour ============ */
// A brand's signature palette, read from a website (café, roaster or the beans a café poured). Held
// across the open sheet while a lookup fills it. No photograph is ever captured or stored — a brand is
// its colours and its words, kept small, offline and portable.
let brandAccent=null,brandPalette=null;
function rgb2hsl(r,g,b){
  r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0;if(d){if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;if(h<0)h+=360}
  const l=(mx+mn)/2,sa=d?d/(1-Math.abs(2*l-1)):0;
  return [h,sa*100,l*100];
}
// A hex string ('#rgb' or '#rrggbb') to [r,g,b], or null. The website read speaks in hex.
const hex2rgb=h=>{h=String(h||'').trim().replace(/^#/,'');if(h.length===3)h=h.replace(/(.)/g,'$1$1');
  return /^[0-9a-fA-F]{6}$/.test(h)?[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]:null};
// Read a brand's signature colour from the colours its website declares (logo ink, background, the
// palette around them): most chromatic wins, a colour outvoting the greys, held inside a legible band
// so the surface always reads. That one colour seeds a whole themed surface (see cafeColors) — a mini
// design system from a website, worn by a café, a bag, or a café cup's beans.
function paletteFromColors(list){
  let best=null,bw=-1;
  (list||[]).forEach(c=>{const p=hex2rgb(c);if(!p)return;const w=Math.pow(Math.max(...p)-Math.min(...p),2);if(w>bw){bw=w;best=p}});
  if(!best)return null;
  const dark=(.299*best[0]+.587*best[1]+.114*best[2])<118;
  if(bw<300){const L=dark?60:38;return{h:28,s:8,l:L,brand:`hsl(28,8%,${L}%)`,dark,mono:true}} // no colour to read — an honest neutral
  const[h,sa,l]=rgb2hsl(best[0],best[1],best[2]),H=Math.round(h);
  const S=Math.round(Math.min(80,Math.max(42,sa))),L=Math.round(Math.min(58,Math.max(38,l)));
  return {h:H,s:S,l:L,brand:`hsl(${H},${S}%,${L}%)`,dark};
}

// visible before it's saved. Shared by cafés, bags and café-cup beans — `brandCtx` names the surface
// so the sample reads right for each. A no-op anywhere the preview slot isn't on screen.
let brandCtx={kicker:'A cup here',title:'Every cup, in these colours',cta:'Log a cup here'};
function paintBrandPreview(){const el=document.getElementById('brandpreview');if(el)el.innerHTML=brandPalette?brandPreviewHTML(brandPalette):'';}
function brandPreviewHTML(pal){
  return `<div class="palette">${paletteSwatches(pal)}</div>

function tickTimer(){const s=tElapsed+(tStart?(Date.now()-tStart)/1000:0);
  const el=document.getElementById('tclock');if(el)el.textContent=`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}.${Math.floor(s*10%10)}`;}
function toggleTimer(){
  if(tInt){tElapsed+=(Date.now()-tStart)/1000;tStart=null;clearInterval(tInt);tInt=null;document.getElementById('tbtn').textContent='Start';}
  else{tStart=Date.now();tInt=setInterval(tickTimer,100);document.getElementById('tbtn').textContent='Stop';}
}
function resetTimer(){stopTimer(true);tickTimer()}
function stopTimer(zero){if(tInt){clearInterval(tInt);tInt=null}if(zero){tElapsed=0;tStart=null}else if(tStart){tElapsed+=(Date.now()-tStart)/1000;tStart=null}}
function useTimer(){const s=tElapsed+(tStart?(Date.now()-tStart)/1000:0);

function saveCup(kind,brewId,bagId,skip,editId){
  if(guard())return;
  if(!skip&&hedState==null&&kind==='home'){toast('One tap — or skip, that\'s honest too');return}
  const ex=editId?cupById(editId):null; // edit path: keep the cup's id, place and hour; revise the rest
  const brew=brewId?D.brews.find(x=>x.id===brewId):(ex&&ex.brewId?D.brews.find(x=>x.id===ex.brewId):null);
  const fields={kind,brewId:brewId||(ex?ex.brewId:null)||null,bagId:bagId||(ex?ex.bagId:null)||null,
    shop:kind==='cafe'?val('c_shop'):null,drink:kind==='cafe'?val('c_drink'):null,
    hedonic:skip?null:hedState,descriptors:skip?[]:[...descState],notes:skip?'':val('c_notes'),
    instrumentation:kind==='cafe'?'recalled':(brew?brew.instrumentation:'measured'),blind:false,runId:null};
  if(kind==='cafe'){
    fields.city=val('c_city');fields.style=cafeStyleState;fields.roaster=val('c_roaster');
    fields.origin=val('c_origin');fields.price=numv('c_price');fields.again=againState;
    fields.site=(val('c_beansite')||'').trim();fields.palette=brandPalette; // the beans' brand, read from the roaster's site
    // structured traceability, aligned to the bag schema — the café's aspiration toward the exact coffee
    fields.originCountry=val('c_country');fields.originRegion=val('c_region');fields.producer=val('c_producer');
    fields.variety=val('c_variety');fields.lot=val('c_lot');fields.process=val('c_process');
    if(fields.shop)regUpsert(fields.shop,{city:fields.city},activeName()); // a sighting — the café enters the Register
    if(fields.shop&&!ex&&(sightBag||sightSeen.length)){regSight(fields.shop,{bag:sightBag,seen:sightSeen},activeName())} // what the counter showed — one save, no second submit
    sightBag=null;sightSeen=[];
    if(fields.shop&&D.cafeWants){const i=D.cafeWants.findIndex(x=>normName(x)===normName(fields.shop));if(i>=0)D.cafeWants.splice(i,1)} // been now — off the want list
  }
  const firstOut=kind==='cafe'&&!ex&&!cafeCups().length;
  const firstHome=kind==='home'&&!ex&&!skip&&!D.cups.some(c=>c.kind==='home'&&c.hedonic!=null);
  let cup;
  if(ex){Object.assign(ex,fields,{updatedAt:new Date().toISOString()});cup=ex}
  else{cup={id:uid(),createdAt:new Date().toISOString(),...fields};D.cups.push(cup)}
  if(kind==='cafe')catStampRoaster(cup); // author its roaster node at save time, not next boot
  editingCupId=null;

  else{go('field');toast(ex?'Cup updated':(skip?'The brew is on the record.':firstHome?'Kept — your first cup at home. The next brew starts here.':'Kept — the next brew starts here.'));}
}

// Fills blanks only. Progressive: offline or a silent site, and you fill it in by hand.
async function beansLookup(){
  const u=val('c_beansite'),box=document.getElementById('beansiteresults');
  if(!u.trim()){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Type the roaster’s website first — then read it.</div>';return}
  if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Reading the beans…</div>';
  try{
    const b=await readBrand(u);if(!box)return;if(!b)throw 0;
    if(b.pal){brandPalette=b.pal;brandAccent=b.pal.brand;paintBrandPreview()}
    const rEl=document.getElementById('c_roaster'); // the name it states fills the beans, if blank
    if(b.name&&rEl&&!rEl.value.trim())rEl.value=b.name;
    const nEl=document.getElementById('c_notes');   // the description fills the line, if blank
    if(b.line&&nEl&&!nEl.value.trim())nEl.value=b.line;
    if(!b.pal&&!b.name&&!b.line){box.innerHTML='<div class="muted small" style="padding:6px 2px">Couldn’t read that site. Fill it in by hand — it still saves.</div>';return}
    const got=[b.pal?'its colours':null,b.line?'a line':null].filter(Boolean).join(', ');
    box.innerHTML=brandReadLine(b,got);
  }catch(e){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Offline, or the site wouldn’t answer. Fill it in by hand — it still saves.</div>'}
}

  const city=(e&&e.city)||modeOf([...mine,...others].map(c=>c.city).filter(Boolean))||'';

// Comma-separated free text → a clean list: trimmed, deduped case-insensitively, order kept.
function parseTags(s){
  const seen=new Set(),out=[];
  String(s||'').split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>{const k=t.toLowerCase();if(!seen.has(k)){seen.add(k);out.push(t)}});
  return out;
}

// Online geocode (OpenStreetMap Nominatim — no key). Progressive enhancement: type wins offline.
// The query prefers a typed address, else falls back to the café's own name + city — so a lookup
// needs no typing at all: the shop the record already knows becomes the search.
let geoPick={address:'',lat:null,lon:null};
// The neighbourhood a geocode names for a pin — Nominatim's own hierarchy, most specific first.
function nbhoodOf(addr){
  addr=addr||{};
  return addr.neighbourhood||addr.suburb||addr.quarter||addr.city_district||addr.hamlet||addr.borough||'';
}
async function geoLookup(shop){
  const q=val('p_address')||[shop,val('p_city')].filter(Boolean).join(', ');
  const box=document.getElementById('georesults');
  if(!q){if(box)box.innerHTML='';return}
  if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Searching the map…</div>';
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q='+encodeURIComponent(q),{headers:{'Accept':'application/json'}});
    const list=await r.json();
    if(!box)return;
    if(!list||!list.length){box.innerHTML='<div class="muted small" style="padding:6px 2px">Nothing found for that. Type the address by hand — it still saves.</div>';return}
    box.innerHTML=`<div class="muted small" style="padding:6px 2px 2px">Tap the right one:</div>`+list.map(o=>`<div class="card tap georow" onclick="geoChoose(${jsq(o.display_name)},${jsq(String(o.lat))},${jsq(String(o.lon))},${jsq(nbhoodOf(o.address))})"><div class="small">${esc(o.display_name)}</div></div>`).join('');
  }catch(e){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Offline — type the address; it saves without the pin.</div>'}
}
function geoChoose(address,lat,lon,neighborhood){
  geoPick={address,lat:Number(lat),lon:Number(lon)};
  const inp=document.getElementById('p_address');if(inp)inp.value=address;
  const nInp=document.getElementById('p_neighborhood');if(nInp&&neighborhood&&!nInp.value.trim())nInp.value=neighborhood; // fills blank only — typed wins
  const box=document.getElementById('georesults');if(box)box.innerHTML=`<div class="pinned">Pinned · ${Number(lat).toFixed(4)}, ${Number(lon).toFixed(4)} <a class="link" onclick="geoUnpin()">remove</a></div>`;
}
function geoUnpin(){geoPick={address:val('p_address'),lat:null,lon:null};const box=document.getElementById('georesults');if(box)box.innerHTML='';}
// The name a site states for itself, cleaned of the boilerplate page titles carry ('Home', a tagline,
// the domain). What survives the split is usually the café's own name — surfaced so you can see the
// site agrees with the shop you named.
function siteName(title){
  const parts=String(title||'').split(/\s+[|·—–]\s+|\s+-\s+/).map(s=>s.trim()).filter(Boolean);
  return parts.filter(s=>!/^(home|welcome|official(\s+site)?|coffee|caf[eé]|menu|about)$/i.test(s))[0]||parts[0]||'';
}
// One line to the ledger: a meta description, collapsed and clipped to a single legible line at a word
// boundary — never a fabricated sentence, only what the site already wrote about itself.
function siteLine(desc){
  const t=String(desc||'').replace(/\s+/g,' ').trim();
  return t.length>150?t.slice(0,147).replace(/[\s.,;:–—-]+\S*$/,'')+'…':t;
}
// One website read, shared by cafés, bags and café cups. Microlink (no key, CORS-open) reads the page;
// we take its colours (paletteFromColors, the chroma-wins signature), the name it states, and the line
// it wrote about itself — never the hotlinked image. A brand is its palette and its words: small,
// offline, portable, self-contained. Returns null offline or on a silent site; the caller falls back to
// hand entry. `host`/`logo` are for a live confirmation only, never saved.
function normSite(u){u=(u||'').trim();if(!u)return'';return /^https?:\/\//i.test(u)?u:'https://'+u}
async function readBrand(url){
  const u=normSite(url);if(!u)return null;
  let host=u;try{host=new URL(u).hostname.replace(/^www\./,'')}catch(e){}
  const r=await fetch('https://api.microlink.io/?palette&url='+encodeURIComponent(u));
  const j=await r.json();
  const d=(j&&j.data)||{},lg=d.logo||{},im=d.image||{};
  const cols=[lg.color,lg.background,...(lg.palette||[]),im.color,im.background,...(im.palette||[])].filter(Boolean);
  return {pal:paletteFromColors(cols),name:siteName(d.title),line:siteLine(d.description),logo:lg.url||'',host};
}
// A one-line read confirmation, shared by every brand lookup. `got` names what came back.
function brandReadLine(b,got){
  return `${b.logo?`<img src="${esc(b.logo)}" alt="" style="height:30px;width:auto;max-width:120px;border-radius:6px;vertical-align:middle;margin-right:8px">`:''}<span class="muted small">Read ${esc(b.host)}${b.name?` — ${esc(b.name)}`:''}${got?` — ${got}`:''}. Save to keep it.</span>`;
}
// Online café read: pull as much of a café as its website will give in one tap — its colours, the name
// it states, the line it writes — then chain the map so the address surfaces too. Fills blanks only,
// never overwriting what you typed. Progressive: offline or a silent site, and you fill it in by hand.
async function siteLookup(shop){
  const u=val('p_site'),box=document.getElementById('siteresults');
  if(!u.trim()){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Type the café’s website first — then read it.</div>';return}
  if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Reading the café…</div>';
  try{
    const b=await readBrand(u);if(!box)return;if(!b)throw 0;
    if(b.pal){brandPalette=b.pal;brandAccent=b.pal.brand;paintBrandPreview()}

    const got=[b.pal?'its colours':null,b.line?'a line':null,ranGeo?'the map below':null].filter(Boolean).join(', ');
    box.innerHTML=brandReadLine(b,got);
  }catch(e){if(box)box.innerHTML='<div class="muted small" style="padding:6px 2px">Offline, or the site wouldn’t answer. Fill it in by hand — it still saves.</div>'}
}

/* ============ sync ============ */
/* Optional server sync. Offline-first: localStorage stays the source of truth;
 * the server (server/README.md) keeps {rev, ledger} per user. Push carries
 * baseRev; a 409 means someone else pushed first — pull, merge by record id,
 * re-push. Any authenticated user can READ every ledger; writes are owner-only. */
const SYNC_KEY='carta.sync', DIR_KEY='carta.remoteDir';
const remoteKey=id=>'carta.remote.'+id;
let SYNC=loadSync();               // {url,token,userId,name,localId,rev,dirty,lastSyncAt} | null
let syncBusy=false,pushTimer=null,syncState='idle',remoteStale=false;   // idle|syncing|offline|auth
function loadSync(){return readJSONLS(SYNC_KEY)}
function saveSync(){if(SYNC)localStorage.setItem(SYNC_KEY,JSON.stringify(SYNC));else localStorage.removeItem(SYNC_KEY)}
function readJSONLS(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch(e){return null}}
const remoteDir=()=>readJSONLS(DIR_KEY)||{users:[]};
const isRemoteView=()=>String(viewingUserId).startsWith('r:');
function remoteUserById(vid){
  if(!String(vid).startsWith('r:'))return null;
  const u=remoteDir().users.find(x=>x.id===String(vid).slice(2));
  return {id:vid,name:u?u.name:'server user',createdAt:(u&&u.updatedAt)||''};
}
const syncedHere=()=>!!(SYNC&&SYNC.token&&USERS.activeId===SYNC.localId);
function markDirty(){if(!syncedHere()||viewingUserId!==USERS.activeId)return;SYNC.dirty=true;saveSync();schedulePush()}
function schedulePush(){clearTimeout(pushTimer);pushTimer=setTimeout(()=>syncNow(false),2000)}

/* merge: union by record id per collection; edited records carry updatedAt and
 * the newer one wins (ties → local). Tombstones in `deleted` subtract removed
 * cups so a removal survives merging. Output is canonical (sorted) so both
 * devices converge on an identical serialization. */
function mergeColl(loc,rem){
  const m=new Map();(rem||[]).forEach(r=>m.set(r.id,r));
  (loc||[]).forEach(l=>{const r=m.get(l.id);if(!r||((l.updatedAt||'')>=(r.updatedAt||'')))m.set(l.id,l)});
  return [...m.values()].sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||'')||String(a.id).localeCompare(String(b.id)));
}
function mergeLedgers(loc,rem){
  if(!rem)return loc;
  const out=clone(blank);
  const dead=new Map();[...(rem.deleted||[]),...(loc.deleted||[])].forEach(t=>dead.set(t.id,t));
  out.deleted=[...dead.values()].sort((a,b)=>String(a.id).localeCompare(String(b.id)));
  ['setups','bags','brews','cups','cafes'].forEach(k=>out[k]=mergeColl(loc[k],rem[k]).filter(r=>!dead.has(r.id)));
  const f=new Map();[...(rem.cafeFavs||[]),...(loc.cafeFavs||[])].forEach(x=>f.set(String(x).toLowerCase(),x));
  out.cafeFavs=[...f.values()].sort((a,b)=>a.localeCompare(b));
  const w=new Map();[...(rem.cafeWants||[]),...(loc.cafeWants||[])].forEach(x=>w.set(String(x).toLowerCase(),x));
  out.cafeWants=[...w.values()].sort((a,b)=>a.localeCompare(b));
  // prefs merge shallow, local key wins — one keeper on two devices settles on
  // the last push, and a merge no longer wipes the signal, the skips, the leans
  out.prefs={...(rem.prefs||{}),...(loc.prefs||{})};
  out.version=loc.version||1;
  out.createdAt=[loc.createdAt,rem.createdAt].filter(Boolean).sort()[0]||out.createdAt;
  return out;
}

/* Register merge: union by id, newer updatedAt wins — then collapse entries
 * that name the same café from different devices (same name, different ids):
 * the newest-amended entry stands, blanks fill from the rest, the earliest
 * provenance is kept. Both sides run the same collapse, so they converge.
 * Sightings never race: they union by id across every copy, and a strike
 * (withdrawn/superseded) only ever adds — deterministic, no conflicts by
 * construction. The reach then recompiles from the merged record. */
function mergeSightings(...lists){
  const m=new Map();
  lists.flat().filter(s=>s&&s.id).forEach(s=>{
    const p=m.get(s.id);
    if(!p){m.set(s.id,{...s});return}
    if(s.withdrawnAt&&(!p.withdrawnAt||s.withdrawnAt<p.withdrawnAt))p.withdrawnAt=s.withdrawnAt;
    if(s.supersededAt&&(!p.supersededAt||s.supersededAt<p.supersededAt))p.supersededAt=s.supersededAt;
  });
  return [...m.values()].sort(bySight);
}
function mergeRegister(loc,rem){
  // Same id on both sides: newer updatedAt wins; on a tie the copy carrying
  // more substance stands (a collapse fills fields without touching updatedAt,
  // so the filled copy must beat its thinner twin), then bytes break the tie —
  // deterministic either way, so both sides converge.
  const fuller=e=>Object.keys(e).filter(k=>regSubstance(e[k])).length;
  const beats=(l,r)=>{const lu=l.updatedAt||'',ru=r.updatedAt||'';if(lu!==ru)return lu>ru;
    const lf=fuller(l),rf=fuller(r);if(lf!==rf)return lf>rf;
    return JSON.stringify(l)>=JSON.stringify(r)};
  const dead=new Map();[...((rem&&rem.deleted)||[]),...(loc.deleted||[])].forEach(t=>dead.set(t.id,t));
  const m=new Map();((rem&&rem.entries)||[]).forEach(r=>m.set(r.id,r));
  (loc.entries||[]).forEach(l=>{const r=m.get(l.id);
    if(!r){m.set(l.id,l);return}
    const w={...(beats(l,r)?l:r)};
    if(l.sightings||r.sightings)w.sightings=mergeSightings(l.sightings||[],r.sightings||[]);
    m.set(l.id,w)});
  const groups={};
  [...m.values()].filter(e=>e&&e.name&&!dead.has(e.id)).forEach(e=>{const k=normName(e.name);(groups[k]=groups[k]||[]).push(e)});
  const entries=Object.keys(groups).sort().map(k=>{
    const g=groups[k].sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||'')||String(a.id).localeCompare(String(b.id)));
    const w={...g[0]};
    g.slice(1).forEach(e=>{
      Object.keys(e).forEach(f=>{if(!regSubstance(w[f])&&regSubstance(e[f]))w[f]=e[f]});
      if(e.firstAt&&(!w.firstAt||e.firstAt<w.firstAt)){w.firstAt=e.firstAt;w.firstBy=e.firstBy||w.firstBy}
    });
    const sg=mergeSightings(...g.map(e=>e.sightings||[]));
    if(sg.length)w.sightings=sg;
    return w;
  });
  return {entries,deleted:[...dead.values()].sort((a,b)=>String(a.id).localeCompare(String(b.id)))};
}
/* Catalog merge: the Register's law, keyed on _key instead of name. Union by id
 * (newer updatedAt wins; a tie breaks to substance, then bytes, so both sides
 * converge), sightings union and never race, then collapse entries that share a
 * _key but were born on different devices — the same node seeded twice — keeping
 * the earliest provenance. _key is the deterministic dedup the seed already used,
 * so the two copies of one node always land together; a ledger ref left dangling
 * by the collapse re-points next boot through the same _key. */
function mergeCatalog(loc,rem){
  const fuller=e=>Object.keys(e).filter(k=>regSubstance(e[k])).length;
  const beats=(l,r)=>{const lu=l.updatedAt||'',ru=r.updatedAt||'';if(lu!==ru)return lu>ru;
    const lf=fuller(l),rf=fuller(r);if(lf!==rf)return lf>rf;
    return JSON.stringify(l)>=JSON.stringify(r)};
  const dead=new Map();[...((rem&&rem.deleted)||[]),...(loc.deleted||[])].forEach(t=>dead.set(t.id,t));
  const m=new Map();((rem&&rem.entries)||[]).forEach(r=>m.set(r.id,r));
  (loc.entries||[]).forEach(l=>{const r=m.get(l.id);
    if(!r){m.set(l.id,l);return}
    const w={...(beats(l,r)?l:r)};
    if(l.sightings||r.sightings)w.sightings=mergeSightings(l.sightings||[],r.sightings||[]);
    m.set(l.id,w)});
  const groups={};
  [...m.values()].filter(e=>e&&e._key&&!dead.has(e.id)).forEach(e=>{(groups[e._key]=groups[e._key]||[]).push(e)});
  const entries=Object.keys(groups).sort().map(k=>{
    const g=groups[k].sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||'')||String(a.id).localeCompare(String(b.id)));
    const w={...g[0]};
    g.slice(1).forEach(e=>{
      Object.keys(e).forEach(f=>{if(!regSubstance(w[f])&&regSubstance(e[f]))w[f]=e[f]});
      if(e.firstAt&&(!w.firstAt||e.firstAt<w.firstAt)){w.firstAt=e.firstAt;w.firstBy=e.firstBy||w.firstBy}
    });
    const sg=mergeSightings(...g.map(e=>e.sightings||[]));
    if(sg.length)w.sightings=sg;
    return w;
  });
  return {entries,deleted:[...dead.values()].sort((a,b)=>String(a.id).localeCompare(String(b.id)))};
}
// The Register rides the same heartbeat as the ledger: poll meta, pull + merge
// when the server moved, push while dirty (409 → merge, retry). Any keeper may
// push — the document is the group's. Older servers without /api/cafes answer
// 404 and are skipped; the Register then stays device-local, still useful.
async function syncRegister(){
  const meta=await api('/api/cafes?meta=1');
  if(meta.status!==200)return;
  if(meta.body.rev>REG.rev){
    const full=await api('/api/cafes');
    if(full.status===200&&full.body.register){
      const merged=mergeRegister({entries:REG.entries,deleted:REG.deleted},full.body.register);
      REG.rev=full.body.rev;REG.entries=merged.entries;REG.deleted=merged.deleted;
      REG.dirty=JSON.stringify(merged)!==JSON.stringify({entries:full.body.register.entries||[],deleted:full.body.register.deleted||[]});
      saveReg();
    }
  }
  let tries=0;
  while(REG.dirty&&tries<3){
    tries++;
    const r=await api('/api/cafes','PUT',{baseRev:REG.rev,register:{version:1,entries:REG.entries,deleted:REG.deleted}});
    if(r.status===200){REG.rev=r.body.rev;REG.dirty=false;saveReg()}
    else if(r.status===409){
      const merged=mergeRegister({entries:REG.entries,deleted:REG.deleted},r.body.register||{});
      REG.rev=r.body.rev;REG.entries=merged.entries;REG.deleted=merged.deleted;saveReg();
    }
    else break;
  }
}
// The catalog rides the same heartbeat as the Register, one document per kind:
// poll each kind's meta, pull + merge when the server moved, push while dirty
// (409 → merge, retry). Group-writable like the café Register. An older server
// 404s /api/catalog and the whole spine stays device-local, exactly as the
// Register degrades — the atlas is still useful offline.
async function syncCatalog(){
  for(const kind of CAT_KINDS){
    const doc=CAT[kind];
    const meta=await api('/api/catalog/'+kind+'?meta=1');
    if(meta.status!==200)return;   // old server (404) — the endpoint is absent, skip the spine
    if(meta.body.rev>doc.rev){
      const full=await api('/api/catalog/'+kind);
      if(full.status===200&&full.body.catalog){
        const merged=mergeCatalog({entries:doc.entries,deleted:doc.deleted},full.body.catalog);
        doc.rev=full.body.rev;doc.entries=merged.entries;doc.deleted=merged.deleted;
        doc.dirty=JSON.stringify(merged)!==JSON.stringify({entries:full.body.catalog.entries||[],deleted:full.body.catalog.deleted||[]});
        saveDoc(kind);
      }
    }
    let tries=0;
    while(doc.dirty&&tries<3){
      tries++;
      const r=await api('/api/catalog/'+kind,'PUT',{baseRev:doc.rev,catalog:{version:1,entries:doc.entries,deleted:doc.deleted}});
      if(r.status===200){doc.rev=r.body.rev;doc.dirty=false;saveDoc(kind)}
      else if(r.status===409){
        const merged=mergeCatalog({entries:doc.entries,deleted:doc.deleted},r.body.catalog||{});
        doc.rev=r.body.rev;doc.entries=merged.entries;doc.deleted=merged.deleted;saveDoc(kind);
      }
      else break;
    }
  }
}

async function api(path,method,body){
  let r;

    r=await fetch(SYNC.url.replace(/\/+$/,'')+path,{method:method||'GET',
      headers:{'Content-Type':'application/json',...(SYNC.token?{Authorization:'Bearer '+SYNC.token}:{})},
      body:body===undefined?undefined:JSON.stringify(body)});
  }catch(e){throw{offline:true}}
  const data=await r.json().catch(()=>null);
  if(r.status===401){authLost();throw{auth:true}}

}

// Operate on the synced user's stored ledger directly, so sync stays correct
// even while the screen is showing someone else's ledger read-only.
function readOwnStored(){return readJSONLS(dataKey(SYNC.localId))||clone(blank)}
function writeOwnStored(led){

async function syncNow(manual){
  if(!SYNC||!SYNC.url)return;
  if(!SYNC.token){if(manual)openSyncSheet(true);return}
  if(!syncedHere()||syncBusy)return;
  syncBusy=true;syncState='syncing';paintSync();
  try{
    let local=readOwnStored();
    const meta=await api(`/api/ledgers/${SYNC.userId}?meta=1`);
    if(meta.status===200&&meta.body.rev>SYNC.rev){
      const full=await api(`/api/ledgers/${SYNC.userId}`);
      if(full.status===200&&full.body.ledger){
        const merged=mergeLedgers(local,full.body.ledger);
        SYNC.rev=full.body.rev;
        if(JSON.stringify(merged)!==JSON.stringify(full.body.ledger))SYNC.dirty=true;
        local=merged;writeOwnStored(local);
        toast('Ledger updated from server');
      }
    }
    let tries=0;
    while(SYNC.dirty&&tries<3){
      tries++;
      const r=await api(`/api/ledgers/${SYNC.userId}`,'PUT',{baseRev:SYNC.rev,ledger:local});
      if(r.status===200){SYNC.rev=r.body.rev;SYNC.dirty=false}
      else if(r.status===409){local=mergeLedgers(local,r.body.ledger);SYNC.rev=r.body.rev;writeOwnStored(local)}
      else break;
    }
    if(SYNC.dirty&&manual)toast('Sync conflict — will retry');
    await syncRegister();                              // the café Register, same heartbeat
    regSeed();                                         // pulled ledgers may have named new cafés
    catSeed();                                         // and new spine nodes — producers, lots, roasters
    await syncCatalog();                               // the spine of the atlas, same heartbeat
    catRepoint();                                      // re-point local ledgers onto the merged ids
    if(tab==='cafes'&&!document.getElementById('sheet').classList.contains('open'))render();
    try{
      const dir=await api('/api/users');
      if(dir.status===200)localStorage.setItem(DIR_KEY,JSON.stringify({fetchedAt:new Date().toISOString(),users:dir.body.users}));
    }catch(e){}
    SYNC.lastSyncAt=new Date().toISOString();syncState='idle';
  }catch(e){
    if(!(e&&e.auth)){syncState='offline';if(manual)toast('Server unreachable — working locally')}
  }finally{syncBusy=false;saveSync();paintSync()}
}

// where you are, if you say so — in memory only, never stored or synced.

function haversine(la1,lo1,la2,lo2){const R=6371,r=Math.PI/180;
  const dla=(la2-la1)*r,dlo=(lo2-lo1)*r;
  const a=Math.sin(dla/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dlo/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(a)));}
const fmtDist=km=>km==null?'':km<1?`${Math.round(km*1000)} m`:km<10?`${km.toFixed(1)} km`:`${Math.round(km)} km`;
const distTo=p=>(!nearOn||!myGeo||!p||p.lat==null||p.lon==null)?null:haversine(myGeo.lat,myGeo.lon,p.lat,p.lon);

// whose 8 is your 8 — for each person you can read, how close your scores land
// on the cafés you have both kept. Mean absolute difference on the 1–9 scale;
// quiet until you share at least two places. Shape, not verdict.
let _affCache=null;
function tasteAffinity(){
  const myAvg={};
  cafeCups().forEach(c=>{if(c.shop&&c.hedonic!=null){const k=normName(c.shop);(myAvg[k]=myAvg[k]||[]).push(c.hedonic)}});
  Object.keys(myAvg).forEach(k=>myAvg[k]=myAvg[k].reduce((a,b)=>a+b,0)/myAvg[k].length);
  const out=[];
  circleSources().forEach(s=>{const d=circleLedger(s);if(!d)return;
    const theirs={};(d.cups||[]).forEach(c=>{if(c.kind==='cafe'&&c.shop&&c.hedonic!=null){const k=normName(c.shop);(theirs[k]=theirs[k]||[]).push(c.hedonic)}});
    const shared=Object.keys(theirs).filter(k=>myAvg[k]!=null);
    if(shared.length<2)return;
    let sum=0;shared.forEach(k=>{const t=theirs[k].reduce((a,b)=>a+b,0)/theirs[k].length;sum+=Math.abs(t-myAvg[k])});
    const delta=sum/shared.length;
    out.push({src:s.id,name:s.name,shared:shared.length,delta,

function circleBeans(){

function recommendations(){

  const byShop={};
  circleCups().filter(c=>c.shop).forEach(c=>{const k=normName(c.shop);(byShop[k]=byShop[k]||{shop:c.shop.trim(),cups:[]}).cups.push(c)});
  const recs=[];

    const prof=circleProfile(p.shop);
    const city=modeOf(p.cups.map(c=>c.city).filter(Boolean))||(prof&&prof.city)||'';
    if(!inLens(city))return;
    let ws=0,wsum=0;const raters={};
    p.cups.forEach(c=>{if(c.hedonic==null)return;const a=affinityOf(c._src),w=.5+.5*a;ws+=c.hedonic*w;wsum+=w;

    if(!wsum)return;

// Keep the stream current: re-pull the directory and any ledger whose rev moved.
// Throttled, quiet, and offline-safe — the cached copies simply stand.
let circleBusy=false,circleFreshAt=0;
async function circleRefresh(){
  if(!SYNC||!SYNC.token||circleBusy||Date.now()-circleFreshAt<60e3)return;
  circleBusy=true;circleFreshAt=Date.now();
  let changed=false;
  try{
    const dir=await api('/api/users');
    if(dir.status===200){
      if(JSON.stringify(dir.body.users)!==JSON.stringify(remoteDir().users))changed=true;
      localStorage.setItem(DIR_KEY,JSON.stringify({fetchedAt:new Date().toISOString(),users:dir.body.users}));
    }
    for(const u of remoteDirUsers()){
      const c=readJSONLS(remoteKey(u.id));
      const meta=await api(`/api/ledgers/${u.id}?meta=1`);
      if(meta.status!==200||(c&&c.rev===meta.body.rev))continue;
      const full=await api(`/api/ledgers/${u.id}`);
      if(full.status===200&&full.body.ledger){
        cacheRemote(u.id,{rev:full.body.rev,updatedAt:full.body.updatedAt,fetchedAt:new Date().toISOString(),ledger:full.body.ledger});changed=true;
      }
    }
  }catch(e){/* offline or signed out — the cached stream stands */}
  finally{circleBusy=false}
  if(changed)regSeed(); // fresh ledgers may carry cafés the Register hasn't met
  if(changed&&tab==='circle'&&!document.getElementById('sheet').classList.contains('open')&&document.activeElement!==document.getElementById('circleSearch'))render();
}

/* ============ today + the matching ============ */
/* The Today surface and the matching behind it. Spec v1 — three weight
 * classes: trait 60 · proximity 20 · circle 20. The traits are argued by the
 * places you keep (and the three you name to start — the signal); proximity
 * only counts once you've said where you stand (in memory, never stored);
 * the circle's cups weigh in through affinity. Every number carries its
 * reasons — no score without its signals — and until three café cups are
 * kept the reading speaks in bands, not numbers. A save waits under Want to
 * go; a skip steps a place back for two weeks and fades on its own — never a
 * veto; "fewer like it" tips the place's kind down on the same curve. The
 * bookkeeping lives in per-user prefs, so it exports and syncs. */
const SKIP_DAYS=14,LEAN_DAYS=14,FADE_DAYS=21;
const daysSince=iso=>iso?(Date.now()-new Date(iso))/864e5:null;
const agoWord=iso=>{const d=Math.floor(daysSince(iso)??0);return d<=0?'today':d===1?'yesterday':d<7?d+' days ago':d<14?'a week ago':Math.round(d/7)+' weeks ago'};
const reducedMotion=()=>!!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);
let _mCache=null;
const mCache=()=>_mCache||(_mCache={});
function signalPicks(){const s=getPref('signal',null);return(s&&s.picks)||[]}
const coldNow=()=>!readOnly()&&!signalPicks().length&&!shopAgg().length; // no cups out, nothing named — the matching has nothing to read
const lowConf=()=>cafeCups().length<3;                                   // the early read — bands, not numbers
// what a place argues for itself: its tags, plus the reach facts standing on it
function candTraits(e){
  if(!e)return[];
  const out=[...(e.tags||[])],r=reachCompile(e);
  Object.keys(SEEN_FACTS).forEach(k=>{if(r.carry[k])out.push(SEEN_FACTS[k].label)});
  return out;
}
// the signal — {tagNorm:{label,w,from}}; every trait remembers the place that argued it
function signalTraits(){
  const c=mCache();if(c.sig)return c.sig;
  const m={};
  const add=(t,w,from)=>{const k=normName(t);if(!k)return;const x=m[k]||(m[k]={label:t,w:0,from});x.w+=w};
  signalPicks().forEach(p=>candTraits(regByName(p.name)).forEach(t=>add(t,2,`like ${p.name} — a place you named`)));
  shopAgg().forEach(s=>{const good=(Number(s.avg)||0)>=6;
    candTraits(regByName(s.shop)).forEach(t=>add(t,good?2:1,`like ${s.shop} — ${good?`your ${s.avg}/9 room`:'a place you keep'}`))});
  return c.sig=m;
}
function circByShop(){
  const c=mCache();if(c.circ)return c.circ;
  const m={};
  circleCups().forEach(x=>{if(x.shop&&x.hedonic!=null){const k=normName(x.shop);(m[k]=m[k]||[]).push(x)}});
  return c.circ=m;
}
function activeLeans(){
  const L=getPref('traitLeans',{})||{};
  return Object.keys(L).map(k=>({tag:k,...L[k],age:daysSince(L[k].at)})).filter(l=>l.age<FADE_DAYS).sort((a,b)=>a.age-b.age);
}
function skipInfo(shop){
  const rec=(getPref('placeSkips',{})||{})[normName(shop)];if(!rec)return null;
  const age=daysSince(rec.at);if(age>=FADE_DAYS)return null; // fully faded — no trace on the surfaces (the Record showed it going)
  return{...rec,age,active:age<SKIP_DAYS,back:age>=SKIP_DAYS};
}
const matchBand=s=>s>=84?'a strong read':s>=70?'promising':'worth a look';
function matchOf(shop){
  const c=mCache();c.m=c.m||{};const key=normName(shop);
  if(c.m[key])return c.m[key];
  const e=regByName(shop),sig=signalTraits(),traits=candTraits(e);
  const hits=[],seen=new Set();
  traits.forEach(t=>{const k=normName(t),s=sig[k];
    if(s&&!seen.has(k)){seen.add(k);hits.push({label:t,w:Math.min(3,s.w),from:s.from})}});
  hits.sort((a,b)=>b.w-a.w);
  const t=Math.round(60*Math.min(1,hits.reduce((a,h)=>a+h.w,0)/6));
  const km=distTo(e);
  const p=km==null?0:Math.round(20*Math.max(0,1-km/3.2));
  const oc=circByShop()[key]||[];
  const circ=Math.min(20,8+oc.reduce((a,x)=>a+2+4*affinityOf(x._src),0));
  let adj=0;const leans=[];
  activeLeans().forEach(l=>{if(l.age<LEAN_DAYS&&traits.some(x=>normName(x)===l.tag)){adj-=Math.round(8*(1-l.age/LEAN_DAYS));leans.push(l.label)}});
  adj=Math.max(adj,-18); // three leans of a kind is the cap — further skips deepen nothing
  const score=Math.round(Math.max(20,Math.min(97,t+p+circ+adj)));
  const signals=hits.slice(0,4).map(h=>({label:h.label,from:h.from}));
  if(km!=null)signals.push({label:`${fmtDist(km)} away`,from:'from where you stand'});
  if(oc.length){const who=[...new Set(oc.map(x=>x._who))];
    signals.push({label:`${oc.length} cup${oc.length>1?'s':''} in the circle`,from:`${who.slice(0,2).join(', ')}${who.length>2?' and others':''} — ${avgHedonic(oc)} avg`})}
  const whyParts=hits.slice(0,2).map(h=>h.label);
  if(km!=null)whyParts.push(fmtDist(km));
  const why=whyParts.length?whyParts.join(' · ')
    :(e&&e.notes)?`"${e.notes}"`
    :(e&&e.firstBy)?`in the Register · first entered by ${e.firstBy}`:'on the register — nothing said of it yet';
  const thin=!hits.length&&km==null&&!oc.length;
  return c.m[key]={score,band:matchBand(score),hits,signals,why,km,leans,thin};
}
/* --- the session: where you stood on the map, held for a week. Stored in
 * prefs so a device remembers across boots; after a week it steps back to a
 * plain suggestion — the reading keeps, the ceremony lets go. --- */
function discSess(){return getPref('findSess',null)||{view:'map',priority:'balanced',radius:5,sel:null,at:null}}
function saveSess(p){if(readOnly())return;setPref('findSess',{...discSess(),...p,at:new Date().toISOString()})}
const sessFresh=s=>!!(s&&s.at&&daysSince(s.at)<7&&s.sel);
// the candidates: every place on the record you haven't kept, scoped to the
// active lens; a said location narrows to a radius that widens itself when thin
function discCands(){
  const c=mCache();if(c.cands)return c.cands;
  // not candidates: places you keep, and the three you named — you love them already
  const mine=new Set([...shopAgg().map(s=>normName(s.shop)),...signalPicks().map(p=>normName(p.name))]);
  const byShop=circByShop();
  const names=new Map();
  REG.entries.forEach(e=>{const k=normName(e.name);if(!mine.has(k))names.set(k,e.name)});
  Object.keys(byShop).forEach(k=>{if(!mine.has(k)&&!names.has(k))names.set(k,byShop[k][0].shop)});
  let rows=[...names.values()].map(n=>{const e=regByName(n);return{shop:n,e,city:(e&&e.city)||'',km:distTo(e)}})
    .filter(r=>inLens(r.city));
  c.widened=false;
  if(nearOn&&myGeo){
    const within=r=>rows.filter(x=>x.km==null||x.km<=r);
    let rad=discSess().radius||5;
    while(within(rad).filter(x=>x.km!=null).length<3&&rad<5){rad=rad===1?2:5;c.widened=true}
    rows=within(rad);c.radiusEff=rad;
  }
  rows.forEach(r=>{r.m=matchOf(r.shop);r.skip=skipInfo(r.shop)});
  const near=discSess().priority==='near';
  rows.sort((a,b)=>near
    ?((a.km==null)-(b.km==null))||((a.km||0)-(b.km||0))||b.m.score-a.m.score

    <div class="serif" style="font-style:italic;font-size:15px;color:var(--ink-2);max-width:30ch;min-height:24px">${reducedMotion()?(lc?'Read against the three you named — ranked, loosely.':'Read against your record — ranked. No ceremony.'):mlines[Math.min(discMatch.step,3)]}</div>
    <div style="width:140px;height:1px;background:var(--line-2);margin-top:18px;position:relative">
      <div style="position:absolute;left:0;top:0;bottom:0;background:var(--accent);width:${reducedMotion()?100:Math.min(100,discMatch.step*25+10)}%;transition:${reducedMotion()?'none':'width .45s ease'}"></div>
    </div>

  const sparseNote=c.widened?`<div class="cafeback">Thin close by — the radius widened itself to ${c.radiusEff} km; the smaller rings unlock as the register grows here.</div>`:'';

  if(nearOn&&myGeo)dpts.push({lat:myGeo.lat,lon:myGeo.lon});

      marks:discMarks},dpts);

  return`${bar}${tune}<div style="position:relative">${body}${overlay}</div>
  ${seal('The map','Read against your record — reasons on every pin.')}`;

/* --- the bookkeeping, on the Record: what waits, what stepped back, what leans --- */
function recordKeepingHTML(){
  const wants=(D.cafeWants||[]).slice();
  const wa=getPref('wantAt',{})||{},wk=getPref('wantAsk',{})||{};
  const rows=wants.map(n=>{const at=wa[normName(n)],ask=wk[normName(n)]||{n:0};
    return{n,m:matchOf(n),e:regByName(n),at,ask,aging:!!at&&ask.n<2&&daysSince(ask.at||at)>=(ask.n===0?14:28)}})
    .sort((a,b)=>b.m.score-a.m.score);
  const wantsHTML=rows.length?`<div class="muted small serif" style="font-style:italic;margin:0 2px 10px">Ordered by match, not the calendar — the age shows anyway.</div>
    ${rows.map(w=>{const pal=palOf(w.e),vars=pal?cafeVars(pal):'';
      return`<div class="card tap shopcard"${vars?` style="${vars}"`:''} onclick="openPlace(${jsq(w.n)})">
        <div class="row"><span class="small"><strong>${esc(w.n)}</strong>${w.e&&(w.e.city||w.e.neighborhood)?`<span class="muted"> · ${esc([w.e.city,w.e.neighborhood].filter(Boolean).join(' · '))}</span>`:''}</span>${matchScoreHTML(w.m)}</div>
        <div class="muted small">${w.at?`Saved ${agoWord(w.at)}`:'Saved — before the record kept dates'} · unvisited</div>
        ${w.aging?`<div class="muted small serif" style="font-style:italic;margin-top:6px">${w.ask.n===0?`Saved ${agoWord(w.at)}, still unvisited — let it go?`:'Still waiting — the last ask. After this it stays quiet.'}</div>
        <div style="display:flex;gap:16px;margin-top:7px;align-items:baseline">
          <button class="text-action" onclick="event.stopPropagation();letGoWant(${jsq(w.n)})">Let it go</button>
          <button class="text-action" onclick="event.stopPropagation();keepWaiting(${jsq(w.n)})">${w.ask.n===0?'It stays — one last ask in four weeks':'It stays — no more asks'}</button>
        </div>`
        :readOnly()?'':`<div style="display:flex;gap:16px;margin-top:7px;align-items:baseline">
          <button class="text-action" onclick="event.stopPropagation();openPlace(${jsq(w.n)})">Why this →</button>
          <button class="text-action" style="margin-left:auto" onclick="event.stopPropagation();letGoWant(${jsq(w.n)})">Let it go</button>
        </div>`}
      </div>`}).join('')}
    <div class="muted small serif" style="font-style:italic;margin:0 2px 4px">Letting go is not a skip — no mark against the place; it simply stops waiting.</div>`
    :`<div class="empty">Nothing waiting. A save — from the map, the list, a café's page — lands here.</div>`;
  const S=getPref('placeSkips',{})||{};
  const skipRows=Object.values(S).map(rec=>{const info=skipInfo(rec.name);if(!info)return null;
    const dLeft=Math.max(1,Math.ceil(SKIP_DAYS-info.age));
    return info.active
      ?`<div class="gtab"><span class="nm num" style="width:58px">${dLeft}d left</span><span class="ds">${esc(rec.name)} — skipped ${agoWord(rec.at)}; fades in ${dLeft} day${dLeft===1?'':'s'}</span>${readOnly()?'':`<button class="text-action" style="flex:none" onclick="discUnskip(${jsq(rec.name)})">clear now</button>`}</div>`
      :`<div class="gtab"><span class="nm num" style="width:58px">faded</span><span class="ds">${esc(rec.name)} — the skip faded; it is back in the results, read again</span></div>`;
  }).filter(Boolean).join('');
  const skips=`<div class="section-head"><h2>Standing skips</h2></div>
    ${skipRows||`<div class="empty">No standing skips. A skip quiets a place for two weeks, waits here, and fades on its own.</div>`}
    <div class="muted small serif" style="font-style:italic;margin:6px 2px 0">A skip steps a place back — never its kind. When you want fewer of a kind, say so at the moment you skip.</div>`;

  const leanRows=leansList.map(l=>{const active=l.age<LEAN_DAYS,dLeft=Math.max(1,Math.ceil(LEAN_DAYS-l.age));
    return active
      ?`<div class="gtab"><span class="nm num" style="width:58px">${dLeft}d left</span><span class="ds">${esc(l.label)} places weigh less — from skipping ${esc(l.from)}; fades in ${dLeft} day${dLeft===1?'':'s'}</span>${readOnly()?'':`<button class="text-action" style="flex:none" onclick="clearLean(${jsq(l.tag)})">clear now</button>`}</div>`
      :`<div class="gtab"><span class="nm num" style="width:58px">faded</span><span class="ds">${esc(l.label)} — the lean faded; full weight again</span></div>`}).join('');
  const cap=leansList.filter(l=>l.age<LEAN_DAYS).length>=3?`<div class="muted small serif" style="font-style:italic;margin:4px 2px 0">Three leans of a kind is the cap — further skips deepen nothing.</div>`:'';
  const leans=`<div class="section-head"><h2>Standing trait leans</h2></div>
    ${leanRows||`<div class="empty">No standing leans. "Fewer like it" tips a kind down for two weeks — it fades on the same curve as a skip.</div>`}${cap}`;
  return`<div class="section-head"><h2>Want to go</h2><span class="n-note num">${wants.length?'n='+wants.length:''}</span></div>`+wantsHTML+skips+leans;
}

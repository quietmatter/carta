      <div class="b">That's the whole setup. You're done here.</div>
    </li>
  </ol>

  <div class="rule hard">
    <div class="t">The anti-rule</div>
    <div class="b">Nothing may require your attention while coffee is being made, except the timer. You log <em>after</em>. If this ever feels like homework at 7am, the app is wrong — not you.</div>
  </div>

  <h2>The daily loop</h2>
  <div class="loop">
    <div class="s"><div class="k">tap</div><div class="v">Log a brew</div></div>
    <div class="a">→</div>
    <div class="s"><div class="k">opens as</div><div class="v">last time</div></div>
    <div class="a">→</div>
    <div class="s"><div class="k">turn</div><div class="v">one dial</div></div>
    <div class="a">→</div>
    <div class="s"><div class="k">3 taps</div><div class="v">the cup</div></div>
  </div>
  <div class="muted small">The brew screen pre-fills from your last brew on that bag — grind, dose, water, temp, time, technique. Change the one thing you actually changed. Save.</div>

  <div class="card" style="margin-top:12px">
    <strong class="small">The timer</strong>
    <div class="muted small">Start it when you pull. Hit <strong>Use time ↓</strong> and it drops into the time dial. Don't transcribe numbers by hand.</div>
    <strong class="small" style="display:block;margin-top:10px">Technique is free text</strong>
    <div class="muted small">Type <em>soup</em>, <em>turbo</em>, <em>9-bar</em>, <em>allongé</em> — whatever it actually was. Past entries autocomplete. It's a node, not an enum: don't force today's brew into last year's vocabulary.</div>
    <strong class="small" style="display:block;margin-top:10px">Instrumentation — be honest</strong>
    <div class="muted small" style="margin-top:3px">
      <span class="chip">measured</span> read off a scale ·
      <span class="chip">estimated</span> eyeballed ·
      <span class="chip">recalled</span> from memory
    </div>
    <div class="muted small" style="margin-top:5px">A recalled brew is a valid record. A recalled brew labelled <em>measured</em> is poison. Every claim this app ever makes carries this flag — lie here and you're lying to yourself in six months.</div>
  </div>

  <div class="card">
    <strong class="small">The cup — hedonic 1–9</strong>
    <div class="muted small">One tap, optional descriptors, optional line. No opinion? Hit <strong>Skip impression</strong> — the brew still records. Don't invent a score to satisfy a form.</div>
    <strong class="small" style="display:block;margin-top:10px">Café cup — as fast or as full as you like</strong>
    <div class="muted small">A shop and one tap is a valid record — always auto-flagged <span class="chip">recalled</span> and down-weighted honestly. But there's room now: style and a drink chip, the beans they poured — give the roaster's site and CARTA reads its brand — city, price, and an <em>order-again</em> verdict. Every café you log builds up in the <strong>Cafés</strong> tab — your passport, with your average, your usual, and what you've spent, per shop.</div>
    <strong class="small" style="display:block;margin-top:10px">The Register — one entry per café</strong>
    <div class="muted small">Name a shop and it enters the Register: one shared entry per café — name, city, pin, branding — read by every keeper on this device and on your sync server. Jane's Fighting Ships, for cafés. Anyone can amend an entry; a sighting fills blanks, never erases, and the entry remembers who entered it first. Cups stay yours — only the place is common knowledge.</div>
    <strong class="small" style="display:block;margin-top:10px">The reach — four depths, no ladder</strong>
    <div class="muted small">○ Counter · ◎ House · ◉ Roastery · ● Origin — how far back a cup reads, from the customer's side of the counter. A description of the café, never a score. You attest facts (the bag named, the methods on the menu), the depth follows from the record, and the newest sighting carries each fact. Tap any badge for the primer.</div>
  </div>

  <h2>The rooms</h2>
  <div class="muted small" style="margin:0 2px 8px">CARTA opens a room at a time — the ladder in <strong>More</strong> opens the rest whenever you ask. Nothing is ever taken away.</div>
  <div class="card">
    ${[['Find','Other people\'s cups — the stream, the places worth the walk, whose taste matches yours. Read only, always. You never have to log a thing to use it.'],
       ['Café','The cup away. Remember a place with one tap; every café you keep builds a page of its own.'],
       ['Home','The cup you make. Every brew opens where the last one left off — change one thing at a time.'],
       ['Record','The through-line. Home and away side by side, the dial-in trace, every cup.'],
       ['More','Your record and its counts, the ladder of rooms, your circle, sync, export, the changelog.']]
      .map(([nm,ds])=>`<div class="gtab"><span class="nm">${nm}</span><span class="ds">${ds}</span></div>`).join('')}
  </div>

  <h2>The rest chip</h2>
  <div class="muted small">On every bag with a roast date. An opinion, shown as one — a heuristic by roast level, not a measurement.</div>
  <table class="gt">
    <tr><td>Light · Light-medium</td><td class="num">7–28 days</td></tr>
    <tr><td>Medium</td><td class="num">5–21 days</td></tr>
    <tr><td>Medium-dark · Dark</td><td class="num">3–14 days</td></tr>
  </table>
  <div class="small" style="line-height:2.1">
    <span class="chip resting num">resting · day 3</span> early — brew it anyway, that's data<br>
    <span class="chip window num">in window · day 11</span> the app thinks now<br>
    <span class="chip past num">day 34 · past window</span> past the heuristic, not past drinking
  </div>

  <h2>Reading the Trace</h2>
  <div class="card">
    <div class="small">Solid line — your grind, brew by brew, chronological. Hollow circles — that brew's hedonic on a 1–9 axis.</div>
    <div class="muted small" style="margin-top:6px">Read it for the shape of your hunting, not for truth. You're looking for one thing: <em>do you overshoot grind and undershoot temp?</em> Most people do.</div>
  </div>
  <div class="rule">
    <div class="t">Grind is only comparable within one Setup</div>
    <div class="b">The Trace will happily draw a line across two Setups if you brewed a bag on both. That line is meaningless. A grind setting without a Setup is a rumour — and one compared <em>across</em> Setups is a rumour with a chart.</div>
  </div>

  <h2>Export. Actually do it.</h2>
  <div class="warn">
    <div class="t">The one that will hurt</div>
    <div class="b">Everything — bags, brews, cups, every user's ledger — lives in this browser's local storage. Clearing site data, a browser reset, a private window, or a storage overflow takes the whole ledger. Unless you've connected a sync server, there is no copy anywhere else. There is no undo.</div>
  </div>
  <div class="small">Export monthly, and after any session you'd hate to lose. Open schema, readable forever, yours. Import has two doors: bring a file in as a <em>new user</em> beside your own record, or <em>replace</em> your ledger wholesale — read the dialog.</div>

  <h2>Users</h2>
  <div class="card">
    <div class="small">Share the device, not the record. Add keepers under <strong>More → Your circle</strong> — each keeps a fully separate record. Tap a keeper to <strong>read</strong> their record (every room, read only, clearly banner-marked) or to <strong>make them active</strong>. And a friend's exported record can be imported as a new keeper, so you can browse their record beside yours.</div>
  </div>

  <h2>Sync — the record, everywhere</h2>
  <div class="card">
    <div class="small">Optional. Connect to a CARTA sync server from <strong>More</strong> (name + passcode; run your own server — one file, zero dependencies, see <code>server/README.md</code>). Your record then follows you across devices, and everyone on the server shows up in your circle — tap to read their record, live from the server. Their café cups also pool into <strong>Find</strong> — one stream, one list of places worth the walk.</div>
    <div class="muted small" style="margin-top:6px">Offline-first, always: no server or no signal changes nothing. Edits queue and sync when the app comes back to the foreground. If two devices log at once, the record merges — both brews survive.</div>
  </div>
  <button class="btn btn-graphite" style="margin-top:10px" onclick="exportJSON()">Export ledger now</button>

  <h2>Phase 0 · the only gate that matters</h2>
  <div class="card">
    <div class="kv"><span class="k">Deadline</span><span class="v">day 60</span></div>
    <div class="kv"><span class="k">Threshold</span><span class="v num">40 brews</span></div>
    <div class="kv"><span class="k">Logged so far</span><span class="v num" style="color:${n>=40?'var(--accent)':'var(--ink)'}">${n}</span></div>
    <div class="kv"><span class="k">If under</span><span class="v" style="color:var(--danger)">stop</span></div>
  </div>
  <div class="muted small">The tell for failure is two weeks of silence around week six — not a bad week, a quiet one. If that happens the answer isn't more schema. No schema saves an unused project.</div>
  <div class="muted small" style="margin-top:6px">And the honest test underneath the count: <em>has this changed a brewing decision you'd otherwise have made wrong?</em> If not by day 120, it's a diary. Fine — but not a business.</div>

  <div class="empty" style="margin-top:6px">We do not sell coffee. We keep the record.</div>
  <button class="btn btn-quiet" onclick="closeSheet()">Close</button>`);
}

/* ============ what's new ============ */
function relBlock(r,latest){
  return `<div class="rel${latest?' latest':''}">
    <div class="rel-h"><span class="rel-v">v${r.v}</span><span class="rel-d">${esc(r.date)}</span>${latest?'<span class="rel-new">new</span>':''}</div>
    <div class="rel-t">${esc(r.title)}</div>
    <ul class="rel-l">${r.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
  </div>`;
}
function openWhatsNew(auto){
  markVersionSeen();
  openSheet(`
  <h3>What's new</h3>
  <div class="sub">CARTA v${APP_VERSION} · the record, better kept${auto?' — here is what changed since you were last in.':''}</div>
  ${CHANGELOG.map((r,i)=>relBlock(r,i===0)).join('')}
  <div class="empty" style="margin-top:2px">We do not sell coffee. We keep the record.</div>
  <button class="btn btn-primary" onclick="closeSheet()">Got it</button>`);
}

/* ============ welcome — the way in (first-run home flow) ============
 * Before it asks anything, it says what CARTA is (the why), then asks the one
 * honest question — how do you take your coffee? — and opens the matching room.
 * The answer sets depth: Reading, Remembering, or Making. Nothing is locked;
 * the ladder in More opens the rest. Gated on firstRun() so returning users
 * never see it; replayable from More (a replay never closes an open room). */
let wcStep=0;
function needsWelcome(){return !readOnly()&&!getPref('onboarded',false)&&firstRun()}
function openWelcome(){wcStep=0;renderWelcome();
  const w=document.getElementById('welcome');w.classList.add('open');w.scrollTop=0}
function closeWelcome(){document.getElementById('welcome').classList.remove('open')}
function wcGo(n){wcStep=n;renderWelcome();const w=document.getElementById('welcome');if(w){w.scrollTop=0;const el=w.querySelector('.wc');if(el)el.scrollTop=0}}
const wcProg=i=>`<div class="wc-prog">${[0,1].map(k=>`<i class="${k<=i?'on':''}"></i>`).join('')}</div>`;
function renderWelcome(){const w=document.getElementById('welcome');if(!w)return;
  w.innerHTML=`<div class="wc">${[wcCover,wcFunnel][wcStep]()}</div>`}

function wcCover(){return `
  <div class="wc-top"><span class="wc-mark">CARTA</span>${wcProg(0)}</div>
  <div class="wc-body">
    <div class="wc-eyebrow wc-rise" style="animation-delay:.04s">A coffee memory</div>
    <h1 class="wc-head wc-rise" style="animation-delay:.12s">One cup.<br>Two contexts.</h1>
    <p class="wc-lede wc-rise" style="animation-delay:.24s">The cup you <em>make</em> and the cup you're <em>served</em> — one record of what you love in either.</p>
    <p class="wc-lede wc-rise" style="animation-delay:.32s">Start as light as you like. CARTA opens up as you want more of it — and never asks for more than you do.</p>
  </div>
  <div class="wc-foot wc-rise" style="animation-delay:.44s">
    <button class="btn btn-primary" onclick="wcGo(1)">Begin</button>
    <button class="wc-skip" onclick="finishWelcome(1,'circle','Welcome. Look around — reading is a whole way to use CARTA.')">Skip — just show me around</button>
  </div>`;}

function wcFunnel(){
  const c=(call,tt,dd,d)=>`<button class="wc-item wc-rise" style="animation-delay:${d}s" onclick="${call}">
      <span class="tx"><span class="tt">${tt}</span><span class="dd">${dd}</span></span>
      <span class="go">&rarr;</span></button>`;
  return `
  <div class="wc-top"><span class="wc-mark">CARTA</span>${wcProg(1)}</div>
  <div class="wc-body">
    <div class="wc-eyebrow wc-rise" style="animation-delay:.04s">Where you'll start</div>
    <h1 class="wc-head sm wc-rise" style="animation-delay:.10s">How do you take your coffee?</h1>
    <div class="wc-list">
      ${c(`finishWelcome(1,'circle','Welcome. Read the record — that\\'s the whole ask.')`,'Someone else makes it','Point me to a good cup — my friends’ finds, the order worth stealing.','.20')}
      ${c(`finishWelcome(2,'cafes','Welcome. A shop and one tap is a whole record.')`,'I want to remember mine','Keep the cafés, the orders and the cups worth going back to.','.27')}
      ${c(`finishWelcome(3,'field','Welcome. Put a coffee on the shelf and brew.')`,'I make my own','Dial in the cup at home — one change at a time, remembered.','.34')}
    </div>
    <div class="wc-note wc-rise" style="animation-delay:.42s">Nothing is locked. This only sets how much of CARTA you see first — the rest opens whenever you ask.</div>
  </div>
  <div class="wc-foot"><button class="wc-skip" onclick="wcGo(0)">&larr; Back</button></div>`;
}

// Commit the answer: open the room, never close one already open.
function finishWelcome(d,t,msg){
  setPref('depth',Math.max(depth(),d));
  setPref('onboarded',true);
  markVersionSeen();                       // welcomed users skip the "what's new" bump too
  closeWelcome();
  go(t);
  if(msg)toast(msg);
}

/* ============ boot ============ */
applyTheme();
regSeed(); // the Register meets every ledger already on this device
catSeed(); // and the catalog spine is normalised from the same ledgers (device-local, unrendered — step 1)
catRepoint(); // then the ledger leans on it: each bag/cup carries the id of its node (additive, reversible — step 2)
const lastBag=D.bags.slice().sort(byNew)[0];
if(lastBag)setAccent(lastBag.roastLevel);
// The deepest open room is where the day starts — Home, else Café, else Find.
tab=defaultTab(depth());
render();
// First run: the welcome flow (the why → the funnel → the one action). Returning
// users skip it and get the changelog on a version bump instead.
if(needsWelcome()){
  setTimeout(openWelcome,140);
}else if(lastSeenVersion()!==APP_VERSION){
  if(firstRun())markVersionSeen();
  else setTimeout(()=>openWhatsNew(true),350);
}
// Sync: on boot, when the network returns, and when the app comes back to the
// foreground (iOS PWAs get no background time — this is the sync heartbeat).
if(SYNC)setTimeout(()=>syncNow(false),400);
window.addEventListener('online',()=>{syncNow(false);_mlDown=false;smapMount()});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){applyTheme();syncNow(false)}});
</script>
</body>
</html>

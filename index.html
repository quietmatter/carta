<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#232019">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>CARTA</title>
<style>
:root{
  --paper:#EFE9DC;
  --paper-2:#E6DFCF;
  --ink:#1C1A16;
  --ink-2:#4A453D;
  --ink-3:#8B8478;
  --graphite:#232019;
  --graphite-2:#2E2A22;
  --line:#D4CCBA;
  --accent:hsl(30,55%,42%);
  --accent-ink:#fff;
  --danger:#8A3324;
  --radius:10px;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
  --serif:Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Inter,Arial,sans-serif;
  font-size:16px;line-height:1.45;
  max-width:560px;margin:0 auto;
  /* Full-height flex column so the app fills the standalone viewport and the
     tab bar settles to the true bottom (dvh avoids the iOS black-translucent
     fixed-position offset that left a gap below the nav). */
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
header.app{
  background:var(--graphite);color:var(--paper);
  padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
  display:flex;justify-content:space-between;align-items:baseline;
  flex:none;z-index:20;
}
header.app h1{font-size:15px;letter-spacing:.35em;font-weight:600}
header.app .sub{font-family:var(--serif);font-style:italic;font-size:12px;color:#A79E8D}
main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
h2{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:22px 0 10px}
h2:first-child{margin-top:4px}
.card{background:#F7F3E9;border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.card.tap{cursor:pointer}
.card.tap:active{background:var(--paper-2)}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.muted{color:var(--ink-3);font-size:13px}
.small{font-size:13px}
.serif{font-family:var(--serif)}
.chip{
  display:inline-block;font-size:11px;letter-spacing:.06em;padding:2px 9px;border-radius:99px;
  border:1px solid var(--line);color:var(--ink-2);font-variant-numeric:tabular-nums;
}
.chip.window{border-color:var(--accent);color:var(--accent);font-weight:600}
.chip.resting{color:var(--ink-3)}
.chip.past{color:var(--danger);border-color:var(--danger)}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.btn{
  display:block;width:100%;text-align:center;padding:15px;border-radius:var(--radius);
  font-size:15px;font-weight:600;letter-spacing:.02em;
}
.btn-primary{background:var(--accent);color:var(--accent-ink)}
.btn-primary:active{filter:brightness(.92)}
.btn-quiet{background:none;border:1px solid var(--line);color:var(--ink-2)}
.btn-quiet:active{background:var(--paper-2)}
.btn-graphite{background:var(--graphite);color:var(--paper)}
.btn-danger{color:var(--danger);border:1px solid var(--danger);background:none}
.btn+.btn{margin-top:8px}
/* forms */
label.f{display:block;margin-bottom:12px}
label.f span.l{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;font-weight:600}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
  background:#FBF8F0;color:var(--ink);appearance:none;-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{min-height:64px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 10px}
/* dial stepper */
.dial{border:1px solid var(--line);border-radius:var(--radius);background:#FBF8F0;padding:8px 6px 10px;margin-bottom:10px;text-align:center;position:relative}
.dial .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.dial .v{font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1.15;margin:2px 0}
.dial .v .u{font-size:12px;color:var(--ink-3);font-weight:400;margin-left:2px}
.dial .ctl{display:flex;justify-content:center;gap:6px}
.dial .ctl button{
  width:52px;height:34px;border:1px solid var(--line);border-radius:8px;background:#F1EBDD;
  font-size:20px;font-weight:500;color:var(--ink-2);
}
.dial .ctl button:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.dial .ticks{position:absolute;top:8px;right:10px;font-size:9px;color:var(--ink-3);letter-spacing:.1em}
.dial .v.tapedit{display:inline-block;cursor:text;border-bottom:1px dotted var(--line)}
.dedit{width:2.7em;min-width:46px;max-width:88%;font:inherit;font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;text-align:center;border:none;background:transparent;color:var(--ink);padding:0}
.dedit:focus{outline:none}
.dcorner{position:absolute;top:6px;right:6px;display:flex;gap:3px}
.dcorner .ut{font-size:10px;font-weight:700;letter-spacing:.02em;padding:2px 5px;border:1px solid var(--line);background:#F1EBDD;color:var(--ink-3);border-radius:6px;cursor:pointer}
.dcorner .ut.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.dialrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* hedonic */
.hedonic{display:flex;gap:5px;justify-content:space-between;margin:6px 0 4px}
.hedonic button{
  flex:1;aspect-ratio:1/1.15;border:1px solid var(--line);border-radius:8px;background:#FBF8F0;
  font-variant-numeric:tabular-nums;font-size:15px;color:var(--ink-2);max-width:46px;
}
.hedonic button.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.desc{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
.desc button{font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:99px;background:#FBF8F0;color:var(--ink-2)}
.desc button.on{background:var(--graphite);color:var(--paper);border-color:var(--graphite)}
/* segmented */
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:12px}
.seg button{flex:1;padding:9px 4px;font-size:13px;background:#FBF8F0;color:var(--ink-2);border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--graphite);color:var(--paper)}
/* timer */
.timer{background:var(--graphite);color:var(--paper);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:12px}
.timer .t{font-size:52px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1.1}
.timer .ctl{display:flex;gap:8px;margin-top:10px}
.timer .ctl button{flex:1;padding:11px;border-radius:8px;border:1px solid #4A453D;color:var(--paper);font-size:14px;font-weight:600}
.timer .ctl button.go{background:var(--accent);border-color:var(--accent)}
/* tab bar */
nav.tabs{
  flex:none;
  background:var(--graphite);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom);border-top:1px solid #3A362C;
}
nav.tabs button{flex:1;padding:11px 0 9px;color:#7E776A;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
nav.tabs button .ic{display:block;font-size:17px;margin-bottom:2px;font-weight:400}
nav.tabs button.on{color:var(--paper)}
/* sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(28,26,22,.5);z-index:40;display:none}
.sheet-bg.open{display:block}
.sheet{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:560px;
  background:var(--paper);border-radius:16px 16px 0 0;z-index:50;
  max-height:92vh;max-height:92dvh;overflow-y:auto;display:none;
  padding:10px 18px calc(20px + env(safe-area-inset-bottom));
  transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.sheet.open{display:block}
/* Grab handle: the visible pill is drawn with ::before, but the element itself
   is a tall, full-width, touch-action:none target so the drag-to-dismiss
   gesture is easy to catch and never fights the browser's own scrolling. */
.sheet .grab{
  height:26px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;
  cursor:grab;touch-action:none;
}
.sheet .grab::before{
  content:"";width:36px;height:4px;background:var(--line);border-radius:2px;
  transition:background .15s,width .15s;
}
.sheet.dragging{transition:none}
.sheet.dragging .grab{cursor:grabbing}
.sheet.dragging .grab::before{background:var(--ink-3);width:46px}
.sheet h3{font-size:16px;font-weight:700;margin-bottom:2px}
.sheet .sub{font-family:var(--serif);font-style:italic;color:var(--ink-3);font-size:13px;margin-bottom:14px}
/* misc */
.bagphoto{width:100%;border-radius:8px;margin-bottom:10px;display:block}
.photozone{
  border:1.5px dashed var(--line);border-radius:var(--radius);padding:18px;text-align:center;
  color:var(--ink-3);font-size:13px;margin-bottom:12px;cursor:pointer;background:#F7F3E9;
}
.thumb{width:48px;height:48px;object-fit:cover;border-radius:6px}
.empty{font-family:var(--serif);font-style:italic;color:var(--ink-3);text-align:center;padding:28px 20px;font-size:14px}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-3)}
.kv .v{font-variant-numeric:tabular-nums;text-align:right}
.n-note{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums}
svg text{font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.toast{
  position:fixed;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:var(--graphite);color:var(--paper);padding:10px 20px;border-radius:99px;font-size:13px;
  z-index:99;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}
.link{color:var(--accent);font-weight:600;font-size:13px}
/* quick start */
ol.steps{list-style:none;counter-reset:s;margin:2px 0 4px}
ol.steps>li{counter-increment:s;position:relative;padding-left:38px;margin-bottom:14px}
ol.steps>li::before{
  content:counter(s);position:absolute;left:0;top:0;width:26px;height:26px;border-radius:99px;
  background:var(--graphite);color:var(--paper);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;
}
ol.steps .t{font-size:14px;font-weight:700;line-height:26px}
ol.steps .b{font-size:13px;color:var(--ink-2);margin-top:1px}
ol.steps .go{font-size:12px;color:var(--accent);font-weight:600;margin-top:5px;display:inline-block}
.rule{border-left:3px solid var(--accent);padding:2px 0 2px 12px;margin:14px 0}
.rule.hard{border-left-color:var(--danger)}
.rule .t{font-size:13px;font-weight:700}
.rule .b{font-size:13px;color:var(--ink-2)}
.warn{border:1px solid var(--danger);border-radius:var(--radius);padding:12px 14px;margin:12px 0;background:#F7F3E9}
.warn .t{font-size:11px;font-weight:700;color:var(--danger);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.warn .b{font-size:13px;color:var(--ink-2)}
.loop{display:flex;align-items:stretch;gap:4px;margin:10px 0 6px}
.loop .s{flex:1;background:#F7F3E9;border:1px solid var(--line);border-radius:8px;padding:8px 3px;text-align:center}
.loop .s .k{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.loop .s .v{font-size:12px;font-weight:600;margin-top:2px;line-height:1.25}
.loop .a{display:flex;align-items:center;color:var(--ink-3);font-size:12px}
.gtab{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);align-items:baseline}
.gtab:last-child{border-bottom:none}
.gtab .ic{width:18px;color:var(--accent);font-size:14px;flex:none;text-align:center}
.gtab .nm{width:50px;font-weight:700;font-size:13px;flex:none}
.gtab .ds{font-size:12px;color:var(--ink-2);flex:1}
.gt{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
.gt td{padding:6px 0;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
.gt td:last-child{text-align:right;color:var(--ink-2)}
.gt tr:last-child td{border-bottom:none}
code{font-family:var(--mono);font-size:12px;background:var(--paper-2);padding:1px 5px;border-radius:4px}
.helpbtn{color:#7E776A;font-size:15px;padding:0 0 0 12px;line-height:1}
.helpbtn:active{color:var(--paper)}
/* café */
.opt{text-transform:none;letter-spacing:0;color:var(--ink-3);font-weight:400;font-size:10px}
.cafeback{background:#F1EBDD;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:8px 11px;font-size:12.5px;color:var(--ink-2);margin:2px 0 12px;font-family:var(--serif);font-style:italic}
.cafeback strong{font-style:normal;color:var(--ink)}
.verdict{display:flex;gap:6px}
.verdict button{flex:1;padding:10px;border:1px solid var(--line);border-radius:8px;background:#FBF8F0;color:var(--ink-2);font-size:13px;font-weight:600}
.verdict button.yes.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.verdict button.no.on{background:var(--ink-2);color:var(--paper);border-color:var(--ink-2)}
.badge{display:inline-block;font-size:10px;letter-spacing:.05em;padding:1px 7px;border-radius:99px;background:var(--accent);color:#fff;font-weight:600;vertical-align:middle}
.badge.ghost{background:none;border:1px solid var(--line);color:var(--ink-3)}
.shopcard .big{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.cupthumb{width:100%;max-height:220px;object-fit:cover;border-radius:8px;margin:2px 0 10px;display:block}
.rowthumb{width:44px;height:44px;object-fit:cover;border-radius:6px;flex:none}
/* multi-user */
.viewbar{
  background:var(--graphite);color:var(--paper);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;
  font-size:13px;gap:10px;
}
.viewbar button{background:var(--accent);color:var(--accent-ink);border-radius:99px;padding:5px 13px;font-size:12px;font-weight:600;flex:none}
/* what's new / changelog */
.rel{border-left:3px solid var(--line);padding:2px 0 2px 14px;margin:0 0 16px}
.rel.latest{border-left-color:var(--accent)}
.rel-h{display:flex;align-items:baseline;gap:8px}
.rel-v{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.rel-d{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.rel-new{font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:#fff;padding:1px 6px;border-radius:99px;font-weight:700}
.rel-t{font-size:14px;font-weight:700;margin:2px 0 4px}
.rel-l{list-style:none;margin:0}
.rel-l li{font-size:13px;color:var(--ink-2);padding:2px 0 2px 14px;position:relative}
.rel-l li::before{content:"—";position:absolute;left:0;color:var(--ink-3)}
</style>
</head>
<body>
<header class="app"><h1>CARTA</h1>
<div style="display:flex;align-items:baseline"><div class="sub" id="who">we keep the record</div>
<button class="helpbtn" onclick="openGuide()" aria-label="Quick start">?</button></div></header>
<main id="main"></main>
<nav class="tabs" id="tabs"></nav>
<div class="sheet-bg" id="sheetbg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>
<input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none">
<input type="file" accept=".json,application/json" id="importInput" style="display:none">

<script>
'use strict';
/* ============ store ============ */
const KEY='carta.v1';           // legacy single-user key — migrated to per-user keys on first boot
const USERS_KEY='carta.users';
const blank={version:1,setups:[],bags:[],brews:[],cups:[],cafeFavs:[],deleted:[],prefs:{},createdAt:new Date().toISOString()};
const clone=o=>JSON.parse(JSON.stringify(o));
const dataKey=id=>KEY+'.'+id;
function loadUsers(){
  try{
    const r=localStorage.getItem(USERS_KEY);
    if(r){const u=JSON.parse(r); if(u&&u.users&&u.users.length&&u.users.some(x=>x.id===u.activeId))return u;}
  }catch(e){}
  // First multi-user boot: adopt any existing single-user ledger as user "Me".
  // Fixed id so a partial migration (quota mid-write) retries onto the same key.
  const u={version:1,users:[{id:'u1',name:'Me',createdAt:new Date().toISOString()}],activeId:'u1'};
  try{
    const legacy=localStorage.getItem(KEY);
    if(legacy!=null)localStorage.setItem(dataKey('u1'),legacy);
    localStorage.setItem(USERS_KEY,JSON.stringify(u));
    if(legacy!=null)localStorage.removeItem(KEY);
  }catch(e){}
  return u;
}
let USERS=loadUsers();
let viewingUserId=USERS.activeId;   // whose ledger is on screen; ≠ activeId means read-only
let D=load();
function load(){try{const r=localStorage.getItem(dataKey(viewingUserId));const d=r?JSON.parse(r):clone(blank);d.prefs=d.prefs||{};return d}catch(e){return clone(blank)}}
function save(){if(readOnly())return;localStorage.setItem(dataKey(viewingUserId),JSON.stringify(D));markDirty()}
// per-user presentation/input preferences (temp unit, timer visibility) — part of the ledger, so they export and sync
const getPref=(k,dflt)=>{const p=D.prefs||{};return p[k]==null?dflt:p[k]};
function setPref(k,v){if(readOnly())return;D.prefs=D.prefs||{};D.prefs[k]=v;save()}
function saveUsers(){localStorage.setItem(USERS_KEY,JSON.stringify(USERS))}
const userById=id=>USERS.users.find(u=>u.id===id);
const viewingUser=()=>userById(viewingUserId)||remoteUserById(viewingUserId);
const readOnly=()=>viewingUserId!==USERS.activeId;
function guard(){if(readOnly()){toast(`Read only — this is ${viewingUser().name}'s ledger`);return true}return false}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byNew=(a,b)=>b.createdAt.localeCompare(a.createdAt);
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),1800)}

/* ============ domain ============ */
const ROAST_LEVELS=['','Light','Light-medium','Medium','Medium-dark','Dark'];
// accent hue derived from roast level (Section 10: the only colour decision)
function roastAccent(lv){
  const map={1:'hsl(36,62%,46%)',2:'hsl(30,58%,42%)',3:'hsl(25,52%,38%)',4:'hsl(20,48%,32%)',5:'hsl(15,42%,26%)'};
  return map[lv]||'hsl(30,55%,42%)';
}
function setAccent(lv){document.documentElement.style.setProperty('--accent',roastAccent(lv))}
// rest window heuristic (days off roast) by roast level — an opinion, shown as one
function restWindow(lv){ if(lv<=2)return[7,28]; if(lv===3)return[5,21]; return[3,14]; }
function daysOff(bag){ if(!bag.roastDate)return null; return Math.floor((Date.now()-new Date(bag.roastDate+'T00:00'))/864e5); }
function restState(bag){
  const d=daysOff(bag); if(d==null)return null;
  const[a,b]=restWindow(bag.roastLevel||3);
  return {d, state: d<a?'resting':(d<=b?'window':'past'), a, b};
}
function restChip(bag){
  const r=restState(bag); if(!r)return'';
  const lbl=r.state==='resting'?`resting · day ${r.d}`:r.state==='window'?`in window · day ${r.d}`:`day ${r.d} · past window`;
  return `<span class="chip ${r.state} num">${lbl}</span>`;
}
const bagName=b=>b?`${b.roaster?b.roaster+' — ':''}${b.name||'(unnamed)'}`:'—';
const setupById=id=>D.setups.find(s=>s.id===id);
const bagById=id=>D.bags.find(b=>b.id===id);
const cupById=id=>D.cups.find(c=>c.id===id);
const brewsOf=bagId=>D.brews.filter(x=>x.bagId===bagId).sort(byNew);
const fmtTime=s=>s==null?'—':`${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;
// temperature: stored canonically in °C; display/entry unit is a preference
const c2f=c=>c*9/5+32, f2c=f=>(f-32)*5/9;
const tempUnit=()=>getPref('tempUnit','C')==='F'?'F':'C';
// parse "m:ss" or plain seconds into seconds
const parseTime=str=>{const s=String(str).trim();if(!s)return null;
  if(s.includes(':')){const[m,sec]=s.split(':');return Math.round((Number(m)||0)*60+(Number(sec)||0))}
  return Math.round(Number(s))};
const DESCRIPTORS=['floral','citrus','berry','stone fruit','tropical','chocolate','nutty','caramel','honey','spice','tea-like','fermented','roasted','vegetal'];
const INSTR=['measured','estimated','recalled'];

  Filter:['pour over','batch brew','V60','Chemex','cold brew','Aeropress'],
  Other:['tea','matcha','affogato','hot chocolate','other'],
};
const cafeCups=()=>D.cups.filter(c=>c.kind==='cafe');
const modeOf=arr=>{if(!arr.length)return null;const m={};let best=null,bn=0;arr.forEach(v=>{m[v]=(m[v]||0)+1;if(m[v]>bn){bn=m[v];best=v}});return best};
const avgHedonic=cups=>{const h=cups.map(c=>c.hedonic).filter(v=>v!=null);return h.length?(h.reduce((a,b)=>a+b,0)/h.length).toFixed(1):null};
const money=n=>n==null?null:'$'+(n%1===0?String(n):n.toFixed(2));
const roasterList=()=>[...new Set([...D.bags.map(b=>b.roaster),...cafeCups().map(c=>c.roaster)].filter(Boolean))];
// escape a string for use inside a single-quoted JS call within a double-quoted HTML attribute
const jsq=s=>`'${String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;')}'`;

function removeCup(id){
  if(guard())return;
  const c=cupById(id); if(!c)return;
  const b=bagById(c.bagId);
  const what=c.kind==='cafe'?`${c.shop||'café'} · ${c.drink||'cup'}`:bagName(b);
  if(!confirm(`Remove this cup from the ledger?\n\n${what}\n\nThis cannot be undone.`))return;
  const i=D.cups.findIndex(x=>x.id===id);
  if(i<0)return;
  D.cups.splice(i,1);
  (D.deleted=D.deleted||[]).push({id,at:new Date().toISOString()}); // tombstone: survives sync merges
  save();closeSheet();render();toast('Cup removed');
}

function traceCard(b){
  const brews=brewsOf(b.id).slice().reverse(); // chronological
  const n=brews.length;
  const hed=brews.map(x=>{const c=D.cups.find(c=>c.brewId===x.id);return c?c.hedonic:null});
  const grinds=brews.map(x=>x.grind).filter(v=>v!=null);
  const gmin=Math.min(...grinds),gmax=Math.max(...grinds);
  const W=480,H=150,P=28;
  const X=i=>n===1?W/2:P+i*(W-2*P)/(n-1);
  const GY=v=>gmax===gmin?H/2:H-P-((v-gmin)/(gmax-gmin))*(H-2*P);
  const HY=v=>H-P-((v-1)/8)*(H-2*P);
  let path='',pts='',hpts='';
  brews.forEach((x,i)=>{ if(x.grind!=null){ path+=(path?'L':'M')+X(i).toFixed(1)+' '+GY(x.grind).toFixed(1)+' ';
    pts+=`<circle cx="${X(i).toFixed(1)}" cy="${GY(x.grind).toFixed(1)}" r="3.5" fill="var(--accent)"/>`;}
    if(hed[i]!=null) hpts+=`<circle cx="${X(i).toFixed(1)}" cy="${HY(hed[i]).toFixed(1)}" r="3" fill="none" stroke="var(--ink-2)" stroke-width="1.5"/>`;
  });
  return `<div class="card">
    <div class="row"><strong>${esc(bagName(b))}</strong><span class="n-note">n=${n}</span></div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%">
      <line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}" stroke="var(--line)"/>
      ${grinds.length?`<text x="${P}" y="14" font-size="10" fill="var(--ink-3)">grind ${gmin}–${gmax}</text>`:''}
      <text x="${W-P}" y="14" font-size="10" fill="var(--ink-3)" text-anchor="end">○ hedonic 1–9</text>
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5"/>${pts}${hpts}
    </svg>
    <div class="n-note">solid — grind setting · hollow — hedonic. Comparable only within one Setup; every point carries its instrumentation.</div>
  </div>`;
}

/* ============ sheet plumbing ============ */
function openSheet(html){const s=document.getElementById('sheet');
  s.innerHTML='<div class="grab" aria-hidden="true"></div>'+html;
  s.classList.remove('dragging');s.style.transform='';document.getElementById('sheetbg').style.opacity='';
  s.classList.add('open');document.getElementById('sheetbg').classList.add('open');
  s.scrollTop=0;}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sheetbg').classList.remove('open');stopTimer(false)}

/* ============ sheet drag-to-dismiss ============ *
 * The grab handle (and the sheet body when scrolled to the top) can be pulled
 * down to dismiss. Follow the finger; on release, snap closed if dragged far
 * enough or flicked quickly, otherwise snap back. Tapping the backdrop still
 * works too — this just makes the handle behave like a real handle.          */
(function initSheetDrag(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetbg');
  let startY=0,dy=0,active=false,dragging=false,startT=0;
  const yOf=e=>e.touches?e.touches[0].clientY:e.clientY;
  const onGrab=e=>!!(e.target.closest&&e.target.closest('.grab'));

  function down(e){
    if(!sheet.classList.contains('open'))return;
    // Only begin a dismiss-drag from the handle, or from the body when the
    // sheet is already scrolled to the top — otherwise let content scroll.
    if(!onGrab(e)&&sheet.scrollTop>0)return;
    active=true;dragging=false;dy=0;startY=yOf(e);startT=Date.now();
  }
  function move(e){
    if(!active)return;
    dy=yOf(e)-startY;
    if(dy<=0){ // pulling up: hand control back to native scroll
      if(dragging){sheet.classList.remove('dragging');sheet.style.transform='';bg.style.opacity='';}
      dragging=false;dy=0;return;
    }
    dragging=true;
    sheet.classList.add('dragging');
    if(e.cancelable)e.preventDefault(); // suppress native scroll while pulling down
    sheet.style.transform=`translateX(-50%) translateY(${dy}px)`;
    bg.style.opacity=String(Math.max(0,1-dy/(sheet.offsetHeight||600)));
  }
  function up(){
    if(!active)return;
    active=false;
    const h=sheet.offsetHeight||600;
    const velocity=dy/Math.max(1,Date.now()-startT); // px per ms
    sheet.classList.remove('dragging'); // restore the snap transition
    if(dragging&&(dy>h*0.28||velocity>0.55)){
      sheet.style.transform='translateX(-50%) translateY(100%)';
      bg.style.opacity='';
      setTimeout(()=>{closeSheet();sheet.style.transform='';bg.style.opacity='';},300);
    }else{
      sheet.style.transform='';
      bg.style.opacity='';
    }
    dragging=false;dy=0;
  }

  sheet.addEventListener('touchstart',down,{passive:true});
  sheet.addEventListener('touchmove',move,{passive:false});
  sheet.addEventListener('touchend',up);
  sheet.addEventListener('touchcancel',up);
  sheet.addEventListener('mousedown',down);
  window.addEventListener('mousemove',move);

const val=id=>{const e=document.getElementById(id);return e?e.value.trim():''};
const numv=id=>{const v=val(id);return v===''?null:Number(v)};

/* ============ dial component ============
 * A stepper you can drive three ways, so a wide range is never a wall of taps:
 *   · tap − / +           one step (fine)
 *   · press-and-hold      auto-repeats and accelerates — fly across 0–2000
 *   · tap the number      type an exact value (numeric keypad; m:ss for time)
 * opts: {kind:'time'} m:ss entry · {hint} scale caption top-right ·
 *       {corner} a control pinned top-right (the °C/°F toggle). */
const dialState={};
let editingDial=null,holdInt=null,holdTO=null;
function dial(id,label,unit,value,step,min,max,dp,opts){
  opts=opts||{};
  dialState[id]={v:value,step,min,max,dp:dp??(String(step).includes('.')?1:0),unit,kind:opts.kind||null};
  const corner=opts.corner?`<div class="dcorner">${opts.corner}</div>`:(opts.hint?`<div class="ticks">${opts.hint}</div>`:'');
  return `<div class="dial">${corner}<div class="l">${label}</div>
    <div class="v num tapedit" id="dv_${id}" onclick="editDial('${id}')">${fmtDial(id)}<span class="u">${unit}</span></div>
    <div class="ctl">
      <button type="button" onpointerdown="holdStart(event,'${id}',-1)">−</button>
      <button type="button" onpointerdown="holdStart(event,'${id}',1)">+</button>
    </div></div>`;
}
function fmtDial(id){const s=dialState[id];if(s.v==null)return '—';
  if(s.kind==='time')return fmtTime(s.v);
  return s.v.toFixed(s.dp).replace(/\.0+$/,'');}   // trim trailing zeros — whole numbers read clean
function unitSpan(id){return `<span class="u">${dialState[id].unit}</span>`}
function redrawDial(id){const el=document.getElementById('dv_'+id);if(el)el.innerHTML=fmtDial(id)+unitSpan(id)}
function setDial(id,v){const s=dialState[id];
  if(v==null||isNaN(v)){redrawDial(id);return}
  if(s.min!=null)v=Math.max(s.min,v); if(s.max!=null)v=Math.min(s.max,v);
  s.v=Number(v.toFixed(s.dp)); redrawDial(id);}
function nudge(id,dir,mult){const s=dialState[id];
  setDial(id,(s.v==null?(s.min??0):s.v)+dir*s.step*(mult||1));
  if(navigator.vibrate)navigator.vibrate(3);}
function holdStop(){if(holdTO){clearTimeout(holdTO);holdTO=null}if(holdInt){clearInterval(holdInt);holdInt=null}
  window.removeEventListener('pointerup',holdStop);window.removeEventListener('pointercancel',holdStop);}
function holdStart(e,id,dir){
  e.preventDefault();
  if(editingDial){const de=document.getElementById('de_'+editingDial);if(de)de.blur();}
  holdStop();
  nudge(id,dir);                                   // the tap itself is one step
  let n=0;
  holdTO=setTimeout(()=>{ holdInt=setInterval(()=>{ n++;
    const mult=n<10?1:n<20?4:n<35?10:25;           // ramp up the longer it's held
    nudge(id,dir,mult); },60); },320);             // brief pause first, so a tap stays a tap
  window.addEventListener('pointerup',holdStop);
  window.addEventListener('pointercancel',holdStop);
}
function editDial(id){
  if(editingDial===id)return;
  const s=dialState[id],el=document.getElementById('dv_'+id);
  editingDial=id;
  const cur=s.v==null?'':(s.kind==='time'?fmtTime(s.v):fmtDial(id));
  el.innerHTML=`<input class="dedit" id="de_${id}" inputmode="${s.kind==='time'?'text':'decimal'}" value="${cur}">`+unitSpan(id);
  const inp=document.getElementById('de_'+id); inp.focus(); inp.select();
  const commit=()=>{if(editingDial!==id)return; editingDial=null;
    const raw=inp.value;
    const v=s.kind==='time'?parseTime(raw):(raw.trim()===''?NaN:Number(raw));
    setDial(id,v);};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'){ev.preventDefault();inp.blur();}
    else if(ev.key==='Escape'){editingDial=null;redrawDial(id);}});
}
// grind dial reads its scale from the Setup — the assembly that owns the grinder.
// Blank Setup fields fall back to the original 0.5-step behavior.
function grindDialHTML(setup,value){
  const st=setup||{};
  const num=(x,d)=>x!=null&&x!==''&&!isNaN(Number(x))?Number(x):d;
  const step=num(st.grindStep,0.5)||0.5, min=num(st.grindMin,0), max=num(st.grindMax,null);
  const dp=String(step).includes('.')?1:0;
  const hint=(st.grindMin!=null&&st.grindMin!==''&&max!=null)?`${min}–${max} · ${step}`:'';
  return dial('grind','Grind',st.grindUnit||'',value,step,min,max,dp,{hint});
}
function lastGrindForSetup(bagId,setupId){
  const b=D.brews.filter(x=>x.setupId===setupId&&x.bagId===bagId).sort(byNew)[0]
       || D.brews.filter(x=>x.setupId===setupId).sort(byNew)[0];
  return b&&b.grind!=null?b.grind:null;
}
function onSetupChange(){
  const setup=setupById(val('b_setup')),box=document.getElementById('dialbox_grind');
  if(!box)return;
  const prior=dialState.grind?dialState.grind.v:null;
  const v=lastGrindForSetup(val('b_bag'),setup?setup.id:null); // grind is only comparable within a Setup
  box.innerHTML=grindDialHTML(setup,v!=null?v:(prior!=null?prior:20));
}
// temp dial renders in the user's unit but the brew always stores canonical °C.
function tempDialHTML(tempC){
  const u=tempUnit(),F=u==='F';
  const v=tempC==null?null:(F?Math.round(c2f(tempC)):Number(tempC.toFixed(1)));
  return dial('temp','Temp','°'+u,v,1,F?140:60,F?212:100,F?0:1,{corner:tempCorner()});
}
function dialTempC(){const s=dialState.temp;if(!s||s.v==null)return null;
  return tempUnit()==='F'?Number(f2c(s.v).toFixed(1)):s.v;}
function tempCorner(){const u=tempUnit();
  return `<span class="ut ${u==='C'?'on':''}" onclick="setTempUnit('C')">°C</span><span class="ut ${u==='F'?'on':''}" onclick="setTempUnit('F')">°F</span>`;}
function setTempUnit(u){
  if(u!=='C'&&u!=='F')return;
  const c=dialTempC();                 // capture canonical °C before flipping
  setPref('tempUnit',u);
  const box=document.getElementById('dialbox_temp');
  if(box)box.innerHTML=tempDialHTML(c);
}

let tInt=null,tStart=null,tElapsed=0;
function timerHTML(){if(getPref('hideTimer',false))return '';   // Argos/scale users time elsewhere — just transcribe the number

function tickTimer(){const s=tElapsed+(tStart?(Date.now()-tStart)/1000:0);
  const el=document.getElementById('tclock');if(el)el.textContent=`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}.${Math.floor(s*10%10)}`;}
function toggleTimer(){
  if(tInt){tElapsed+=(Date.now()-tStart)/1000;tStart=null;clearInterval(tInt);tInt=null;document.getElementById('tbtn').textContent='Start';}
  else{tStart=Date.now();tInt=setInterval(tickTimer,100);document.getElementById('tbtn').textContent='Stop';}
}
function resetTimer(){stopTimer(true);tickTimer()}
function stopTimer(zero){if(tInt){clearInterval(tInt);tInt=null}if(zero){tElapsed=0;tStart=null}else if(tStart){tElapsed+=(Date.now()-tStart)/1000;tStart=null}}
function useTimer(){const s=tElapsed+(tStart?(Date.now()-tStart)/1000:0);

/* ============ sync ============ */
/* Optional server sync. Offline-first: localStorage stays the source of truth;
 * the server (server/README.md) keeps {rev, ledger} per user. Push carries
 * baseRev; a 409 means someone else pushed first — pull, merge by record id,
 * re-push. Any authenticated user can READ every ledger; writes are owner-only. */
const SYNC_KEY='carta.sync', DIR_KEY='carta.remoteDir';
const remoteKey=id=>'carta.remote.'+id;
let SYNC=loadSync();               // {url,token,userId,name,localId,rev,dirty,lastSyncAt} | null
let syncBusy=false,pushTimer=null,syncState='idle',remoteStale=false;   // idle|syncing|offline|auth
function loadSync(){return readJSONLS(SYNC_KEY)}
function saveSync(){if(SYNC)localStorage.setItem(SYNC_KEY,JSON.stringify(SYNC));else localStorage.removeItem(SYNC_KEY)}
function readJSONLS(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch(e){return null}}
const remoteDir=()=>readJSONLS(DIR_KEY)||{users:[]};
const isRemoteView=()=>String(viewingUserId).startsWith('r:');
function remoteUserById(vid){
  if(!String(vid).startsWith('r:'))return null;
  const u=remoteDir().users.find(x=>x.id===String(vid).slice(2));
  return {id:vid,name:u?u.name:'server user',createdAt:(u&&u.updatedAt)||''};
}
const syncedHere=()=>!!(SYNC&&SYNC.token&&USERS.activeId===SYNC.localId);
function markDirty(){if(!syncedHere()||viewingUserId!==USERS.activeId)return;SYNC.dirty=true;saveSync();schedulePush()}
function schedulePush(){clearTimeout(pushTimer);pushTimer=setTimeout(()=>syncNow(false),2000)}

/* merge: union by record id per collection; edited records carry updatedAt and
 * the newer one wins (ties → local). Tombstones in `deleted` subtract removed
 * cups so a removal survives merging. Output is canonical (sorted) so both
 * devices converge on an identical serialization. */
function mergeColl(loc,rem){
  const m=new Map();(rem||[]).forEach(r=>m.set(r.id,r));
  (loc||[]).forEach(l=>{const r=m.get(l.id);if(!r||((l.updatedAt||'')>=(r.updatedAt||'')))m.set(l.id,l)});
  return [...m.values()].sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||'')||String(a.id).localeCompare(String(b.id)));
}
function mergeLedgers(loc,rem){
  if(!rem)return loc;
  const out=clone(blank);
  const dead=new Map();[...(rem.deleted||[]),...(loc.deleted||[])].forEach(t=>dead.set(t.id,t));
  out.deleted=[...dead.values()].sort((a,b)=>String(a.id).localeCompare(String(b.id)));
  ['setups','bags','brews','cups'].forEach(k=>out[k]=mergeColl(loc[k],rem[k]).filter(r=>!dead.has(r.id)));
  const f=new Map();[...(rem.cafeFavs||[]),...(loc.cafeFavs||[])].forEach(x=>f.set(String(x).toLowerCase(),x));
  out.cafeFavs=[...f.values()].sort((a,b)=>a.localeCompare(b));
  out.version=loc.version||1;
  out.createdAt=[loc.createdAt,rem.createdAt].filter(Boolean).sort()[0]||out.createdAt;
  return out;
}

async function api(path,method,body){
  let r;
  try{
    r=await fetch(SYNC.url.replace(/\/+$/,'')+path,{method:method||'GET',
      headers:{'Content-Type':'application/json',...(SYNC.token?{Authorization:'Bearer '+SYNC.token}:{})},
      body:body===undefined?undefined:JSON.stringify(body)});
  }catch(e){throw{offline:true}}
  const data=await r.json().catch(()=>null);
  if(r.status===401){authLost();throw{auth:true}}
  return {status:r.status,body:data};
}
function authLost(){if(!SYNC)return;SYNC.token=null;saveSync();syncState='auth';paintSync();toast('Sync signed out — sign in again from the Ledger tab')}

// Operate on the synced user's stored ledger directly, so sync stays correct
// even while the screen is showing someone else's ledger read-only.
function readOwnStored(){return readJSONLS(dataKey(SYNC.localId))||clone(blank)}
function writeOwnStored(led){
  localStorage.setItem(dataKey(SYNC.localId),JSON.stringify(led));
  if(viewingUserId===SYNC.localId){D=led;render()}
}
async function syncNow(manual){
  if(!SYNC||!SYNC.url)return;
  if(!SYNC.token){if(manual)openSyncSheet(true);return}
  if(!syncedHere()||syncBusy)return;
  syncBusy=true;syncState='syncing';paintSync();
  try{
    let local=readOwnStored();
    const meta=await api(`/api/ledgers/${SYNC.userId}?meta=1`);
    if(meta.status===200&&meta.body.rev>SYNC.rev){
      const full=await api(`/api/ledgers/${SYNC.userId}`);
      if(full.status===200&&full.body.ledger){
        const merged=mergeLedgers(local,full.body.ledger);
        SYNC.rev=full.body.rev;
        if(JSON.stringify(merged)!==JSON.stringify(full.body.ledger))SYNC.dirty=true;
        local=merged;writeOwnStored(local);
        toast('Ledger updated from server');
      }
    }
    let tries=0;
    while(SYNC.dirty&&tries<3){
      tries++;
      const r=await api(`/api/ledgers/${SYNC.userId}`,'PUT',{baseRev:SYNC.rev,ledger:local});
      if(r.status===200){SYNC.rev=r.body.rev;SYNC.dirty=false}
      else if(r.status===409){local=mergeLedgers(local,r.body.ledger);SYNC.rev=r.body.rev;writeOwnStored(local)}
      else break;
    }
    if(SYNC.dirty&&manual)toast('Sync conflict — will retry');
    try{
      const dir=await api('/api/users');
      if(dir.status===200)localStorage.setItem(DIR_KEY,JSON.stringify({fetchedAt:new Date().toISOString(),users:dir.body.users}));
    }catch(e){}
    SYNC.lastSyncAt=new Date().toISOString();syncState='idle';
  }catch(e){
    if(!(e&&e.auth)){syncState='offline';if(manual)toast('Server unreachable — working locally')}
  }finally{syncBusy=false;saveSync();paintSync()}
}

/* --- sync UI --- */
function fmtAgo(iso){
  if(!iso)return 'never';
  const s=(Date.now()-new Date(iso))/1000;
  if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}
function syncLineHTML(){
  if(!SYNC.token)return `<span style="color:var(--danger)">●</span> signed out`;
  if(syncState==='syncing')return `<span style="color:var(--accent)">●</span> syncing…`;
  if(syncState==='offline')return `<span style="color:var(--ink-3)">●</span> offline — working locally`;
  return `<span style="color:var(--accent)">●</span> synced ${fmtAgo(SYNC.lastSyncAt)} · rev ${SYNC.rev}${SYNC.dirty?' · changes pending':''}`;
}
function paintSync(){const el=document.getElementById('syncline');if(el)el.innerHTML=syncLineHTML()}
function vSyncSection(){
  if(!SYNC)return `
  <h2>Sync</h2>
  <div class="muted small serif" style="font-style:italic;margin:2px 2px 10px">Optional. Connect to a CARTA sync server and your ledger follows you across devices — and everyone on the server can view (never edit) each other's records.</div>
  <button class="btn btn-quiet" onclick="openSyncSheet(false)">Connect to a sync server</button>`;
  if(USERS.activeId!==SYNC.localId)return `
  <h2>Sync</h2>
  <div class="card small muted">Sync on this device is connected as <strong>${esc(SYNC.name)}</strong> — a different user. Switch to them to sync.</div>`;
  return `

    <div class="kv"><span class="k">Server</span><span class="v" style="font-family:var(--mono);font-size:12px">${esc(SYNC.url)}</span></div>

    <div class="kv"><span class="k">Status</span><span class="v" id="syncline">${syncLineHTML()}</span></div>

}
function openSyncSheet(loginOnly){
  const me=userById(USERS.activeId);
  openSheet(`
  <h3>${loginOnly?'Sign in to sync':'Connect to a sync server'}</h3>
  <div class="sub">Your ledger, on every device. Everyone on the server can view — never edit — each other's records.</div>
  <label class="f"><span class="l">Server URL</span><input type="text" id="sy_url" value="${esc(SYNC?SYNC.url:'')}" placeholder="https://sync.example.com" inputmode="url" autocapitalize="off" autocorrect="off"></label>
  <div class="grid2">
    <label class="f"><span class="l">Name</span><input type="text" id="sy_name" value="${esc(SYNC?SYNC.name:(me?me.name:''))}" autocapitalize="off"></label>
    <label class="f"><span class="l">Passcode</span><input type="password" id="sy_pass" placeholder="min 4 characters"></label>
  </div>
  <div class="muted small" style="margin-bottom:10px">Servers must be <strong>https</strong> (localhost is fine for testing). Run your own with one command — see <code>server/README.md</code> in the CARTA repo.</div>
  ${loginOnly?'':`<button class="btn btn-primary" onclick="connectSync('register')">Create account &amp; sync</button>`}
  <button class="btn ${loginOnly?'btn-primary':'btn-quiet'}" onclick="connectSync('login')">Sign in</button>`);
}
async function connectSync(mode){
  let url=val('sy_url').replace(/\/+$/,'');
  const name=val('sy_name'),pass=(document.getElementById('sy_pass')||{}).value||'';
  if(!url){toast('Server URL required');return}
  if(!/^https?:\/\//.test(url))url='https://'+url;
  if(/^http:\/\//.test(url)&&!/^http:\/\/(localhost|127\.0\.0\.1)/.test(url)){toast('Plain http only works for localhost — use https');return}
  if(!name||pass.length<4){toast('Name and a passcode of 4+ characters');return}
  let r;
  try{
    const res=await fetch(url+'/api/'+mode,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,passcode:pass})});
    r={status:res.status,body:await res.json().catch(()=>null)};
  }catch(e){toast('Could not reach that server');return}
  if(r.status===409){toast('Name taken — sign in instead');return}
  if(r.status===401){toast('Wrong name or passcode');return}
  if(r.status!==200&&r.status!==201){toast((r.body&&r.body.message)||'Server refused');return}
  SYNC={url,token:r.body.token,userId:r.body.userId,name:r.body.name,
    localId:USERS.activeId,rev:0,dirty:true,lastSyncAt:null};
  const me=userById(USERS.activeId);if(me){me.remoteId=r.body.userId;saveUsers()}
  saveSync();closeSheet();render();toast('Connected — syncing');
  syncNow(true);
}
function disconnectSync(){
  if(!confirm('Disconnect from the sync server?\n\nYour ledger stays on this device (and on the server). Only the connection is removed.'))return;
  SYNC=null;saveSync();
  try{
    localStorage.removeItem(DIR_KEY);
    Object.keys(localStorage).filter(k=>k.startsWith('carta.remote.')).forEach(k=>localStorage.removeItem(k));
  }catch(e){}
  render();toast('Sync disconnected');
}

/* --- remote users: directory + read-only viewing --- */
function remoteDirUsers(){
  if(!SYNC)return[];
  const bound=new Set(USERS.users.map(u=>u.remoteId).filter(Boolean));
  return remoteDir().users.filter(u=>u.id!==SYNC.userId&&!bound.has(u.id));
}
function openRemoteUserSheet(id){
  const u=remoteDir().users.find(x=>x.id===id);if(!u)return;
  openSheet(`
  <h3>${esc(u.name)}</h3>
  <div class="sub">on the sync server${u.updatedAt?` · last push ${fmtAgo(u.updatedAt)}`:''}</div>

    <div class="kv"><span class="k">Bags</span><span class="v num">${u.counts.bags}</span></div>
    <div class="kv"><span class="k">Brews</span><span class="v num">${u.counts.brews}</span></div>

}
async function viewRemote(id){
  if(!SYNC||!SYNC.token){toast('Connect to sync first');return}
  let led=null,stale=false;
  try{
    const r=await api(`/api/ledgers/${id}`);
    if(r.status===200&&r.body.ledger){
      led=r.body.ledger;
      cacheRemote(id,{rev:r.body.rev,updatedAt:r.body.updatedAt,fetchedAt:new Date().toISOString(),ledger:led});
    }
    else if(r.status===200){toast('No ledger on the server yet');return}
    else{toast('Could not fetch their ledger');return}
  }catch(e){
    if(e&&e.auth)return;
    const c=readJSONLS(remoteKey(id));
    if(c&&c.ledger){led=c.ledger;stale=c.fetchedAt||true}
    else{toast('Server unreachable and no cached copy');return}
  }
  remoteStale=stale;
  viewingUserId='r:'+id;D=led;closeSheet();go('field');
  toast(`Viewing ${viewingUser().name}'s ledger`);
}
// Cache a remote ledger for offline re-viewing; photos make these heavy, so on
// quota pressure evict other remote caches and, failing that, skip the cache —
// the in-memory view still works.
function cacheRemote(id,obj){
  const k=remoteKey(id),s=JSON.stringify(obj);
  try{localStorage.setItem(k,s)}
  catch(e){
    try{
      Object.keys(localStorage).filter(x=>x.startsWith('carta.remote.')&&x!==k).forEach(x=>localStorage.removeItem(x));
      localStorage.setItem(k,s);
    }catch(e2){}
  }
}

/* ============ what's new ============ */
function relBlock(r,latest){
  return `<div class="rel${latest?' latest':''}">
    <div class="rel-h"><span class="rel-v">v${r.v}</span><span class="rel-d">${esc(r.date)}</span>${latest?'<span class="rel-new">new</span>':''}</div>
    <div class="rel-t">${esc(r.title)}</div>
    <ul class="rel-l">${r.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
  </div>`;
}
function openWhatsNew(auto){
  markVersionSeen();
  openSheet(`
  <h3>What's new</h3>
  <div class="sub">CARTA v${APP_VERSION} · the record, better kept${auto?' — here is what changed since you were last in.':''}</div>

  <div class="empty" style="margin-top:2px">We do not sell coffee. We keep the record.</div>

/* ============ boot ============ */
const lastBag=D.bags.slice().sort(byNew)[0];
if(lastBag)setAccent(lastBag.roastLevel);
render();
// Version tracker: greet returning users with the changelog on a version bump.
// Brand-new users get onboarding instead — just mark this version as seen for them.
if(lastSeenVersion()!==APP_VERSION){
  if(firstRun())markVersionSeen();
  else setTimeout(()=>openWhatsNew(true),350);
}
// Sync: on boot, when the network returns, and when the app comes back to the
// foreground (iOS PWAs get no background time — this is the sync heartbeat).
if(SYNC)setTimeout(()=>syncNow(false),400);
window.addEventListener('online',()=>syncNow(false));
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')syncNow(false)});

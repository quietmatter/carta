// Keep the stream current: re-pull the directory and any ledger whose rev moved.
// Throttled, quiet, and offline-safe — the cached copies simply stand.
let circleBusy=false,circleFreshAt=0;
async function circleRefresh(){
  if(!SYNC||!SYNC.token||circleBusy||Date.now()-circleFreshAt<60e3)return;
  circleBusy=true;circleFreshAt=Date.now();
  let changed=false;
  try{
    const dir=await api('/api/users');
    if(dir.status===200){
      if(JSON.stringify(dir.body.users)!==JSON.stringify(remoteDir().users))changed=true;
      localStorage.setItem(DIR_KEY,JSON.stringify({fetchedAt:new Date().toISOString(),users:dir.body.users}));
    }
    for(const u of remoteDirUsers()){
      const c=readJSONLS(remoteKey(u.id));
      const meta=await api(`/api/ledgers/${u.id}?meta=1`);
      if(meta.status!==200||(c&&c.rev===meta.body.rev))continue;
      const full=await api(`/api/ledgers/${u.id}`);
      if(full.status===200&&full.body.ledger){
        cacheRemote(u.id,{rev:full.body.rev,updatedAt:full.body.updatedAt,fetchedAt:new Date().toISOString(),ledger:full.body.ledger});changed=true;
      }
    }
  }catch(e){/* offline or signed out — the cached stream stands */}
  finally{circleBusy=false}
  if(changed)regSeed(); // fresh ledgers may carry cafés the Register hasn't met
  if(changed&&tab==='circle'&&!document.getElementById('sheet').classList.contains('open')&&document.activeElement!==document.getElementById('circleSearch'))render();
}

  return `<div class="card tap" onclick="openCircleCup(${jsq(c._src)},${jsq(c.id)})">
    <div style="display:flex;gap:10px">
      ${c.photo?`<img class="rowthumb" src="${c.photo}">`:''}
      <div style="flex:1;min-width:0">
        <div class="row"><span class="small"><strong>${esc(c._who)}</strong><span class="muted"> · ${esc(c.shop||'a café')}${c.city?`, ${esc(c.city)}`:''}</span></span>
          <span class="num" style="font-size:20px;font-weight:700;color:var(--accent)">${c.hedonic??'—'}</span></div>
        <div class="muted small">${esc(c.drink||'as served')}${beans?` · ${beans}`:''}${verdict}</div>

}

function vCircle(){
  const sources=circleSources();
  // Nothing to read and no places on the record — the way in stays a pitch.
  if(!sources.length&&!REG.entries.length)return `
    <div class="empty-hero">
      <div class="eyebrow">The cup elsewhere</div>
      <h2>Find the next good cup.</h2>
      <p>You don't have to log a thing. Read what the people you trust are drinking — search it, sort it by who's near, steal the order.</p>
      ${SYNC?'':`<button class="btn btn-primary" onclick="openSyncSheet(false)">Connect to a sync server</button>`}
      <button class="btn ${SYNC?'btn-primary':'btn-quiet'}" onclick="openUserForm()">Add a user on this device</button>
    </div>
    <div class="card">
      <strong class="small">How this works</strong>
      <div class="muted small">One of your people runs a CARTA sync server — one file, zero dependencies. Sign in with a name and a passcode, and everyone on it can read (never edit) each other's records. Their café cups become your map.</div>
    </div>
    <div class="pinned">New to the language? <a class="link" onclick="openCupPrimer()">How to read a cup</a></div>
    <div class="qm-seal">Friends<span class="em">Read the record. Steal the order. Go.</span></div>`;
  setTimeout(circleRefresh,60); // quiet background freshness — re-renders only if something moved
  const q=(circleQuery||'').trim();
  const cities=circleCities();
  const lens=cities.length||nearOn?`<div class="lens">
    <button class="chip${nearOn?' on':''}" onclick="toggleNear()">Near you</button>
    ${cities.slice(0,8).map(c=>`<button class="chip${normName(cityLens)===normName(c)&&!nearOn?' on':''}" onclick="setCityLens(${jsq(c)})">${esc(c)}</button>`).join('')}
  </div>`:'';
  const head=`
    <div class="hero">
      <div class="eyebrow">The cup elsewhere</div>
      <h2>Find the next good cup.</h2>
      <div class="origin">${nearOn?'Near you now':cityLens?esc(cityLens):`${sources.length} record${sources.length===1?'':'s'} in reach`} — read only, always. <a class="link" onclick="openCupPrimer()">How to read a cup</a></div>
    </div>
    <input type="text" id="circleSearch" value="${esc(circleQuery)}" oninput="circleSearchInput()" placeholder="Search a café, a city, a roaster, a note" autocapitalize="off" style="border:1px solid var(--line-strong);padding:11px 13px;margin:2px 0 10px;font-family:var(--sans);font-size:15px">
    ${lens}
    <div id="circleResults">${q?circleResultsHTML(circleQuery):''}</div>`;
  if(q)return head+`<div class="qm-seal">Friends<span class="em">Read the record. Steal the order. Go.</span></div>`;
  // the discovery surface, scoped to the active lens
  const recs=recommendations();
  const aff=tasteAffinity();
  const cups=circleCups().filter(c=>inLens(c.city));
  const beans=circleBeans();
  const wants=(D.cafeWants||[]).slice();
  return head+`
    ${recs.length?`<div class="section-head"><h2>Worth the walk, for you</h2><span class="n-note">n=${recs.length}</span></div>
    <div class="muted small serif" style="font-style:italic;margin:0 2px 10px">${nearOn?'Nearest first — cafés you haven\'t kept.':'Cafés you haven\'t kept, ranked toward the people whose taste runs closest to yours.'}</div>
    ${recs.slice(0,8).map(recCard).join('')}`:''}
    ${aff.length?`<div class="section-head"><h2>Whose palate matches yours</h2></div>
    <div class="muted small serif" style="font-style:italic;margin:0 2px 10px">On the cafés you've both kept — the shape of an agreement, not a verdict.</div>
    ${aff.slice(0,4).map(a=>`<div class="card tap" onclick="circleView(${jsq(a.src)})">
      <div class="row"><span class="small"><strong>${esc(a.name)}</strong> <span class="badge${a.close==='close'?'':' ghost'}">${a.close}</span></span><span class="num muted small">±${a.delta.toFixed(1)} · ${a.shared} shared</span></div>
      <div class="muted small">You land within ${a.delta.toFixed(1)} of each other across ${a.shared} shared café${a.shared>1?'s':''} — read their record.</div>
    </div>`).join('')}`:''}
    ${cups.length?`<div class="section-head"><h2>The stream</h2><span class="n-note">n=${cups.length}</span></div>
    ${cups.slice(0,20).map(feedRow).join('')}`
    :`<div class="empty">${cityLens?`No café cups in ${esc(cityLens)} yet.`:'No café cups on anyone\'s record yet. The stream begins with their next cup out.'}</div>`}
    ${beans.length?`<div class="section-head"><h2>Beans worth chasing</h2><span class="n-note">n=${beans.length}</span></div>
    ${beans.slice(0,6).map(beanRow).join('')}`:''}
    ${wants.length?`<div class="section-head"><h2>Want to go</h2><span class="n-note">n=${wants.length}</span></div>
    ${wants.map(wantCard).join('')}`:`<div class="section-head"><h2>Want to go</h2></div>
    <div class="empty">Saved places land here. Open a café worth the walk and keep it for later.</div>`}
    <div class="qm-seal">Friends<span class="em">Read the record. Steal the order. Go.</span></div>`;
}

/* ============ quick start ============ */
const firstRun=()=>!D.setups.length&&!D.bags.length&&!D.cups.length;
function openGuide(){
  const n=D.brews.length;
  openSheet(`
  <h3>Quick start</h3>

      The app refuses to log a brew until one exists. That refusal is deliberate.</div>

  <div class="loop">
    <div class="s"><div class="k">tap</div><div class="v">Log a brew</div></div>
    <div class="a">→</div>
    <div class="s"><div class="k">opens as</div><div class="v">last time</div></div>
    <div class="a">→</div>
    <div class="s"><div class="k">turn</div><div class="v">one dial</div></div>

/* ============ what's new ============ */
function relBlock(r,latest){
  return `<div class="rel${latest?' latest':''}">
    <div class="rel-h"><span class="rel-v">v${r.v}</span><span class="rel-d">${esc(r.date)}</span>${latest?'<span class="rel-new">new</span>':''}</div>
    <div class="rel-t">${esc(r.title)}</div>
    <ul class="rel-l">${r.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
  </div>`;
}
function openWhatsNew(auto){
  markVersionSeen();
  openSheet(`
  <h3>What's new</h3>
  <div class="sub">CARTA v${APP_VERSION} · the record, better kept${auto?' — here is what changed since you were last in.':''}</div>
  ${CHANGELOG.map((r,i)=>relBlock(r,i===0)).join('')}
  <div class="empty" style="margin-top:2px">We do not sell coffee. We keep the record.</div>
  <button class="btn btn-primary" onclick="closeSheet()">Got it</button>`);
}

/* ============ welcome — the way in (first-run home flow) ============
 * Before it asks anything, it says what CARTA is (the why), then funnels by
 * intent (home / café / both) and drops the user on the one aligned action.
 * Gated on firstRun() so returning users never see it; replayable from Ledger.
 * intent is a pref, so it exports/syncs and picks the default screen thereafter. */
let wcStep=0,wcIntent=null;
const INTENT_TAB={home:'field',cafe:'cafes',both:'field'};
function needsWelcome(){return !readOnly()&&!getPref('onboarded',false)&&firstRun()}
function openWelcome(){wcStep=0;wcIntent=getPref('intent',null);renderWelcome();
  const w=document.getElementById('welcome');w.classList.add('open');w.scrollTop=0}
function closeWelcome(){document.getElementById('welcome').classList.remove('open')}
function wcGo(n){wcStep=n;renderWelcome();const w=document.getElementById('welcome');if(w){w.scrollTop=0;const el=w.querySelector('.wc');if(el)el.scrollTop=0}}
function wcPick(intent){wcIntent=intent;wcGo(2)}
const wcProg=i=>`<div class="wc-prog">${[0,1,2].map(k=>`<i class="${k<=i?'on':''}"></i>`).join('')}</div>`;
function renderWelcome(){const w=document.getElementById('welcome');if(!w)return;
  w.innerHTML=`<div class="wc">${[wcCover,wcFunnel,wcRamp][wcStep]()}</div>`}

function wcCover(){return `
  <div class="wc-top"><span class="wc-mark">CARTA</span>${wcProg(0)}</div>
  <div class="wc-body">
    <div class="wc-eyebrow wc-rise" style="animation-delay:.04s">A Quiet Matter record</div>
    <h1 class="wc-head wc-rise" style="animation-delay:.12s">One cup.<br>Two contexts.</h1>
    <p class="wc-lede wc-rise" style="animation-delay:.24s">A coffee memory that gives the cup you <em>make</em> and the cup you're <em>served</em> the same weight.</p>
    <p class="wc-lede wc-rise" style="animation-delay:.32s">Offline, single file, yours — full export, open schema, no lock-in. The product is the record.</p>
  </div>
  <div class="wc-foot wc-rise" style="animation-delay:.44s">
    <button class="btn btn-primary" onclick="wcGo(1)">Begin</button>
    <button class="wc-skip" onclick="finishWelcome(null,null)">Skip — I'll find my way</button>
  </div>`;}

function wcFunnel(){
  const c=(intent,tt,dd,d)=>`<button class="wc-item wc-rise" style="animation-delay:${d}s" onclick="wcPick('${intent}')">
      <span class="tx"><span class="tt">${tt}</span><span class="dd">${dd}</span></span>
      <span class="go">&rarr;</span></button>`;
  return `
  <div class="wc-top"><span class="wc-mark">CARTA</span>${wcProg(1)}</div>
  <div class="wc-body">
    <div class="wc-eyebrow wc-rise" style="animation-delay:.04s">Where you'll start</div>
    <h1 class="wc-head sm wc-rise" style="animation-delay:.10s">What brings you in?</h1>
    <div class="wc-list">
      ${c('home','The cup at home','Dial it in. Change one thing, log it, watch the line move.','.20')}
      ${c('cafe','The cup away','Remember the café — and the order worth ordering again.','.27')}
      ${c('both','Both','One taste, two rooms — the whole idea.','.34')}
    </div>
    <div class="wc-note wc-rise" style="animation-delay:.42s">Nothing here is locked — this only picks your first screen. You can log either kind of cup any time.</div>
  </div>
  <div class="wc-foot"><button class="wc-skip" onclick="wcGo(0)">&larr; Back</button></div>`;
}

function wcRamp(){
  const conf={
    home:{eb:'First, the tools',h:'Define a Setup.',
      b:`The assembly, not the appliance — grinder and burrs, brewer, basket, water. CARTA won't log a brew without one. That refusal is the point: a grind number without a Setup is a <em>rumour</em>.`,
      cta:'Define your Setup &rarr;',act:'setup',skip:'Skip &mdash; take me home',alt:null},
    cafe:{eb:'First, a cup',h:'Remember a cup.',
      b:`A shop and one tap on the 1&ndash;9 scale is a whole record. The order, the beans, a photo, an order-again verdict &mdash; all optional, all later.`,
      cta:'Log a café cup &rarr;',act:'cafe',skip:'Skip &mdash; take me to Café',alt:null},
    both:{eb:'Two ways in',h:'Start with the tools.',
      b:`Home dials the cup in; Café remembers the one worth returning to &mdash; the same 1&ndash;9 language on both. Begin with a Setup; log a café cup any time from the Café tab.`,
      cta:'Define your Setup &rarr;',act:'setup',skip:'Skip for now',alt:'Log a café cup instead'},
  }[wcIntent||'both'];
  return `
  <div class="wc-top"><span class="wc-mark">CARTA</span>${wcProg(2)}</div>
  <div class="wc-body">
    <div class="wc-eyebrow wc-rise" style="animation-delay:.04s">${conf.eb}</div>
    <h1 class="wc-head sm wc-rise" style="animation-delay:.10s">${conf.h}</h1>
    <p class="wc-lede wc-rise" style="animation-delay:.20s">${conf.b}</p>
  </div>
  <div class="wc-foot wc-rise" style="animation-delay:.30s">
    <button class="btn btn-primary" onclick="finishWelcome('${wcIntent||'both'}','${conf.act}')">${conf.cta}</button>
    ${conf.alt?`<button class="btn btn-quiet" onclick="finishWelcome('${wcIntent||'both'}','cafe')">${conf.alt}</button>`:''}
    <button class="wc-skip" onclick="finishWelcome('${wcIntent||'both'}',null)">${conf.skip}</button>
    <div class="wc-seal">We do not sell coffee. We keep the record.</div>
  </div>`;
}

// Commit the funnel choice and drop onto the one aligned action.
function finishWelcome(intent,action){
  if(intent)setPref('intent',intent);
  setPref('onboarded',true);
  markVersionSeen();                       // welcomed users skip the "what's new" bump too
  closeWelcome();
  // Land on the screen that owns the action; otherwise the chosen intent's screen.
  go(action==='cafe'?'cafes':action==='setup'?'field':(intent&&INTENT_TAB[intent])||'field');
  if(action==='setup')openSetupForm();
  else if(action==='cafe')openCafe();
}

/* ============ boot ============ */
applyTheme();
regSeed(); // the Register meets every ledger already on this device
const lastBag=D.bags.slice().sort(byNew)[0];
if(lastBag)setAccent(lastBag.roastLevel);
// A café-first user is served the Café screen on arrival; home/both land on Home.
if(getPref('intent',null)==='cafe')tab='cafes';
render();
// First run: the welcome flow (the why → the funnel → the one action). Returning
// users skip it and get the changelog on a version bump instead.
if(needsWelcome()){
  setTimeout(openWelcome,140);
}else if(lastSeenVersion()!==APP_VERSION){
  if(firstRun())markVersionSeen();
  else setTimeout(()=>openWhatsNew(true),350);
}
// Sync: on boot, when the network returns, and when the app comes back to the
// foreground (iOS PWAs get no background time — this is the sync heartbeat).
if(SYNC)setTimeout(()=>syncNow(false),400);
window.addEventListener('online',()=>syncNow(false));
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')syncNow(false)});
</script>
</body>
</html>
